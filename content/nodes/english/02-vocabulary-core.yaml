trigger:
  type: story
  title: "掌握这 30 个词，你就有了英语的起点"
  content:
    text: |
      你知道英语有多少单词吗？超过 17 万个。

      但好消息是：最常用的 300 个词覆盖了日常对话的 65%。
      而初中阶段只需要牢固掌握约 500 个词，就能应对所有考试。

      这里精选了 30 个最核心的初中词汇，分为 6 个主题。
      每个词都配有音标——你刚刚学过的工具，现在要用上了。

      规则很简单：
      1. 先听发音（点 🔊 按钮）
      2. 看音标，和你在音标课上学到的对照
      3. 记单词 + 记中文意思
      4. 大声跟读

      当你拿下这 30 个词，你就有了英语的第一块基石。
    question: "你觉得先学音标再背单词，和直接硬背单词——哪个更高效？"
    spoken_phrases:
      - { text: "school", label: "/skuːl/" }
      - { text: "water", label: "/ˈwɔːtər/" }
      - { text: "family", label: "/ˈfæməli/" }
      - { text: "friend", label: "/frend/" }
      - { text: "beautiful", label: "/ˈbjuːtɪfl/" }


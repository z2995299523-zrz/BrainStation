        - { symbol: "/n/",  speak_phoneme: "nnn-nnn",   word: "no",    word_ipa: "/nəʊ/",       speak_word: "no" }
        - { symbol: "/ŋ/",  speak_phoneme: "ng-ng-ng",  word: "sing",  word_ipa: "/sɪŋ/",       speak_word: "sing" }

    examples:
      - input: "name 为什么读 /neɪm/？"
        output: "末尾有 e → 开音节 → a 读 /eɪ/"
      - input: "cat 为什么读 /kæt/？"
        output: "以辅音 t 结尾 → 闭音节 → a 读 /æ/"

  understand:
    text: |
      ## 为什么"音标"和"字母"不是一回事？

      英语在历史上被多次"入侵"——日耳曼语、拉丁语、法语、希腊语——
      每次入侵都带来新的单词和拼写规则。

      结果就是：英语的拼写大约定型于 15 世纪（印刷术出现），
      但发音一直在变化。所以写和读脱节了。

      **Great Vowel Shift（元音大推移）**：
      14-18 世纪，英语长元音的发音发生了系统性变化：
      - name 原本读 /naːmə/ → 现在读 /neɪm/
      - feet 原本读 /feːt/ → 现在读 /fiːt/

      拼写没跟上发音的变化——这就是一切混乱的根源。
    highlights:
      - "英语拼写混乱是因为拼写在 500 年前就定型了，发音却一直在变"
      - "音标是'作弊码'——学会就能读任何单词"

  connect:
    text: |
      ## 音标不只是学英语的工具

      - **语言学**：所有语言都可以用 IPA 来记音
      - **演戏/播音**：演员和播音员需要音标来学习方言和外语口音
      - **AI 语音**：Siri/Alexa 用音素序列来合成语音
      - **语言康复**：听力障碍者通过音标视觉线索学习发音

      **更深一层**：音标让你意识到——发音是可以被看见的。
      把声音变成视觉符号，这是人类的一大发明。
    thought_seeds:
      - "国际音标可以标注世界上任何一种语言的发音"
      - "你的手机里的语音助手就是一个音标引擎"

feynman:
  base_prompt: "用你自己的话解释：什么是音标？为什么英语需要音标而中文不需要？"
  key_elements:
    - "音标记录发音"
    - "英语拼写和发音不一致"
    - "开音节/闭音节规律"
    - "学会音标能读任何新单词"
  deep_questions:
    - "如果要你设计一套新的英语拼写系统（完全照读音写），你会怎么设计？会遇到什么问题？"
    - "你觉得中文为什么不需要音标（拼音是后来发明的）？"
  missing_hints:
    "音标记录发音": "音标的作用是什么？和字母有什么区别？"
    "英语拼写和发音不一致": "同一个字母在不同单词里读法一样吗？举例。"
    "开音节/闭音节规律": "结尾的 e 会影响前面的元音发音吗？"
    "学会音标能读任何新单词": "遇到不认识单词，你有音标就能做到什么？"

thought_card: "你今天学到了什么以前不知道的发音规律？"

        - { symbol: "/dʒ/", speak_phoneme: "juh-juh",     word: "jump",  word_ipa: "/dʒʌmp/",     speak_word: "jump" }
        - { symbol: "/dr/", speak_phoneme: "druh-druh",   word: "drive", word_ipa: "/draɪv/",     speak_word: "drive" }

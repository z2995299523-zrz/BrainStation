slug: phonetics
subject: english
title: "音标与拼读"
tier: core
difficulty: 1
prerequisites: []
estimated_min: 25

trigger:
  type: story
  title: "你为什么能读出没见过的单词？"
  content:
    text: |
      英语有 44 个音素，但只有 26 个字母。

      这意味着同一个字母在不同单词里读不同的音——
      "ghoti" 完全可以读成 "fish"：
      - gh 像 enough 里的 /f/
      - o 像 women 里的 /ɪ/
      - ti 像 nation 里的 /ʃ/

      这就是为什么你需要音标——它是英语发音的"拼音系统"。
      一旦掌握，你就能读任何不认识的单词。
    question: "为什么英语的拼写和发音常常不一致？"
    spoken_phrases:
      - { text: "enough", label: "gh → /f/" }
      - { text: "women", label: "o → /ɪ/" }
      - { text: "nation", label: "ti → /ʃ/" }
      - { text: "fish", label: "ghoti = fish" }

content:
  operation:
    text: |
      ## 国际音标（IPA）基础

      **48 个音标 = 20 个元音 + 28 个辅音**

      **元音（Vowels）**：
      - 单元音：/iː/ (see)、/ɪ/ (sit)、/e/ (bed)、/æ/ (cat)、/ʌ/ (cup)、/ɑː/ (car)、/ɒ/ (hot)、/ɔː/ (door)、/ʊ/ (book)、/uː/ (too)、/ɜː/ (bird)、/ə/ (about)
      - 双元音：/aɪ/ (my)、/eɪ/ (day)、/ɔɪ/ (boy)、/aʊ/ (now)、/əʊ/ (go)、/ɪə/ (here)、/eə/ (hair)、/ʊə/ (tour)

      **辅音（Consonants）**：
      - 清辅音：/p/ /t/ /k/ /f/ /θ/ /s/ /ʃ/ /tʃ/ /tr/ /ts/ /h/
      - 浊辅音：/b/ /d/ /g/ /v/ /ð/ /z/ /ʒ/ /dʒ/ /dr/ /dz/ /r/
      - 鼻音和半元音：/m/ /n/ /ŋ/ /l/ /w/ /j/

      **拼读规则**：
      - 开音节（以元音结尾）：元音读本音，如 go、she、hi
      - 闭音节（以辅音结尾）：元音读短音，如 cat、bed、sit
    phonemes:
      monophthongs:
        - { symbol: "/iː/", speak_phoneme: "ee-ee-ee", word: "see",   word_ipa: "/siː/",       speak_word: "see" }
        - { symbol: "/ɪ/",  speak_phoneme: "ih-ih-ih", word: "sit",   word_ipa: "/sɪt/",       speak_word: "sit" }
        - { symbol: "/e/",  speak_phoneme: "eh-eh-eh", word: "bed",   word_ipa: "/bed/",       speak_word: "bed" }
        - { symbol: "/æ/",  speak_phoneme: "a-a-a",    word: "cat",   word_ipa: "/kæt/",       speak_word: "cat" }
        - { symbol: "/ʌ/",  speak_phoneme: "uh-uh-uh", word: "cup",   word_ipa: "/kʌp/",       speak_word: "cup" }
        - { symbol: "/ɑː/", speak_phoneme: "ah-ah-ah", word: "car",   word_ipa: "/kɑːr/",      speak_word: "car" }
        - { symbol: "/ɒ/",  speak_phoneme: "o-o-o",    word: "hot",   word_ipa: "/hɒt/",       speak_word: "hot" }
        - { symbol: "/ɔː/", speak_phoneme: "aw-aw-aw", word: "door",  word_ipa: "/dɔːr/",      speak_word: "door" }
        - { symbol: "/ʊ/",  speak_phoneme: "oo-oo-oo", word: "book",  word_ipa: "/bʊk/",       speak_word: "book" }
        - { symbol: "/uː/", speak_phoneme: "ooo-ooo",  word: "too",   word_ipa: "/tuː/",       speak_word: "too" }
        - { symbol: "/ɜː/", speak_phoneme: "er-er-er", word: "bird",  word_ipa: "/bɜːrd/",     speak_word: "bird" }
        - { symbol: "/ə/",  speak_phoneme: "uh",       word: "about", word_ipa: "/əˈbaʊt/",    speak_word: "about" }
      diphthongs:
        - { symbol: "/aɪ/", speak_phoneme: "eye-eye",  word: "my",   word_ipa: "/maɪ/",       speak_word: "my" }
        - { symbol: "/eɪ/", speak_phoneme: "ay-ay",    word: "day",  word_ipa: "/deɪ/",       speak_word: "day" }
        - { symbol: "/ɔɪ/", speak_phoneme: "oy-oy",    word: "boy",  word_ipa: "/bɔɪ/",       speak_word: "boy" }
        - { symbol: "/aʊ/", speak_phoneme: "ow-ow",    word: "now",  word_ipa: "/naʊ/",       speak_word: "now" }
        - { symbol: "/əʊ/", speak_phoneme: "oh-oh",    word: "go",   word_ipa: "/ɡəʊ/",       speak_word: "go" }

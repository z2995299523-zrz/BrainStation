slug: inequalities
subject: math
title: 不等式与不等式组
tier: core
difficulty: 2
prerequisites:
  - linear-equation
estimated_min: 25
trigger:
  type: story
  title: 超过还是不足——不等式比等式更常见
  content:
    text: "你去买奶茶，预算 15 元。奶茶 12 元，加珍珠 3 元，加椰果 2 元。\n你不能超预算——但到底能加几种料？\n\n这不是方程——没有精确的等号。\n这是一道不等式题：12 + 3a + 2b ≤ 15\n\n实际上，生活中绝大多数的判断都不是精确的等式：\n- 考试\"及格\" = 分数 ≥ 60\n- \"能赶上公交车\" = 到达时间 ≤ 发车时间\n- \"可以买\" = 价格 ≤ 钱包余额\n\n不等式处理的是\"范围\"而不是\"精确点\"。\n学会不等式，你就能量化生活中所有的\"多少\"\"大小\"\"快慢\"\"够不够\"。\n"
    question: 你在生活中遇到过哪些'不等式决策'？想想今天早上做了什么'大于''小于'的判断。
display:
  concept:
    summary: 不等式是含有 >、<、≥、≤ 的数量关系。本章学习不等式的基本性质、一元一次不等式的解法、不等式组的解法，以及如何用数轴表示解集。
    sections:
      - title: 一、不等式的基本概念
        content: "五种不等关系符号：\n\n| 符号 | 读法 | 含义 |\n|------|------|------|\n| > | 大于 | 严格大于 |\n| < | 小于 | 严格小于 |\n| ≥ | 大于等于 | 不小于 |\n| ≤ | 小于等于 | 不大于 |\n| ≠ | 不等于 | 不等于 |\n\n**不等式的解 vs 解集**：\n- 一个解 = 满足不等式的一个具体数值\n- 解集 = 所有解的集合（通常是无限多个！）\n\n例如：x > 3 的解集包含 3.1、3.14、4、100……（无限多个数）\n"
      - title: 二、不等式的基本性质
        content: "| 性质 | 操作 | 符号方向 |\n|------|------|----------|\n| 性质 1 | 两边同时加减同一个数 | 不变 |\n| 性质 2 | 两边同时乘除同一个正数 | 不变 |\n| 性质 3 | 两边同时乘除同一个负数 | **反转！** |\n\n**性质 3 是关键**——两边乘除负数时必须反转不等号！\n\n例如：$-2x > 6$ → 两边除以 -2 → $x < -3$（不等号由 > 变成 <）\n\n为什么？可以这样理解：\n$-2 \\times (-4) = 8 > 6$ → x = -4 满足原不等式\n但如果忘记反转：x > -3 → x = -4 不满足——矛盾！\n"
      - title: 三、一元一次不等式的解法
        content: "步骤与解一元一次方程完全相同——唯一区别：乘除负数时反转不等号。\n\n例如：解 $3x - 5 \\leq 2x + 4$\n1. 移项：$3x - 2x \\leq 4 + 5$\n2. 合并：$x \\leq 9$\n\n解集表示：\n- 不等式形式：$x \\leq 9$\n- 数轴表示：从 9 向左的射线（9 处画实心点表示包含）\n"
      - title: 四、不等式组
        content: "**定义**：几个不等式联立，求同时满足所有不等式的 x 的范围。\n\n解不等式组 = 分别解每个不等式 → 取交集。\n\n例如：\n$$\\begin{cases} x > 3 \\\\ x \\leq 7 \\end{cases}$$\n\n解集：$3 < x \\leq 7$（大于 3 且不超过 7）\n\n数轴表示：3 到 7 的区间——3 处空心（不包含），7 处实心（包含）\n"
  examples:
    - title: 解不等式（注意变号）
      problem: 解不等式：-2x + 5 > 1
      steps:
        - 第 1 步：-2x > 1 - 5 → -2x > -4
        - 第 2 步：两边除以 -2——负数！不等号反转 → x < 2
        - 第 3 步：解集 {x | x < 2}
      answer: x < 2
    - title: 解不等式组
      problem: 解不等式组：2x - 1 > 3, x + 2 < 8
      steps:
        - 第 1 步：解① 2x > 4 → x > 2
        - 第 2 步：解② x < 6
        - 第 3 步：取交集：x > 2 且 x < 6 → 2 < x < 6
      answer: 2 < x < 6
    - title: 应用题
      problem: 小明有 50 元，一本数学书 18 元，一本英语书 15 元。买了数学书后，还能买几本英语书？
      steps:
        - 第 1 步：设能买 x 本英语书，列不等式：18 + 15x ≤ 50
        - 第 2 步：15x ≤ 32 → x ≤ 2.13...
        - 第 3 步：x 必须是整数 → x ≤ 2（最多 2 本）
      answer: 最多 2 本
  practice:
    - id: ineq-prac-001
      stem: 解不等式：x + 5 > 12
      answer: x > 7
      hints:
        - 移项——把常数移到右边
        - 两边同时减 5
    - id: ineq-prac-002
      stem: 解不等式：-3x < 9（注意符号）
      answer: x > -3
      hints:
        - 两边除以 -3——负号需要反转不等号
        - < 变成什么？
    - id: ineq-prac-003
      stem: 解不等式组：x > 1, x ≤ 5。在数轴上表示解集。
      answer: 1 < x ≤ 5。数轴上 1 处空心圈，5 处实心点，之间连线。
      hints:
        - 两个条件的交集
        - 画数轴：1 处空心（不包含），5 处实心（包含）
    - id: ineq-prac-004
      stem: 列出不等式：'x 的 2 倍与 3 的和大于 7'
      answer: 2x + 3 > 7
      hints:
        - "'大于'用什么符号？"
        - x 的 2 倍 → 2x，与 3 的和 → +3
    - id: ineq-prac-005
      stem: 解不等式：5 - 2x ≥ 1
      answer: x ≤ 2（-2x ≥ -4 → 除以 -2 反转不等号 → x ≤ 2）
      hints:
        - 先移项把 -2x 留在左边
        - 最后一步除以负数——反转不等号
  test:
    - id: ineq-test-001
      stem: 解不等式：2x - 3 < 7
      answer: x < 5
      difficulty: 1
      layer: operation
    - id: ineq-test-002
      stem: 解不等式：-0.5x ≥ 3
      answer: x ≤ -6（除以 -0.5 反转不等号）
      difficulty: 1
      layer: operation
    - id: ineq-test-003
      stem: 解不等式组：x + 2 ≥ 1, 3x < 12
      answer: -1 ≤ x < 4
      difficulty: 2
      layer: operation
    - id: ineq-test-004
      stem: 下列哪个不等式的解是 x < -2？
      answer: A
      difficulty: 2
      layer: understand
      q_type: choice
      options:
        - A. -x > 2
        - B. 3x > -6
        - C. x - 1 < -3
    - id: ineq-test-005
      stem: 一个数 x 满足 2x - 3 > 1 且 x + 4 ≤ 10。求 x 的整数解。
      answer: x > 2 且 x ≤ 6 → 整数解为 3, 4, 5, 6
      difficulty: 2
      layer: operation
    - id: ineq-test-006
      stem: 解不等式：2(x - 3) > 3(1 - x)
      answer: 2x-6 > 3-3x → 5x > 9 → x > 1.8
      difficulty: 2
      layer: operation
    - id: ineq-test-007
      stem: 小红说：'一个不等式组的解集永远是有限的。'她说的对吗？举反例。
      answer: 不对。例如 x > 3 且 x > 5 的解集是 x > 5——这是一个无限区间（一直延伸到正无穷）。不等式组的解也可以是无限的。
      difficulty: 3
      layer: understand
    - id: ineq-test-008
      stem: 小明有 100 元预算买书。A 书 15 元/本，B 书 12 元/本。他想买至少 2 本 A 书，且总共至少买 5 本书。设 A 书 x 本，B 书 y 本，列出不等式组。
      answer: 15x + 12y ≤ 100, x ≥ 2, x + y ≥ 5, x 和 y 为非负整数
      difficulty: 4
      layer: connect
ai_context:
  topic_summary: 不等式与不等式组是解'范围问题'的数学工具。核心内容：不等式的基本性质（重点是性质 3——乘除负数不等号反转）、一元一次不等式的解法（与解方程步骤相同但注意符号）、不等式组的解法（分别求解取交集）、解集在数轴上的表示（空心圈 vs 实心点）。不等式的解通常是一个范围（无限多个值），这与方程的解是一个具体值（或几个值）有本质区别。
  key_insights:
    - 性质 3 是不等式和等式之间唯一的区别点——其他所有步骤和方程完全一样
    - 乘除负数反转不等号可以通过数字检验来验证：-2x > 6，x=-4 满足，x=4 不满足 → 所以 x < -3（而非 x > -3）
    - 解集在数轴上的表示非常关键——空心圈（不含等号）vs 实心点（含等号），向左画（小于）vs 向右画（大于）
    - 不等式组的解 = 各不等式解集的交集——在数轴上找所有被覆盖到的部分
  common_mistakes:
    - mistake: 乘除负数忘记反转不等号
      example: -2x < 8 → 学生写 x < -4
      why: 习惯等式——等式除以负数不反转等号，下意识套用到不等式
      how_to_explain: 每当你对不等式两边乘或除一个负数，停一下，问自己：这个数是负的吗？如果是——反转不等号！画一个星号提醒自己。
    - mistake: 解不等式组时只解一个不等式
      example: 解 2x+1>5 且 x<10 → 学生写 x<10
      why: 只看了第二个简单的不等式，忘了第一个
      how_to_explain: 不等式组的解必须同时满足所有不等式——解完每个不等式后在数轴上画出各自范围，重叠部分才是最终答案。
    - mistake: 混淆'空心圈'和'实心点'
      example: x ≥ 3 在数轴上画空心圈
      why: 不理解符号的含义——≥ 包含 3，≤ 也包含边界
      how_to_explain: 有等号（≥ 或 ≤）= 包含边界 = 实心点。无等号（> 或 <）= 不包含边界 = 空心圈。'等'谐音'点'——有等号就有点。
  alternate_explanations:
    - method: 天平+沙袋法
      when_to_use: 学生不理解为什么乘除负数要反转不等号
      prompt: 想象一个天平：左边=2x 右边=8。现在把两边的东西都取反（都变成负数）：左边=-2x 右边=-8。原来重的一边变成更负的数后反而更轻——天平倾斜方向反了。所以不等号需要反转。这就是为什么乘负号=反转不等号。
    - method: 数轴直观法
      when_to_use: 学生解不等式组时不会取交集
      prompt: 画一条数轴。用红笔画第一个不等式的范围，用蓝笔画第二个不等式的范围。数轴上被两种颜色同时覆盖的部分就是解。画图比在脑子里想象可靠得多。
  question_templates:
    difficulty_1_2: 出 2 道解一元一次不等式题（一道不需要反转不等号，一道需要反转）
    difficulty_3: 出 1 道不等式组解集题：求公共部分并在数轴上表示
    difficulty_4: 出 1 道应用题：生活场景的不等式决策（预算、时间、条件约束）

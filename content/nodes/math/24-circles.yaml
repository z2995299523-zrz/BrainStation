slug: circles
subject: math
title: "圆"
tier: core
difficulty: 3
prerequisites: ["triangles", "pythagorean"]
estimated_min: 33

trigger:
  type: story
  title: "古人为什么把车轮造成圆的"
  content:
    text: |
      想象一下，如果车轮是方的会怎样？每转一下都要先把整辆车抬起一个角，颠得人散架。
      古人很早就发现：只有圆，才能让车轴到地面的距离始终不变，于是车跑起来又稳又顺。
      这背后的秘密只有一句话：圆上每一点到圆心的距离都相等——这个距离就是半径。
      正是这条朴素的性质，衍生出了垂径定理、圆周角定理、切线性质等一整套优美的几何结论。
      下水道的井盖也是圆的——因为圆是唯一不会从自己的洞里掉下去的形状。
      一个简单的"等距离"，撑起了人类几千年的轮子文明。
    question: "为什么不管从哪个角度量，圆的'宽度'（直径）都一样，而正方形却不是？"

display:
  concept:
    summary: "圆是平面上到定点距离等于定长的所有点组成的图形，定点是圆心，定长是半径。"
    sections:
      - title: "一、基本概念"
        content: |
          圆：平面上到定点的距离等于定长的所有点组成的图形。定点叫圆心 $O$，定长叫半径 $r$。
          - 直径 $d = 2r$，是过圆心的最长的弦
          - 弦：连接圆上两点的线段；直径是最长的弦
          - 弧：圆上两点间的部分，分劣弧（短）和优弧（长）

          周长 $C = 2\pi r$，面积 $S = \pi r^2$。

      - title: "二、垂径定理"
        content: |
          垂直于弦的直径平分这条弦，并且平分弦所对的两条弧：

          $$\text{若直径 } CD \perp \text{弦 } AB \text{ 于 } M，\text{则 } AM = BM$$

          它常和勾股定理联手：半径 $r$、弦的一半、圆心到弦的距离 $d$ 构成直角三角形：

          $$r^2 = d^2 + \left(\frac{1}{2}AB\right)^2$$

      - title: "三、圆心角与圆周角"
        content: |
          - 圆心角：顶点在圆心的角，它等于所对弧的度数
          - 圆周角：顶点在圆上、两边都与圆相交的角

          圆周角定理：同弧（或等弧）所对的圆周角，等于它所对圆心角的一半：

          $$\angle ACB = \frac{1}{2}\angle AOB$$

          推论：直径所对的圆周角是直角（$90^\circ$）——这是证直角的利器。

      - title: "四、点、直线与圆的位置关系"
        content: |
          设圆心到直线距离为 $d$，半径为 $r$：
          - $d > r$：直线与圆相离，没有公共点
          - $d = r$：相切，有一个公共点（切点）
          - $d < r$：相交，有两个公共点

          切线性质：圆的切线垂直于过切点的半径，即 $OT \perp l$。
          判定：过半径外端且垂直于该半径的直线是圆的切线。

      - title: "五、弧长与扇形面积"
        content: |
          圆心角为 $n^\circ$ 时：

          $$\text{弧长 } l = \frac{n}{360}\times 2\pi r = \frac{n\pi r}{180}$$

          $$\text{扇形面积 } S = \frac{n}{360}\times \pi r^2 = \frac{1}{2}lr$$

          本质是"占整圆的几分之几"，把 $\dfrac{n}{360}$ 这个比例乘上去即可。

  examples:
    - title: "垂径定理配勾股"
      problem: '圆 $O$ 半径为 $5$，弦 $AB = 8$，求圆心 $O$ 到弦 $AB$ 的距离。'
      steps:
        - '第 1 步：作 $OM \perp AB$ 于 $M$，由垂径定理 $AM = \frac{1}{2}AB = 4$。'
        - '第 2 步：在直角三角形 $OMA$ 中，$OA = 5$（半径），$AM = 4$。'
        - '第 3 步：勾股定理 $OM = \sqrt{OA^2 - AM^2} = \sqrt{25 - 16} = 3$。'
      answer: "3"

    - title: "圆周角定理"
      problem: '圆中弧 $AB$ 所对的圆心角 $\angle AOB = 80^\circ$，求同弧所对的圆周角 $\angle ACB$。'
      steps:
        - '第 1 步：圆周角等于同弧所对圆心角的一半。'
        - '第 2 步：$\angle ACB = \frac{1}{2}\angle AOB = \frac{1}{2}\times 80^\circ$。'
        - '第 3 步：$\angle ACB = 40^\circ$。'
      answer: "40°"

    - title: "扇形面积"
      problem: '半径为 $6$、圆心角为 $120^\circ$ 的扇形，求它的面积（结果保留 $\pi$）。'
      steps:
        - '第 1 步：扇形占整圆的 $\frac{120}{360} = \frac{1}{3}$。'
        - '第 2 步：整圆面积 $\pi r^2 = 36\pi$。'
        - '第 3 步：扇形面积 $= \frac{1}{3}\times 36\pi = 12\pi$。'
      answer: "12π"

  practice:
    - id: "cir-prac-001"
      stem: '一个圆的半径是 $7$，它的直径和周长各是多少（周长保留 $\pi$）？'
      answer: "直径14，周长14π"
      hints: ["直径=2r", "周长=2πr"]

    - id: "cir-prac-002"
      stem: '圆 $O$ 半径 $13$，弦长 $24$，求圆心到弦的距离。'
      answer: "5"
      hints: ["弦的一半是12", "用 r²=d²+(弦/2)²"]

    - id: "cir-prac-003"
      stem: '直径所对的圆周角是多少度？'
      answer: "90°"
      hints: ["这是圆周角定理的推论", "半圆所对圆周角为直角"]

    - id: "cir-prac-004"
      stem: '圆心角 $60^\circ$ 所对的圆周角是多少度？'
      answer: "30°"
      hints: ["圆周角是同弧圆心角的一半", "60÷2"]

    - id: "cir-prac-005"
      stem: '半径 $9$、圆心角 $40^\circ$ 的弧长是多少（保留 $\pi$）？'
      answer: "2π"
      hints: ["弧长=（n/360）×2πr", "40/360=1/9"]

    - id: "cir-prac-006"
      stem: '圆的半径为 $4$，圆心到一条直线的距离为 $4$，直线与圆是什么位置关系？'
      answer: "相切"
      hints: ["比较 d 和 r", "d=r 时相切"]

    - id: "cir-prac-007"
      stem: '半径 $3$、圆心角 $90^\circ$ 的扇形面积是多少（保留 $\pi$）？'
      answer: "9π/4"
      hints: ["占整圆的1/4", "整圆面积9π，再乘1/4"]

  test:
    - id: "cir-test-001"
      stem: '半径为 $10$ 的圆，面积是多少（保留 $\pi$）？'
      answer: "100π"
      difficulty: 1
      layer: operation

    - id: "cir-test-002"
      stem: '圆心角 $100^\circ$ 所对的圆周角是多少度？'
      answer: "50°"
      difficulty: 1
      layer: operation

    - id: "cir-test-003"
      stem: '圆 $O$ 半径 $5$，圆心到弦的距离为 $3$，求弦长。'
      answer: "8"
      difficulty: 2
      layer: operation

    - id: "cir-test-004"
      stem: '圆心到直线的距离为 $6$，半径为 $8$，直线与圆有几个公共点？'
      answer: "2个（d<r 相交）"
      difficulty: 2
      layer: understand

    - id: "cir-test-005"
      stem: '半径 $6$、圆心角 $150^\circ$ 的弧长是多少（保留 $\pi$）？'
      answer: "5π"
      difficulty: 3
      layer: operation

    - id: "cir-test-006"
      stem: "为什么直径所对的圆周角一定是直角？请用圆周角定理解释。"
      answer: "直径所对圆心角是平角180°，圆周角是它的一半，所以是90°。"
      difficulty: 3
      layer: understand

    - id: "cir-test-007"
      stem: '$AB$ 是圆 $O$ 的切线，切点为 $T$，$OT = 3$，$OA = 5$，求切线长 $AT$。'
      answer: "4（OT⊥AT，勾股 √(25-9)=4）"
      difficulty: 4
      layer: connect

    - id: "cir-test-008"
      stem: '半径 $6$、圆心角 $120^\circ$ 的扇形，求它的弧长和面积（保留 $\pi$）。'
      answer: "弧长4π，面积12π"
      difficulty: 4
      layer: connect

ai_context:
  topic_summary: "圆是初中几何中性质最丰富的图形。它把'等距离'这个简单定义，发展出垂径定理、圆周角定理、切线性质、弧长扇形面积等一整套结论，并大量与勾股定理、相似结合，是中考几何压轴题的高频载体。"
  key_insights:
    - "圆的一切性质都源于'圆上各点到圆心等距'，半径是连接一切的桥梁"
    - "垂径定理几乎总是和勾股定理配合：半径、半弦、弦心距构成直角三角形"
    - "圆周角是同弧圆心角的一半；直径所对圆周角为直角，是构造直角的常用手段"
    - "弧长和扇形面积的本质是'占整圆的 n/360'，记住这个比例就不必死背公式"
  common_mistakes:
    - mistake: "用半弦还是整弦代入勾股搞混"
      example: "弦长8时，直接拿8去和半径勾股"
      why: "忘了垂径定理平分的是弦，进入直角三角形的是半弦"
      how_to_explain: "圆心到弦作垂线，把弦平分成两半。直角三角形里的那条直角边是半弦 4，不是整弦 8。"

    - mistake: "把圆周角当成等于圆心角"
      example: "圆心角80°就说圆周角也是80°"
      why: "记不清谁是谁的一半"
      how_to_explain: "圆周角顶点在圆周上，离得远，所以'小'，是圆心角的一半。同弧时圆周角=圆心角÷2。"

    - mistake: "弧长和扇形面积公式混用"
      example: "求弧长却用了 πr² 那一项"
      why: "两个公式都带 n/360，容易张冠李戴"
      how_to_explain: "弧长是'周长'的一部分，用 2πr；扇形面积是'圆面积'的一部分，用 πr²。先想清楚要的是长度还是面积。"
  alternate_explanations:
    - method: "比例缩放法"
      when_to_use: "学生记不住弧长、扇形面积公式时"
      prompt: "整个圆是 360°。圆心角 n° 就占了 n/360 这么大一块。要弧长就用这个比例乘周长，要面积就乘圆面积。一切都是'整圆的几分之几'。"

    - method: "车轮/井盖实物模型"
      when_to_use: "学生想理解圆的等距性质和切线时"
      prompt: "车轮滚动时圆心高度不变，就是因为半径处处相等。切线就像地面：它只碰圆一个点，且那一点的半径正好垂直地面，这就是切线垂直于半径。"

  question_templates:
    difficulty_1_2: "出 2 道直接套周长、面积、圆周角或弧长公式的基础题"
    difficulty_3: "出 1 道垂径定理配勾股或判断直线与圆位置关系的题"
    difficulty_4: "出 1 道结合切线、勾股或扇形的几何综合题"

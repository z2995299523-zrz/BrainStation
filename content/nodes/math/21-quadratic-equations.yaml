slug: quadratic-equations
subject: math
title: "一元二次方程"
tier: core
difficulty: 3
prerequisites: ["linear-equation", "factorization"]
estimated_min: 32

trigger:
  type: story
  title: "古巴比伦人 4000 年前就会解的方程"
  content:
    text: |
      公元前 2000 年，古巴比伦的泥板上刻着这样一道题：
      "一块正方形田地，面积减去边长等于 870，求边长。"
      翻译成今天的式子就是 $x^2 - x = 870$——一个标准的一元二次方程。
      神奇的是，泥板上不仅有答案，还有一套和今天"配方法"几乎一样的步骤！
      又过了 3000 多年，印度和阿拉伯数学家把这套方法整理成了一个统一公式，
      也就是今天人人会背的求根公式 $x = \frac{-b \pm \sqrt{b^2-4ac}}{2a}$。
      一个困扰人类几千年的问题，最后被压缩成了一行公式——这就是数学的威力。
    question: "为什么一元二次方程通常有两个解，而一元一次方程只有一个解？"

display:
  concept:
    summary: "一元二次方程是只含一个未知数、且未知数最高次为 2 的整式方程，一般形式为 ax²+bx+c=0（a≠0）。"
    sections:
      - title: "一、定义与一般形式"
        content: |
          只含一个未知数，并且未知数的最高次数是 $2$ 的整式方程，叫做一元二次方程。
          一般形式：

          $$ax^2 + bx + c = 0 \quad (a \neq 0)$$

          其中 $a$ 是二次项系数，$b$ 是一次项系数，$c$ 是常数项。
          $a \neq 0$ 是关键——如果 $a = 0$，方程就退化成一元一次方程了。

      - title: "二、直接开平方法与因式分解法"
        content: |
          直接开平方法：形如 $x^2 = p\ (p \geq 0)$ 时，$x = \pm\sqrt{p}$。

          因式分解法：把方程化为两个一次因式相乘等于 $0$，再利用
          "若 $A \cdot B = 0$，则 $A = 0$ 或 $B = 0$"：

          $$x^2 - 5x + 6 = 0 \Rightarrow (x-2)(x-3) = 0 \Rightarrow x = 2 \text{ 或 } x = 3$$

          因式分解法最快，遇到能分解的优先用它。

      - title: "三、配方法"
        content: |
          当不容易因式分解时，可以"凑成完全平方"：
          - 第 1 步：把二次项系数化为 $1$
          - 第 2 步：常数项移到右边
          - 第 3 步：两边同时加上一次项系数一半的平方
          - 第 4 步：左边写成完全平方，再开平方

          例如 $x^2 + 6x + 5 = 0$：移项得 $x^2 + 6x = -5$，
          两边加 $9$：$x^2 + 6x + 9 = 4$，即 $(x+3)^2 = 4$，所以 $x = -1$ 或 $x = -5$。

      - title: "四、求根公式"
        content: |
          对任意一元二次方程 $ax^2 + bx + c = 0$，只要 $b^2 - 4ac \geq 0$，就有：

          $$x = \frac{-b \pm \sqrt{b^2 - 4ac}}{2a}$$

          这是配方法对一般式推导出的"万能公式"，背不出因式分解时它永远管用。

      - title: "五、判别式判断根的情况"
        content: |
          令判别式 $\Delta = b^2 - 4ac$，不用解方程就能判断根的个数：
          - $\Delta > 0$：有两个不相等的实数根
          - $\Delta = 0$：有两个相等的实数根（即一个重根）
          - $\Delta < 0$：没有实数根

          判别式还常用来求参数范围，是中考压轴题的常客。

  examples:
    - title: "因式分解法解方程"
      problem: '解方程 $x^2 - 7x + 12 = 0$。'
      steps:
        - '第 1 步：找两个数，积为 $12$、和为 $7$，即 $3$ 和 $4$。'
        - '第 2 步：分解为 $(x-3)(x-4) = 0$。'
        - '第 3 步：令每个因式为 $0$：$x-3=0$ 或 $x-4=0$。'
        - '第 4 步：解得 $x_1 = 3$，$x_2 = 4$。'
      answer: "x₁=3，x₂=4"

    - title: "求根公式解方程"
      problem: '解方程 $2x^2 - 4x - 1 = 0$。'
      steps:
        - '第 1 步：$a=2$，$b=-4$，$c=-1$。'
        - '第 2 步：算判别式 $\Delta = (-4)^2 - 4\times 2\times(-1) = 16 + 8 = 24 > 0$。'
        - '第 3 步：代入公式 $x = \frac{4 \pm \sqrt{24}}{4} = \frac{4 \pm 2\sqrt{6}}{4}$。'
        - '第 4 步：化简 $x = \frac{2 \pm \sqrt{6}}{2}$。'
      answer: "x = (2 ± √6) / 2"

    - title: "用判别式确定参数"
      problem: '关于 $x$ 的方程 $x^2 - 2x + m = 0$ 有两个相等的实数根，求 $m$。'
      steps:
        - '第 1 步：两个相等实根意味着 $\Delta = 0$。'
        - '第 2 步：$\Delta = (-2)^2 - 4\times 1\times m = 4 - 4m$。'
        - '第 3 步：令 $4 - 4m = 0$，解得 $m = 1$。'
      answer: "m = 1"

  practice:
    - id: "qeq-prac-001"
      stem: '解方程 $x^2 = 9$。'
      answer: "x=3 或 x=-3"
      hints: ["直接开平方", "别漏掉负根"]

    - id: "qeq-prac-002"
      stem: '解方程 $x^2 - 5x = 0$。'
      answer: "x=0 或 x=5"
      hints: ["提取公因式 x", "x(x-5)=0"]

    - id: "qeq-prac-003"
      stem: '解方程 $x^2 + 4x + 3 = 0$。'
      answer: "x=-1 或 x=-3"
      hints: ["找积为3和为4的两个数", "(x+1)(x+3)=0"]

    - id: "qeq-prac-004"
      stem: '判断方程 $x^2 + x + 1 = 0$ 根的情况。'
      answer: "无实数根（Δ=1-4=-3<0）"
      hints: ["算判别式 b²-4ac", "Δ<0 时无实根"]

    - id: "qeq-prac-005"
      stem: '用配方法解 $x^2 - 6x + 5 = 0$。'
      answer: "x=1 或 x=5"
      hints: ["移项后两边加 9", "凑成 (x-3)²=4"]

    - id: "qeq-prac-006"
      stem: '解方程 $(x-3)^2 = 16$。'
      answer: "x=7 或 x=-1"
      hints: ["直接开平方 x-3=±4", "分别解两种情况"]

    - id: "qeq-prac-007"
      stem: '一个数的平方比它的 $3$ 倍多 $10$，求这个数。'
      answer: "5 或 -2"
      hints: ["设这个数为 x，列 x²=3x+10", "化为 x²-3x-10=0 再分解"]

  test:
    - id: "qeq-test-001"
      stem: '解方程 $x^2 - 16 = 0$。'
      answer: "x=4 或 x=-4"
      difficulty: 1
      layer: operation

    - id: "qeq-test-002"
      stem: '解方程 $x^2 - 2x - 8 = 0$。'
      answer: "x=4 或 x=-2"
      difficulty: 2
      layer: operation

    - id: "qeq-test-003"
      stem: '方程 $3x^2 - 2x - 1 = 0$ 的判别式是多少？根有几个？'
      answer: "Δ=4+12=16>0，有两个不相等的实根"
      difficulty: 2
      layer: understand

    - id: "qeq-test-004"
      stem: '解方程 $x^2 - 4x + 1 = 0$（用求根公式）。'
      answer: "x = 2 ± √3"
      difficulty: 3
      layer: operation

    - id: "qeq-test-005"
      stem: '若方程 $x^2 + 2x + k = 0$ 有两个不相等的实数根，求 $k$ 的取值范围。'
      answer: "k < 1"
      difficulty: 3
      layer: connect

    - id: "qeq-test-006"
      stem: "为什么 ax²+bx+c=0 必须规定 a≠0？如果 a=0 会怎样？"
      answer: "a=0 时二次项消失，方程变成一元一次方程 bx+c=0，不再是一元二次方程。"
      difficulty: 3
      layer: understand

    - id: "qeq-test-007"
      stem: "一个长方形长比宽多 2，面积是 24，求宽（列方程并解）。"
      answer: "设宽 x，x(x+2)=24，x²+2x-24=0，(x+6)(x-4)=0，宽=4（舍去负根）"
      difficulty: 4
      layer: connect

    - id: "qeq-test-008"
      stem: '已知 $x=2$ 是方程 $x^2 + bx - 6 = 0$ 的一个根，求 $b$ 和另一个根。'
      answer: "代入得 4+2b-6=0，b=1；另一根由韦达或代入得 x=-3"
      difficulty: 4
      layer: connect

ai_context:
  topic_summary: "一元二次方程是初中代数的高峰之一，是后续二次函数的代数支撑。学生在这里第一次系统掌握配方法、求根公式、判别式三大工具，并学会用它们解决面积、增长率等实际问题。判别式与参数讨论是中考综合题的核心难点。"
  key_insights:
    - "解法有优先级：能直接开平方或因式分解就先用，分解不出来再上求根公式"
    - "判别式 Δ=b²-4ac 不解方程就能判断根的个数，还能反过来求参数范围"
    - "一元二次方程一般有两个根，对应'两个因式分别为零'，这是它和一次方程的本质区别"
    - "a≠0 是命门，丢了它方程就降次了；实际问题里还要根据情境舍去不合理的负根"
  common_mistakes:
    - mistake: "开平方时漏掉负根"
      example: "x²=9 只写 x=3"
      why: "学生习惯了只有一个答案，忘了平方有正负两个来源"
      how_to_explain: "3 和 -3 平方都等于 9，所以开平方一定要带正负号：x=±3。两个根缺一不可。"

    - mistake: "配方时只在一边加常数"
      example: "x²+6x=-5 时左边加 9 右边不加"
      why: "忘了方程两边必须同时加同一个数才保持相等"
      how_to_explain: "方程像天平，左边加 9，右边也必须加 9，等式才成立。所以是 x²+6x+9=-5+9。"

    - mistake: "求根公式里符号代错"
      example: "b=-4 时把 -b 写成 -4"
      why: "对 -b、b² 中的负号处理不清"
      how_to_explain: "先把 a、b、c 连同符号一起写清楚，再代公式。b=-4 时 -b=4，b²=16，逐项代入不要心算跳步。"
  alternate_explanations:
    - method: "面积配方几何模型"
      when_to_use: "学生不理解配方法为什么要加'一半的平方'时"
      prompt: "把 x²+6x 想成一个边长 x 的正方形加上两条 x×3 的长条。要补成一个大正方形，正好缺一个 3×3=9 的角，这就是为什么加 9。"

    - method: "解法选择流程图"
      when_to_use: "学生面对一个方程不知道用哪种方法时"
      prompt: "问三个问题：能直接开平方吗（形如 x²=p 或 (x+m)²=p）？能因式分解吗（凑两个数）？都不行就用求根公式。按这个顺序走，永远不会卡住。"

  question_templates:
    difficulty_1_2: "出 2 道可用直接开平方或因式分解快速求解的基础方程"
    difficulty_3: "出 1 道需用求根公式或判别式判断/求参数范围的题"
    difficulty_4: "出 1 道实际应用题（面积、增长率等），需建立方程并舍去不合理根"

slug: parallelograms
subject: math
title: "平行四边形"
tier: core
difficulty: 3
prerequisites: ["triangles", "congruent-triangles"]
estimated_min: 30

trigger:
  type: story
  title: "为什么千斤顶能轻松举起一辆汽车"
  content:
    text: |
      你有没有想过，一个瘦小的人怎么用一个小小的千斤顶就能把整辆汽车顶起来？
      打开车后备箱里的菱形千斤顶，你会看到四根等长的钢条铰接成一个平行四边形。
      摇动螺杆，平行四边形的对角线被拉短，于是它在竖直方向上"长高"，把车顶了起来。
      整个过程中，四条边长一直不变——变的只是形状。
      平行四边形最神奇的地方就在这里：边长固定，但它可以"压扁"或"撑高"。
      正是这种"易变形"的特性，让它成为工程师手里既省力又可控的机械。
    question: "三角形为什么稳定（不易变形），而平行四边形却容易变形？这背后差了什么？"

display:
  concept:
    summary: "平行四边形是两组对边分别平行的四边形，它的对边、对角相等，对角线互相平分。"
    sections:
      - title: "一、定义与基本性质"
        content: |
          定义：两组对边分别平行的四边形叫做平行四边形，记作 $\square ABCD$。

          四条核心性质：
          - 对边平行且相等：$AB \parallel CD$，$AB = CD$
          - 对角相等：$\angle A = \angle C$，$\angle B = \angle D$
          - 邻角互补：$\angle A + \angle B = 180^\circ$
          - 对角线互相平分：$AC$ 与 $BD$ 交于点 $O$，则 $OA = OC$，$OB = OD$

      - title: "二、判定方法（5 选 1 即可）"
        content: |
          要证明一个四边形是平行四边形，下列任意一条成立即可：
          - 两组对边分别平行（定义）
          - 两组对边分别相等
          - 一组对边平行且相等
          - 两组对角分别相等
          - 对角线互相平分

          最常用的是"一组对边平行且相等"——只需找一组边，又平行又相等。

      - title: "三、面积公式"
        content: |
          平行四边形面积 = 底 $\times$ 高：

          $$S = a \cdot h$$

          注意：高是底边到对边的垂直距离，不是斜边的长度！
          同底等高的平行四边形面积相等，这是后面学等积变换的基础。

      - title: "四、特殊的平行四边形"
        content: |
          平行四边形按边、角的特殊化，可以变成：
          - 矩形：有一个角是直角的平行四边形。对角线相等：$AC = BD$
          - 菱形：有一组邻边相等的平行四边形。对角线互相垂直平分，且平分一组对角
          - 正方形：既是矩形又是菱形，集所有性质于一身

          它们的关系：正方形 $\subset$ 矩形 $\subset$ 平行四边形，正方形 $\subset$ 菱形 $\subset$ 平行四边形。

      - title: "五、三角形中位线"
        content: |
          三角形的中位线平行于第三边，并且等于第三边的一半：

          $$DE \parallel BC \quad \text{且} \quad DE = \frac{1}{2}BC$$

          其中 $D$、$E$ 分别是 $AB$、$AC$ 的中点。
          这个定理常和平行四边形一起出现，是解决"中点问题"的利器。

  examples:
    - title: "用对角线判定平行四边形"
      problem: '四边形 $ABCD$ 的对角线交于点 $O$，已知 $OA = OC = 4$，$OB = OD = 3$。判断它是不是平行四边形。'
      steps:
        - '第 1 步：观察条件——两条对角线在 $O$ 点互相分成相等的两段。'
        - '第 2 步：$OA = OC$ 说明 $O$ 平分 $AC$；$OB = OD$ 说明 $O$ 平分 $BD$。'
        - '第 3 步：对角线互相平分 $\Rightarrow$ 是平行四边形（判定定理）。'
      answer: "是平行四边形"

    - title: "求平行四边形的角"
      problem: '平行四边形 $ABCD$ 中，$\angle A = 70^\circ$，求其余三个角。'
      steps:
        - '第 1 步：对角相等，所以 $\angle C = \angle A = 70^\circ$。'
        - '第 2 步：邻角互补，$\angle B = 180^\circ - 70^\circ = 110^\circ$。'
        - '第 3 步：$\angle D = \angle B = 110^\circ$。'
      answer: "∠B=∠D=110°，∠C=70°"

    - title: "中位线求长度"
      problem: '三角形 $ABC$ 中，$D$、$E$ 分别是 $AB$、$AC$ 中点，$BC = 12$，求中位线 $DE$。'
      steps:
        - '第 1 步：$D$、$E$ 是两边中点，$DE$ 是中位线。'
        - '第 2 步：中位线等于第三边的一半：$DE = \frac{1}{2}BC$。'
        - '第 3 步：$DE = \frac{1}{2}\times 12 = 6$。'
      answer: "6"

  practice:
    - id: "para-prac-001"
      stem: '平行四边形 $ABCD$ 中，$AB = 5$，$BC = 8$，求周长。'
      answer: "26"
      hints: ["对边相等，两条 AB 两条 BC", "周长 = 2×(5+8)"]

    - id: "para-prac-002"
      stem: '平行四边形相邻两角之比为 $2:3$，求这两个角。'
      answer: "72°和108°"
      hints: ["邻角互补，和为 180°", "设为 2x 和 3x，列方程 2x+3x=180"]

    - id: "para-prac-003"
      stem: '平行四边形 $ABCD$ 中，对角线 $AC = 10$，$BD = 6$，对角线交于 $O$，求 $OA$ 与 $OB$。'
      answer: "OA=5，OB=3"
      hints: ["对角线互相平分", "各取一半"]

    - id: "para-prac-004"
      stem: '菱形的两条对角线长分别为 $6$ 和 $8$，求它的面积。'
      answer: "24"
      hints: ["菱形面积 = 对角线乘积的一半", "S = (1/2)×6×8"]

    - id: "para-prac-005"
      stem: '一个四边形的对角线互相平分，它一定是什么图形？'
      answer: "平行四边形"
      hints: ["回忆五条判定中哪一条用了对角线", "对角线互相平分是判定之一"]

    - id: "para-prac-006"
      stem: '三角形三边长 $6、8、10$，连接各边中点得到的三角形周长是多少？'
      answer: "12"
      hints: ["每条中位线是对应边的一半", "中点三角形周长 = 原周长的一半"]

  test:
    - id: "para-test-001"
      stem: '平行四边形 $ABCD$ 中 $\angle A = 55^\circ$，则 $\angle B = $ ？'
      answer: "125°"
      difficulty: 1
      layer: operation

    - id: "para-test-002"
      stem: '平行四边形 $ABCD$ 的周长为 $30$，$AB = 7$，则 $BC = $ ？'
      answer: "8"
      difficulty: 2
      layer: operation

    - id: "para-test-003"
      stem: '矩形的对角线一条为 $13$，则另一条对角线长多少？'
      answer: "13（矩形对角线相等）"
      difficulty: 2
      layer: understand

    - id: "para-test-004"
      stem: "下列不能判定四边形为平行四边形的是：A 两组对边分别相等 B 一组对边平行且相等 C 一组对边平行另一组对边相等 D 对角线互相平分"
      answer: "C"
      difficulty: 3
      layer: understand

    - id: "para-test-005"
      stem: '菱形对角线长 $10$ 和 $24$，求它的边长。'
      answer: "13"
      difficulty: 3
      layer: connect

    - id: "para-test-006"
      stem: '平行四边形 $ABCD$ 中，$E$、$F$ 分别是 $AD$、$BC$ 中点，求证四边形 $ABFE$ 是平行四边形（写出关键理由）。'
      answer: "AE∥BF（同为AD、BC方向），且AE=(1/2)AD=(1/2)BC=BF，一组对边平行且相等，故为平行四边形。"
      difficulty: 4
      layer: connect

    - id: "para-test-007"
      stem: "正方形同时具有矩形和菱形的全部性质吗？为什么？"
      answer: "是。正方形既是矩形又是菱形，所以对角线相等、互相垂直平分、且平分对角。"
      difficulty: 3
      layer: understand

    - id: "para-test-008"
      stem: '三角形面积为 $20$，连接三边中点把它分成 4 个小三角形，每个小三角形面积是多少？'
      answer: "5"
      difficulty: 4
      layer: connect

ai_context:
  topic_summary: "平行四边形是初中几何承上启下的核心章节。它把三角形全等的证明方法应用到四边形上，并引出矩形、菱形、正方形等特殊四边形以及三角形中位线定理，是中考几何综合题的高频考点。"
  key_insights:
    - "性质用来'已知是平行四边形→得到边角关系'，判定用来'已知边角关系→证明是平行四边形'，方向不能混"
    - "对角线互相平分是平行四边形独有的对角线性质，矩形再加相等，菱形再加垂直"
    - "特殊四边形是层层加条件：平行四边形+直角=矩形，+邻边相等=菱形，两者都有=正方形"
    - "三角形中位线把'中点'与'平行且一半'绑定，是处理中点问题的首选工具"
  common_mistakes:
    - mistake: "把面积公式里的高当成斜边"
      example: "平行四边形底为 5、斜边为 4，错算面积 = 5×4 = 20"
      why: "学生看到一条边就拿来乘，没区分'高'是垂直距离"
      how_to_explain: "高一定是从一条边向对边作的垂线段，要和底边垂直。斜边不垂直，不能直接当高用。"

    - mistake: "误以为对角线相等就是平行四边形"
      example: "看到两条对角线相等就判定为平行四边形"
      why: "混淆了'互相平分'和'相等'两个不同条件"
      how_to_explain: "判定要的是对角线互相平分（各自被中点分成两半）。相等是矩形的额外性质，不是平行四边形的判定。"

    - mistake: "中位线定理用反，把第三边算成中位线的一半"
      example: "中位线 DE=6，错算 BC=3"
      why: "记不清谁是谁的一半"
      how_to_explain: "中位线短，第三边长。中位线 = 第三边 ÷ 2，所以第三边 = 中位线 × 2。DE=6 则 BC=12。"
  alternate_explanations:
    - method: "全等三角形拆分法"
      when_to_use: "学生不理解为什么对边相等、对角线平分时"
      prompt: "连一条对角线，把平行四边形分成两个三角形。用'两直线平行内错角相等'加公共边，证两三角形全等，对边、对角的相等就自然出来了。"

    - method: "千斤顶/伸缩门动态模型"
      when_to_use: "学生想直观理解平行四边形为什么易变形、对边为什么始终相等时"
      prompt: "想象用四根硬棒铰接成的框架。无论你怎么压扁它，对边的两根棒长度始终没变，所以对边永远相等；而角度可以随便变，这就是它'不稳定'的原因。"

  question_templates:
    difficulty_1_2: "出 2 道直接用对边相等、对角互补或对角线平分求边角的计算题"
    difficulty_3: "出 1 道辨析判定方法或特殊四边形性质的选择/计算题"
    difficulty_4: "出 1 道需要写证明过程的综合题，结合中位线或全等"

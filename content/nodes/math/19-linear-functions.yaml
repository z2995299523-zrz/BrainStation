slug: linear-functions
subject: math
title: "一次函数"
tier: core
difficulty: 3
prerequisites: ["coordinate-plane", "linear-equation"]
estimated_min: 30

trigger:
  type: story
  title: "出租车计价器里藏着的那条直线"
  content:
    text: |
      你打车时有没有注意过：一上车，计价器就跳到 13 元——还没走呢！
      然后每公里再加 2.3 元。这就是一个不折不扣的一次函数。
      车费 $y$ 和里程 $x$ 的关系是 $y = 2.3x + 13$。
      那个固定的 13 元叫"起步价"，在函数里就是直线和 $y$ 轴的交点；
      每公里 2.3 元叫"单价"，在函数里就是直线的"陡峭程度"，也就是斜率。
      整个世界里大量"匀速增长"的关系——水费、电费、工资、弹簧伸长——都是直线。
      看懂一次函数，你就看懂了生活里最常见的一种变化规律。
    question: "如果两家出租车公司，一家起步价高但每公里便宜，另一家起步价低但每公里贵，坐多远之后哪家更划算？"

display:
  concept:
    summary: "一次函数形如 y=kx+b，图象是一条直线，k 决定倾斜方向，b 决定直线与 y 轴的交点。"
    sections:
      - title: "一、定义"
        content: |
          一般地，形如下式的函数叫做一次函数：

          $$y = kx + b \quad (k \neq 0)$$

          其中 $k$、$b$ 是常数。
          特别地，当 $b = 0$ 时，$y = kx$ 叫做正比例函数，它一定过原点。
          注意：$k$ 不能为 $0$，否则 $y = b$ 是一条水平线（常函数），不是一次函数。

      - title: "二、k 和 b 的几何意义"
        content: |
          $k$ 叫斜率，决定直线的倾斜方向和陡峭程度：
          - $k > 0$：直线从左下到右上，$y$ 随 $x$ 增大而增大
          - $k < 0$：直线从左上到右下，$y$ 随 $x$ 增大而减小
          - $|k|$ 越大，直线越陡

          $b$ 叫纵截距，是直线与 $y$ 轴交点的纵坐标，即点 $(0,\,b)$。

      - title: "三、图象与四个象限"
        content: |
          画一次函数只需两点：通常取与坐标轴的交点。
          - 与 $y$ 轴交点：令 $x = 0$，得 $(0,\,b)$
          - 与 $x$ 轴交点：令 $y = 0$，得 $\left(-\frac{b}{k},\,0\right)$

          根据 $k$、$b$ 的符号可判断图象经过哪些象限，例如 $k>0,\,b>0$ 时经过第一、二、三象限。

      - title: "四、用待定系数法求解析式"
        content: |
          已知图象上两个点，就能求出 $k$ 和 $b$：
          - 第 1 步：设 $y = kx + b$
          - 第 2 步：把两个点的坐标分别代入，得到关于 $k$、$b$ 的二元一次方程组
          - 第 3 步：解方程组求出 $k$、$b$
          - 第 4 步：写出解析式

          这一招叫"待定系数法"，是函数题最核心的求解套路。

      - title: "五、一次函数与方程、不等式"
        content: |
          一次函数把方程、不等式都"图象化"了：
          - 解方程 $kx + b = 0$，就是求直线与 $x$ 轴交点的横坐标
          - 解不等式 $kx + b > 0$，就是看直线在 $x$ 轴上方时 $x$ 的取值范围
          - 两条直线的交点坐标，就是对应二元一次方程组的解

  examples:
    - title: "待定系数法求解析式"
      problem: '已知一次函数图象经过点 $(1,\,3)$ 和 $(2,\,5)$，求它的解析式。'
      steps:
        - '第 1 步：设 $y = kx + b$。'
        - '第 2 步：代入两点：$3 = k + b$，$5 = 2k + b$。'
        - '第 3 步：两式相减：$5 - 3 = 2k - k$，得 $k = 2$。'
        - '第 4 步：代回 $3 = 2 + b$，得 $b = 1$。'
      answer: "y = 2x + 1"

    - title: "判断增减性与象限"
      problem: '函数 $y = -3x + 6$，判断 $y$ 随 $x$ 怎样变化，并求与坐标轴的交点。'
      steps:
        - '第 1 步：$k = -3 < 0$，所以 $y$ 随 $x$ 增大而减小。'
        - '第 2 步：令 $x = 0$，$y = 6$，与 $y$ 轴交于 $(0,\,6)$。'
        - '第 3 步：令 $y = 0$，$-3x + 6 = 0$，$x = 2$，与 $x$ 轴交于 $(2,\,0)$。'
      answer: "y随x增大而减小；交点(0,6)和(2,0)"

    - title: "实际应用：出租车计费"
      problem: '某出租车起步价 $13$ 元，之后每公里 $2.3$ 元。写出车费 $y$ 关于里程 $x$ 的函数，并求行驶 $10$ 公里的车费。'
      steps:
        - '第 1 步：固定起步价是 $b = 13$，每公里单价是 $k = 2.3$。'
        - '第 2 步：解析式为 $y = 2.3x + 13$。'
        - '第 3 步：代入 $x = 10$：$y = 2.3\times 10 + 13 = 23 + 13 = 36$。'
      answer: "y = 2.3x + 13；10公里36元"

  practice:
    - id: "linf-prac-001"
      stem: '判断 $y = 5x - 2$ 中，$y$ 随 $x$ 增大是增大还是减小？'
      answer: "增大"
      hints: ["看 k 的符号", "k=5>0 时 y 随 x 增大而增大"]

    - id: "linf-prac-002"
      stem: '一次函数 $y = -2x + 4$ 与 $x$ 轴的交点坐标是？'
      answer: "(2, 0)"
      hints: ["与 x 轴交点令 y=0", "解 -2x+4=0"]

    - id: "linf-prac-003"
      stem: '正比例函数 $y = kx$ 过点 $(2,\,-6)$，求 $k$。'
      answer: "-3"
      hints: ["把点代入 y=kx", "-6 = k×2"]

    - id: "linf-prac-004"
      stem: '一次函数图象过 $(0,\,3)$ 和 $(1,\,5)$，求解析式。'
      answer: "y = 2x + 3"
      hints: ["(0,3) 直接告诉你 b=3", "再用另一点求 k"]

    - id: "linf-prac-005"
      stem: '当 $x$ 取何值时，$y = 3x - 9$ 的函数值大于 $0$？'
      answer: "x > 3"
      hints: ["列不等式 3x-9>0", "解出 x 的范围"]

    - id: "linf-prac-006"
      stem: '直线 $y = x + 1$ 与 $y = -x + 5$ 的交点坐标是？'
      answer: "(2, 3)"
      hints: ["联立两个解析式", "令 x+1 = -x+5"]

  test:
    - id: "linf-test-001"
      stem: '下列是一次函数的是：A $y=2/x$  B $y=x^2+1$  C $y=3x-1$  D $y=5$'
      answer: "C"
      difficulty: 1
      layer: understand

    - id: "linf-test-002"
      stem: '一次函数 $y = 4x - 8$ 与 $y$ 轴交点的纵坐标是？'
      answer: "-8"
      difficulty: 1
      layer: operation

    - id: "linf-test-003"
      stem: '一次函数过 $(1,\,2)$ 和 $(3,\,8)$，求解析式。'
      answer: "y = 3x - 1"
      difficulty: 2
      layer: operation

    - id: "linf-test-004"
      stem: '若 $y = (k-1)x + 3$ 是一次函数，则 $k$ 需满足什么条件？'
      answer: "k≠1"
      difficulty: 2
      layer: understand

    - id: "linf-test-005"
      stem: '一次函数 $y = -2x + 6$ 不经过第几象限？'
      answer: "第三象限"
      difficulty: 3
      layer: connect

    - id: "linf-test-006"
      stem: '当 $x$ 取何值时，$y = -x + 4$ 的值不小于 $1$？'
      answer: "x ≤ 3"
      difficulty: 3
      layer: connect

    - id: "linf-test-007"
      stem: "甲公司起步价 10 元每公里 3 元，乙公司起步价 15 元每公里 2 元。行驶多少公里时两家收费相同？"
      answer: "5公里（10+3x=15+2x，x=5）"
      difficulty: 4
      layer: connect

    - id: "linf-test-008"
      stem: '已知直线 $y = kx + b$ 经过第一、二、四象限，判断 $k$ 与 $b$ 的符号。'
      answer: "k<0，b>0"
      difficulty: 4
      layer: connect

ai_context:
  topic_summary: "一次函数是初中代数从'方程'走向'函数'的关键一步。学生第一次系统地把代数式与图象、运动变化联系起来。k 和 b 的几何意义、待定系数法、以及函数与方程不等式的统一，是中考必考且贯穿后续二次函数学习的基础。"
  key_insights:
    - "k 控制方向和陡峭程度，b 控制直线在 y 轴上的高低，两者各管一件事"
    - "待定系数法的本质：有几个未知量就需要几个独立条件（点）来列方程组"
    - "一次函数把方程、不等式、方程组都翻译成了'直线的位置关系'"
    - "k≠0 是一次函数的硬性前提，k=0 退化成水平线就不是一次函数了"
  common_mistakes:
    - mistake: "把 k 的正负与图象的升降记反"
      example: "看到 k<0 还说 y 随 x 增大而增大"
      why: "死记口诀而没有结合图象方向"
      how_to_explain: "画一条从左下往右上的线，沿 x 正方向走它在上升，这就是 k>0；反之 k<0 是下坡。手势比一比就不会反。"

    - mistake: "求与 x 轴交点时把 x、y 弄反"
      example: "求 x 轴交点却令 x=0"
      why: "混淆了两条轴上点的坐标特征"
      how_to_explain: "x 轴上所有点的 y 都是 0，所以求与 x 轴交点要令 y=0；与 y 轴交点才令 x=0。"

    - mistake: "忽略 k≠0 的限制条件"
      example: "(k-1)x+3 是一次函数，漏掉 k≠1"
      why: "只关注式子形状，忘了一次项系数不能为零"
      how_to_explain: "一次函数必须有 x 的一次项，所以 x 前面的系数不能等于 0。让 k-1≠0，得 k≠1。"
  alternate_explanations:
    - method: "斜坡台阶模型"
      when_to_use: "学生难以理解斜率 k 的意义时"
      prompt: "把直线想成楼梯。x 每往右走 1 格，y 就上升 k 格。k 大楼梯就陡，k 是负数就是往下走的楼梯。"

    - method: "出租车/水电费实际情境"
      when_to_use: "学生觉得 y=kx+b 抽象、不知道有什么用时"
      prompt: "b 是不动也要交的固定费用（起步价、基础费），k 是用一份多花的钱（每公里、每度）。把题目翻译成花钱的故事，解析式就自己冒出来了。"

  question_templates:
    difficulty_1_2: "出 2 道判断一次函数、求截距或用待定系数法求解析式的基础题"
    difficulty_3: "出 1 道结合象限判断或增减性比较的分析题"
    difficulty_4: "出 1 道实际应用题，需建立函数模型并比较或求交点"

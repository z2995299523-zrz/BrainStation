slug: projection-views
subject: math
title: "投影与视图"
tier: core
difficulty: 2
prerequisites: ["basic-geometry"]
estimated_min: 25

trigger:
  type: story
  title: "工程师的通用语言：三张图造一台机器"
  content:
    text: |
      一台精密机器有上千个零件，设计师在中国，工厂在德国。
      他们语言不通，却能造出完全一致的零件。靠的是什么？
      不是文字，而是三张图：从正面看、从上面看、从左面看。
      这三个视图把一个立体物体的全部信息精确地"压平"成平面图纸，
      任何工程师都能照着它还原出三维实物。
      这套规则，就是工程界通行两百年的"投影与三视图"。
    question: "为什么只用三个方向的视图，就能完整描述一个立体图形，而不会产生歧义？"

display:
  concept:
    summary: "投影是光线照射物体在平面上形成的影子，三视图从正、侧、上三个方向把立体图形画成平面图。"
    sections:
      - title: "一、投影的分类"
        content: |
          投影：物体在光线照射下，在某个平面上留下的影子。

          按光线分两类：
          - 中心投影：光线从一个点出发（如灯泡、手电筒），影子会随距离放大或缩小
          - 平行投影：光线互相平行（如太阳光），同一物体影子大小不随位置剧烈变化

          其中，光线垂直于投影面的平行投影叫正投影——三视图就建立在正投影上。

      - title: "二、三视图是什么"
        content: |
          用三束互相垂直的正投影，从三个方向观察立体图形：
          - 主视图（正视图）：从正前方往后看得到的图
          - 左视图（侧视图）：从左边往右看得到的图
          - 俯视图：从正上方往下看得到的图

          三个视图各自反映物体的两个方向的尺寸，合起来就完整描述了立体图形。

      - title: "三、三视图的对应规律"
        content: |
          画三视图必须遵守口诀：
          $$\textbf{长对正，高平齐，宽相等}$$

          - 长对正：主视图与俯视图的长度对齐（左右方向一致）
          - 高平齐：主视图与左视图的高度对齐（上下方向一致）
          - 宽相等：俯视图与左视图的宽度相等（前后方向一致）

          摆放位置：俯视图在主视图正下方，左视图在主视图正右方。

      - title: "四、常见几何体的三视图"
        content: |
          - 圆柱：主视图和左视图都是矩形，俯视图是圆
          - 圆锥：主视图和左视图都是三角形，俯视图是带圆心的圆
          - 球：三个视图都是大小相同的圆
          - 正方体：三个视图都是相同的正方形
          - 长方体：三个视图都是矩形（尺寸可能不同）

          画图时看不见的轮廓线要画成虚线。

  examples:
    - title: "判断投影类型"
      problem: "太阳光下树的影子和路灯下人的影子，分别属于哪种投影？"
      steps:
        - "第 1 步：太阳距离极远，光线可看作互相平行，是平行投影"
        - "第 2 步：路灯是一个点光源，光线从一点发散，是中心投影"
      answer: "树影是平行投影，人影是中心投影"

    - title: "圆柱的三视图"
      problem: "一个竖直放置的圆柱，它的主视图、左视图、俯视图分别是什么形状？"
      steps:
        - "第 1 步：从正前方看，看到一个矩形（宽=直径，高=圆柱高）——主视图是矩形"
        - "第 2 步：从左边看，同样是矩形——左视图是矩形"
        - "第 3 步：从正上方往下看，看到一个圆——俯视图是圆"
      answer: "主视图矩形，左视图矩形，俯视图圆"

    - title: "运用对应规律"
      problem: '某长方体主视图长 $6$、高 $4$，俯视图长 $6$、宽 $3$。求左视图的长和高。'
      steps:
        - '第 1 步：高平齐——左视图的高等于主视图的高 $=4$'
        - '第 2 步：宽相等——左视图的宽（即图中的长）等于俯视图的宽 $=3$'
        - '第 3 步：所以左视图是宽 $3$、高 $4$ 的矩形'
      answer: "左视图为宽 3、高 4 的矩形"

  practice:
    - id: "proj-prac-001"
      stem: "太阳光形成的投影属于哪种投影？"
      answer: "平行投影"
      hints: ["太阳光线之间什么关系？", "光线互相平行"]

    - id: "proj-prac-002"
      stem: "三视图分别是从哪三个方向观察得到的？"
      answer: "正前方（主视图）、左侧（左视图）、正上方（俯视图）"
      hints: ["正、侧、上三个方向", "对应主视图、左视图、俯视图"]

    - id: "proj-prac-003"
      stem: "球的三视图都是什么形状？"
      answer: "三个大小相同的圆"
      hints: ["球从任何方向看都一样", "都是圆"]

    - id: "proj-prac-004"
      stem: "三视图的对应规律口诀是什么？"
      answer: "长对正、高平齐、宽相等"
      hints: ["主视图与俯视图对长", "主视图与左视图对高"]

    - id: "proj-prac-005"
      stem: "圆锥的俯视图是什么形状？"
      answer: "一个圆（中间带圆心，表示锥顶投影）"
      hints: ["从上往下看圆锥", "看到底面圆和顶点"]

    - id: "proj-prac-006"
      stem: "画三视图时，看不见的轮廓线应该画成什么线？"
      answer: "虚线"
      hints: ["能看见的画实线", "看不见的用虚线"]

    - id: "proj-prac-007"
      stem: "一个正方体的三视图各是什么形状？"
      answer: "三个完全相同的正方形"
      hints: ["正方体各方向尺寸相同", "都是正方形"]

  test:
    - id: "proj-test-001"
      stem: "路灯下人的影子属于哪种投影？"
      answer: "中心投影"
      difficulty: 1
      layer: understand

    - id: "proj-test-002"
      stem: "主视图是从哪个方向看物体得到的？"
      answer: "从正前方往后看"
      difficulty: 1
      layer: understand

    - id: "proj-test-003"
      stem: "圆柱竖直放置时，俯视图是什么形状？"
      answer: "圆"
      difficulty: 2
      layer: operation

    - id: "proj-test-004"
      stem: "三视图中，主视图与左视图之间满足哪条对应规律？"
      answer: "高平齐（高度对齐）"
      difficulty: 2
      layer: understand

    - id: "proj-test-005"
      stem: '某长方体主视图为长 $5$、高 $3$ 的矩形，左视图为宽 $2$、高 $3$ 的矩形，求该长方体的长、宽、高。'
      answer: "长 5、宽 2、高 3（主视图给出长 5 高 3，左视图的宽对应长方体的宽 2，高平齐验证高均为 3）"
      difficulty: 3
      layer: connect

    - id: "proj-test-006"
      stem: "一个几何体的三视图都是圆，它最可能是什么立体图形？"
      answer: "球"
      difficulty: 2
      layer: connect

    - id: "proj-test-007"
      stem: "为什么用三个视图就能完整确定一个立体图形，而少于三个往往不够？"
      answer: "一个物体有长、宽、高三个方向的尺寸，每个视图只反映其中两个方向。只看一个或两个视图会丢失某一方向信息，可能对应多个不同立体。三个视图分别从正、侧、上观察，覆盖了全部三个方向，互相补充，就能唯一确定形状。"
      difficulty: 4
      layer: understand

    - id: "proj-test-008"
      stem: "圆锥的主视图和左视图分别是什么形状？俯视图呢？"
      answer: "主视图和左视图都是等腰三角形，俯视图是一个带圆心的圆。"
      difficulty: 3
      layer: operation

ai_context:
  topic_summary: "投影是物体在光线下形成的影子，分中心投影（点光源）和平行投影（平行光线），三视图建立在正投影上。三视图从正前方、左侧、正上方观察得到主视图、左视图、俯视图，遵循长对正、高平齐、宽相等的对应规律，三个视图合起来能唯一确定立体图形。"
  key_insights:
    - "中心投影光线从一点发散，平行投影光线互相平行；三视图基于垂直投影面的正投影"
    - "主视图看正面、左视图看左侧、俯视图看顶面，各反映两个方向的尺寸"
    - "对应规律：长对正、高平齐、宽相等，俯视图在主视图正下方，左视图在正右方"
    - "三个视图分别覆盖长宽高三个方向，合起来才能无歧义地确定立体形状"
  common_mistakes:
    - mistake: "混淆中心投影与平行投影"
      example: "认为太阳光下的影子是中心投影"
      why: "没抓住光源是点还是平行光线这个判断标准"
      how_to_explain: "看光源：手电筒、灯泡是一个点，光线发散，是中心投影；太阳离我们极远，光线可看作平行，是平行投影。一个点发出还是一束平行光，是关键区别。"

    - mistake: "搞错俯视图与左视图的尺寸对应"
      example: "用主视图的长去定左视图的宽"
      why: "没掌握长对正、高平齐、宽相等的对应关系"
      how_to_explain: "牢记口诀：俯视图的宽（前后方向）等于左视图的宽，这叫宽相等；主视图和左视图高平齐。哪两个图对哪个量，靠口诀逐条对照，不要凭感觉。"

    - mistake: "画三视图时忽略虚线"
      example: "把物体内部看不见的轮廓也画成实线"
      why: "不清楚实线与虚线的区别"
      how_to_explain: "能直接看到的轮廓画实线，被挡住、看不见但确实存在的轮廓画虚线。比如带孔的物体，孔的边缘从某个方向看不见，就要用虚线表示。"
  alternate_explanations:
    - method: "拍照三个角度"
      when_to_use: "学生不理解三视图为何要三个方向时"
      prompt: "想象给一个物体拍照：只从正面拍一张，看不出它有多厚；再从侧面拍能看出厚度，从上面拍能看出俯视形状。三张照片合起来，就完整记录了物体的样子——这就是三视图。"

    - method: "影子游戏理解投影"
      when_to_use: "学生分不清中心投影和平行投影时"
      prompt: "晚上用手电筒照手，离墙越近影子越小、越远越大，影子会变形——这是中心投影。白天太阳照手，无论怎么动影子大小几乎不变——这是平行投影。"

  question_templates:
    difficulty_1_2: "出 2 道基础题，判断投影类型或说出某几何体某个视图的形状"
    difficulty_3: "出 1 道由部分视图推断立体尺寸或还原几何体的综合题"
    difficulty_4: "出 1 道解释性理解题，如为何需要三个视图、对应规律的成因"

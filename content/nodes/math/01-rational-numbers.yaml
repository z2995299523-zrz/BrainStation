slug: rational-numbers
subject: math
title: "有理数"
tier: core
difficulty: 1
prerequisites: []
estimated_min: 25

trigger:
  type: story
  title: "负数：一个被骂了 1000 年的天才想法"
  content:
    text: |
      公元 7 世纪，印度数学家婆罗摩笈多第一个认真对待了"负数"。
      他在书中写道："财产减去债务等于负数。"
      但欧洲人直到 17 世纪还拒绝负数。
      笛卡尔叫它"假数"。帕斯卡说："0 减去 4 等于 0。"
      今天你觉得 -5 很自然？因为你站在巨人的肩膀上。
    question: "为什么负数乘负数等于正数？你能想出一个生活中的例子吗？"

display:
  concept:
    summary: "有理数是能表示为两个整数之比的数。"
    sections:
      - title: "一、什么是有理数"
        content: |
          定义：有理数 = 能写成 $\frac{a}{b}$ 形式的数（$a$、$b$ 为整数，$b \neq 0$）

          包含：
          - 整数：$3 = \frac{3}{1}$
          - 分数：$\frac{1}{2}$
          - 有限小数：$0.5 = \frac{1}{2}$
          - 无限循环小数：$0.333\ldots = \frac{1}{3}$

          不包含（无理数）：
          - $\pi$（无限不循环）
          - $\sqrt{2}$（无限不循环）

      - title: "二、四则运算法则"
        content: |
          加法：同号相加，异号相减
          减法：$a - b = a + (-b)$
          乘法：同号得正，异号得负
          除法：除以一个数 = 乘以它的倒数

          $$(+) \times (+) = (+) \qquad (-) \times (-) = (+)$$
          $$(+) \times (-) = (-) \qquad (-) \times (+) = (-)$$

      - title: "三、绝对值"
        content: |
          定义：$|a|$ 表示数轴上 $a$ 到原点的距离。
          $|5| = 5$，$|-5| = 5$
          $|a| \geq 0$
          $|ab| = |a| \cdot |b|$

      - title: "四、为什么负负得正"
        content: |
          不是"规定"——可以严格证明：

          $$(-1) \times (1 - 1) = (-1) \times 0 = 0$$

          同时用分配律展开：
          $$(-1) \times (1 - 1) = (-1)\times 1 + (-1)\times(-1) = -1 + \text{正数}$$

          要得到 $0$，这个正数必须是 $1$！
          所以 $(-1) \times (-1) = 1$

          如果负负得负会怎样？数学体系会从地基崩塌——分配律失效。

  examples:
    - title: "同号相乘"
      problem: '计算 $(-3) \times (-4)$'
      steps:
        - '第 1 步：两个负数相乘，属于同号'
        - '第 2 步：同号得正——先算绝对值：$3 \times 4 = 12$'
        - '第 3 步：结果为正——答案：$12$'
      answer: "12"

    - title: "异号相除"
      problem: '计算 $(-6) \div 2$'
      steps:
        - '第 1 步：负数除以正数，属于异号'
        - '第 2 步：异号得负——先算绝对值：$6 \div 2 = 3$'
        - '第 3 步：结果为负——答案：$-3$'
      answer: "-3"

    - title: "绝对值的陷阱"
      problem: '计算 $|-3+5|$'
      steps:
        - '第 1 步：先算括号里面：$-3+5 = 2$'
        - '第 2 步：再取绝对值：$|2| = 2$'
        - '注意：绝对值不能拆开，$|a+b| \neq |a|+|b|$'
      answer: "2"

  practice:
    - id: "rat-prac-001"
      stem: '计算 $(-7) \times (-3)$'
      answer: "21"
      hints: ["先判断符号：同号还是异号？", "同号得正，再算绝对值"]

    - id: "rat-prac-002"
      stem: '计算 $(-12) \div 4$'
      answer: "-3"
      hints: ["负数除以正数，结果是正还是负？", "异号得负"]

    - id: "rat-prac-003"
      stem: '计算 $| -8 | + | 5 |$'
      answer: "13"
      hints: ["绝对值总是非负的", "|-8| = 8，|5| = 5"]

    - id: "rat-prac-004"
      stem: '$0.1010010001\ldots$ 是有理数吗？'
      answer: "不是，因为小数部分没有循环规律"
      hints: ["有理数的小数要么终止要么循环", "这个数的小数位有规律吗？"]

    - id: "rat-prac-005"
      stem: '计算 $(-2)^3$'
      answer: "-8"
      hints: ["(-2)³ 等于几个 (-2) 相乘？", "奇数次幂保持符号"]

  test:
    - id: "rat-test-001"
      stem: '计算 $(-5) \times (-6)$'
      answer: "30"
      difficulty: 1
      layer: operation

    - id: "rat-test-002"
      stem: '计算 $(-18) \div (-3)$'
      answer: "6"
      difficulty: 1
      layer: operation

    - id: "rat-test-003"
      stem: '计算 $(-2)^3 + |5-9| \times (-1)$'
      answer: "-12"
      difficulty: 3
      layer: operation

    - id: "rat-test-004"
      q_type: choice
      stem: "下列哪个数不是有理数？"
      options:
        - "A: 3"
        - "B: 1/3"
        - "C: 0.5"
        - "D: π"
      answer: "D"
      difficulty: 1
      layer: understand

    - id: "rat-test-005"
      stem: "小红说：22/7 = π，所以 π 是有理数。她说得对吗？"
      answer: "不对。22/7 只是 π 的近似值，π 是无限不循环小数。"
      difficulty: 3
      layer: understand

    - id: "rat-test-006"
      stem: "用分配律证明 (-1)×(-1)=1（写出关键步骤）"
      answer: "(-1)×(1-1) = (-1)×0 = 0；同时 = (-1)×1 + (-1)×(-1) = -1 + (-1)×(-1)。所以 (-1)×(-1) = 1。"
      difficulty: 4
      layer: connect

    - id: "rat-test-007"
      stem: '计算 $| -3 + 5 | - | -2 |$'
      answer: "0"
      difficulty: 2
      layer: operation

    - id: "rat-test-008"
      stem: "气温从 -5°C 上升到 3°C，上升了多少度？"
      answer: "8°C"
      difficulty: 2
      layer: connect

ai_context:
  topic_summary: "有理数是初中数学的基石。包括整数、分数、有限小数和无限循环小数。掌握有理数的四则运算和绝对值概念是后续所有代数学习的前提。"
  key_insights:
    - "有理数 = 能写成分数形式的数，这是最核心的判断标准"
    - "负负得正不是规定，可以用分配律严格证明"
    - "绝对值是距离概念，永远非负"
    - "运算顺序：括号→乘方→乘除→加减"
  common_mistakes:
    - mistake: "异号相除的符号搞反"
      example: "(-6) ÷ (-2) = -3"
      why: "学生只记住'异号得负'，忘了同号得正"
      how_to_explain: "口诀：同号得正，异号得负。(-6)和(-2)都是负数，属于同号！"

    - mistake: "认为绝对值可以拆开"
      example: "| -3 + 5 | 算成 | -3 | + | 5 | = 8"
      why: "绝对值不是乘法，不能分配"
      how_to_explain: "绝对值符号像括号——先算里面的，再取绝对值。| -3+5 | = |2| = 2"

    - mistake: "认为 π = 3.14 是有理数"
      example: "学生认为 π = 3.14 是有理数"
      why: "混淆了近似值和真实值"
      how_to_explain: "有理数的小数部分要么终止要么循环。π 的小数位永远没有规律。"
  alternate_explanations:
    - method: "数轴模型"
      when_to_use: "学生对正负号运算感到抽象时"
      prompt: "在数轴上画一条线。加法是向右（正）或向左（负）移动。3+(-5) = 从 3 向左走 5 步 = -2"

    - method: "温度计类比"
      when_to_use: "学生需要直观感受负数时"
      prompt: "把数轴想象成温度计。3°C 减去 -5°C = 8°C 温差。"

  question_templates:
    difficulty_1_2: "出 2 道直接的有理数四则运算题，数字简单，考察基本符号规则"
    difficulty_3: "出 1 道多步混合运算题，考察运算顺序和多重符号处理"
    difficulty_4: "出 1 道需要解释'为什么'的理解题"

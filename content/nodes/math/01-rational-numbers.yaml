slug: rational-numbers
subject: math
title: 有理数
tier: core
difficulty: 1
prerequisites: []
estimated_min: 25
trigger:
  type: story
  title: 负数：一个被骂了 1000 年的天才想法
  content:
    text: '公元 7 世纪，印度数学家婆罗摩笈多第一个认真对待了"负数"。

      他在书中写道："财产减去债务等于负数。"


      但欧洲人直到 17 世纪还拒绝负数。

      笛卡尔——就是发明坐标系的那个笛卡尔——叫它"假数"（false number）。

      帕斯卡说："0 减去 4 等于 0，因为没有什么比什么都没有更小了。"


      今天你觉得 -5 很自然？那是因为你站在巨人的肩膀上。

      '
    question: 为什么负数乘负数等于正数？你能想出一个生活中的例子来说明吗？
content:
  operation:
    text: '## 有理数：能写成分数形式的数


      **定义**：有理数 = 能表示为 a/b 的数（a、b 为整数，b≠0）


      **包含**：整数（3 = 3/1）、分数（1/2）、有限小数（0.5 = 1/2）、无限循环小数（0.333... = 1/3）


      **不包含**：π（无限不循环）、√2（无限不循环）


      **运算法则**：

      - 加法：同号相加，异号相减，取绝对值大的符号

      - 减法：a - b = a + (-b)，转化为加法

      - 乘法：同号得正，异号得负

      - 除法：除以一个数 = 乘以它的倒数


      **绝对值**：|a| 表示数轴上 a 到原点的距离。|−5| = 5，|3| = 3

      '
    examples:
    - input: (-3) + (-5)
      output: '-8'
      method: 同号相加：3+5=8，取负号
    - input: (-3) × (-4)
      output: '12'
      method: 同号得正
    - input: (-6) ÷ 2
      output: '-3'
      method: 异号得负
  understand:
    text: '## 为什么负负得正？


      不是"规定"——可以严格证明：


      (-1) × (1 - 1) = (-1) × 0 = 0


      同时：

      (-1) × (1 - 1) = (-1)×1 + (-1)×(-1) = -1 + 正数


      要得到 0，这个正数必须是 1！


      所以 (-1) × (-1) = 1，推广即得"负负得正"。


      **如果负负得负会怎样？**

      数学大厦会从地基崩塌——分配律失效，方程可能无解也可能无穷多解。

      '
    highlights:
    - 负负得正不是规定，是可以证明的
    - 如果负负得负，整个数学体系会崩塌
    - 你手机里的 GPS 定位依赖负数运算
  connect:
    text: '## 负数在真实世界中无处不在


      - 温度：-5°C 比 0°C 冷

      - 银行账户：-200 元 = 欠款 200 元

      - 海拔：死海海拔 -430 米

      - 物理：电荷的正负、速度的方向

      - 游戏：血条减少显示为负值


      没有负数，你连"后退一步"都没法描述。


      **更深一层**：数学中还有"虚数"——负数的平方根。

      虽然叫"虚"，但交流电、量子力学、信号处理都离不开它。

      "假数"在 100 年后成了真数学。

      '
    thought_seeds:
    - 虚数 i² = -1——比负数更"假"但更强大
    - 交流电用复数表示——没有虚数就没有现代电网
    - 数学中"假"的概念最终往往变成真工具
feynman:
  base_prompt: 用你自己的话解释：什么是有理数？负负得正为什么是对的（不是背规则）？
  key_elements:
  - 能写成分数形式
  - 包含整数和分数
  - 负负得正可以从分配律证明
  - 现实生活中负数很有用
  deep_questions:
  - 如果让你说服一个不相信负数的小学生，你第一句话说什么？
  - 你觉得古人为什么拒绝负数？如果你活在 1600 年，你会相信负数吗？
  missing_hints:
    能写成分数形式: 有理数的定义是什么？能写成什么形式？
    包含整数和分数: 整数和分数都属于有理数吗？举个例子。
    负负得正可以从分配律证明: (-1)×(1-1) 用两种方式算，能得到什么？
    现实生活中负数很有用: 除了欠钱，生活中还有哪里用负数？
thought_card: 今天学到的哪一点最让你意外？为什么？

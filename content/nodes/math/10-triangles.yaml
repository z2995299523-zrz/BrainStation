slug: triangles
subject: math
title: 三角形
tier: core
difficulty: 2
prerequisites:
  - intersecting-parallel-lines
estimated_min: 30
trigger:
  type: story
  title: 最稳定的形状——为什么到处都是三角形
  content:
    text: "看看你的周围：\n- 自行车车架 → 三角形\n- 屋顶桁架 → 三角形\n- 桥梁支撑 → 三角形\n- 埃菲尔铁塔 → 数千个三角形\n\n为什么不是四边形？因为三角形有一个独特的性质：\n三条边长度确定后，三角形的形状就唯一确定了——它不会变形。\n\n这叫\"三角形的稳定性\"，是结构工程中最基本的原理。\n四边形呢？你推一下门框——它会歪。但三角形不会。\n\n三角形也是所有多边形的基础——任何多边形都可以分割成三角形。\n这就是为什么三角形的内角和、面积、边角关系是几何的核心。\n"
    question: 拿三根筷子，试着拼一个三角形。你能拼出两个形状不同的三角形吗？
display:
  concept:
    summary: 三角形是最基本的多边形，分为按角分类（锐角/直角/钝角）和按边分类（等边/等腰/不等边）。本章学习三角形的基本性质：内角和、三边关系、重要线段（中线/角平分线/高线）。
    sections:
      - title: 一、三角形的分类
        content: "**按角分类**：\n| 类型 | 特征 |\n|------|------|\n| 锐角三角形 | 三个角都 < 90° |\n| 直角三角形 | 一个角 = 90° |\n| 钝角三角形 | 一个角 > 90° |\n\n**按边分类**：\n| 类型 | 特征 |\n|------|------|\n| 不等边三角形 | 三条边都不相等 |\n| 等腰三角形 | 至少两条边相等 |\n| 等边三角形 | 三条边都相等（特殊的等腰） |\n"
      - title: 二、三角形内角和
        content: "**三角形内角和 = 180°**\n\n证明：过三角形一个顶点作对边的平行线\n```\n     A\n    / \\\n   /   \\\n  /     \\\n B───────C\n```\n过 A 作 BC 的平行线 → 内错角相等 → 三个角拼成一个平角 = 180°\n\n推论：\n- 直角三角形两锐角互余（和 = 90°）\n- 等边三角形每个角 = 60°\n"
      - title: 三、三边关系（两边之和大于第三边）
        content: "**定理**：三角形任意两边之和大于第三边。\n\n即：$a + b > c$，$b + c > a$，$a + c > b$\n\n**逆用**：三条线段能构成三角形的条件 →\n最短两边之和 > 最长边。\n\n例如：3 cm、4 cm、5 cm？→ 3 + 4 = 7 > 5 → 可以！\n1 cm、2 cm、4 cm？→ 1 + 2 = 3 < 4 → 不可以！\n"
      - title: 四、三角形的重要线段
        content: "| 线段 | 定义 | 交点（三线共点） |\n|------|------|------------------|\n| 中线 | 顶点到对边中点的连线 | 重心 |\n| 角平分线 | 将角分成两等份的线段 | 内心（内切圆圆心）|\n| 高线 | 顶点到对边的垂线段 | 垂心 |\n\n关键事实：\n- 三条中线交于一点（重心）——重心分每条中线为 2:1\n- 三条角平分线交于一点（内心）\n- 三条高线交于一点（垂心）——钝角三角形中垂心在三角形外部\n"
      - title: 五、三角形的外角
        content: "**外角定理**：三角形的一个外角 = 与它不相邻的两个内角之和。\n\n例如：外角 ∠ACD = ∠A + ∠B\n\n这直接推出：三角形外角和 = 360°\n"
  examples:
    - title: 判断能否构成三角形
      problem: 三条线段长分别为 5 cm、7 cm、11 cm，能构成三角形吗？
      steps:
        - 第 1 步：找最短两边——5 和 7
        - 第 2 步：最短两边之和 = 5 + 7 = 12
        - 第 3 步：12 > 11（最长边）→ 能构成
      answer: 能（5+7=12 > 11）
    - title: 三角形内角和求角
      problem: △ABC 中，∠A = 50°，∠B = 65°。求 ∠C。
      steps:
        - ∠A + ∠B + ∠C = 180°
        - 50° + 65° + ∠C = 180°
        - ∠C = 180° - 115° = 65°
      answer: ∠C = 65°（等腰三角形——∠B = ∠C = 65°）
    - title: 外角定理求角
      problem: △ABC 中，∠A = 40°，外角 ∠ACD = 110°。求 ∠B。
      steps:
        - 外角 = 不相邻两内角之和 → ∠ACD = ∠A + ∠B
        - 110° = 40° + ∠B → ∠B = 70°
      answer: ∠B = 70°
  practice:
    - id: tri-prac-001
      stem: 三角形三个角分别是 60°、60°、60°，这是什么三角形？
      answer: 等边三角形（三个角都是 60°，三边相等）
      hints:
        - 三个角相等 → 三条边也相等
        - 等边三角形也是等角三角形
    - id: tri-prac-002
      stem: 2 cm、3 cm、6 cm 能构成三角形吗？
      answer: 不能。2 + 3 = 5 < 6——最短两边之和小于最长边。
      hints:
        - 比较最短两边之和与最长边
        - 2 + 3 = 5，而 5 < 6
    - id: tri-prac-003
      stem: 直角三角形中一个锐角是 35°，另一个锐角是多少？
      answer: 55°（两锐角互余：90° - 35° = 55°）
      hints:
        - 直角三角形中两锐角互余
        - 互余 = 和为 90°
    - id: tri-prac-004
      stem: 一个三角形可以有两个直角吗？为什么？
      answer: 不可以。两直角加起来 = 180°，第三个角只能是 0°，不存在。
      hints:
        - 三个角加起来是 180°
        - 两个直角 = ?
    - id: tri-prac-005
      stem: 判断：三角形的高一定在三角形内部。
      answer: 错。钝角三角形中，从钝角顶点作的高在三角形外部。
      hints:
        - 画一个钝角三角形试试
        - 从钝角顶点向对边作垂线——垂足在对边延长线上
  test:
    - id: tri-test-001
      stem: △ABC 中，∠A = 72°，∠B = 36°。∠C = ?
      answer: 72°
      difficulty: 1
      layer: operation
    - id: tri-test-002
      stem: 下列哪组线段能构成三角形？
      answer: B
      difficulty: 1
      layer: operation
      q_type: choice
      options:
        - A. 1,2,3
        - B. 2,3,4
        - C. 3,4,8
        - D. 1,3,5
    - id: tri-test-003
      stem: 等腰三角形中顶角为 80°，底角各为多少度？
      answer: 50°（(180° - 80°) ÷ 2 = 50°）
      difficulty: 2
      layer: operation
    - id: tri-test-004
      stem: 三角形外角和是多少度？为什么？
      answer: 360°。每个外角=180°-内角，三个外角和=(180-A)+(180-B)+(180-C)=540-(A+B+C)=540-180=360°。
      difficulty: 3
      layer: understand
    - id: tri-test-005
      stem: 一个三角形的两边长分别是 3 和 7，求第三边 x 的取值范围。
      answer: 4 < x < 10。由三边关系：3+7 > x → x < 10；3+x > 7 → x > 4；7+x > 3（自动满足）。
      difficulty: 3
      layer: understand
    - id: tri-test-006
      stem: 如果三角形一个内角是另外两个内角之和，这是什么三角形？
      answer: 直角三角形。设 ∠A = ∠B + ∠C，又 ∠A + ∠B + ∠C = 180° → 2∠A = 180° → ∠A = 90°。
      difficulty: 3
      layer: connect
    - id: tri-test-007
      stem: D 是 BC 中点（BD = DC）。证明 △ABD 和 △ADC 不一定全等。
      answer: 只有 AD 是共同边，BD = DC，但没有角相等。如果 D 不是 BC 中点的同时 AD 也不平分 ∠A，两个三角形不全等。这说明了为什么中线分成的两个三角形面积相等但形状可以不相等。
      difficulty: 4
      layer: connect
    - id: tri-test-008
      stem: 用牙签拼三角形——准备 3 cm、4 cm、5 cm 三段。测量最大角。它和 90° 有什么关系？
      answer: 3² + 4² = 9 + 16 = 25 = 5²——这是勾股定理（直角三角形的判定）。最大角 = 90°（直角）。这组数叫勾股数。
      difficulty: 3
      layer: connect
ai_context:
  topic_summary: 三角形是平面几何的核心图形。本章涵盖：按角分类（锐角/直角/钝角）和按边分类（等边/等腰/不等边）、内角和定理（180°）及其证明、三边关系（任意两边之和大于第三边）、三条重要线段（中线/高线/角平分线）的定义和共点性质、外角定理（外角=不相邻两内角之和）。三角形是所有多边形的基础——任何多边形都可以划分成三角形。
  key_insights:
    - 三角形内角和 = 180° 可以用平行线性质严格证明——这是演绎推理的经典例子
    - 两边之和大于第三边是'最短路径'原理的几何表达——两点之间线段最短
    - 三角形稳定性的本质：三边确定后形状唯一确定（SSS 全等），这是结构工程的基石
    - 外角定理可以直接从'内角和=180°'和'平角=180°'推出——外角=180°-内角=其他两内角之和
  common_mistakes:
    - mistake: 忽略三角形内角和条件
      example: 学生画三角形三个角分别是 80°、70°、50°（和为 200°>180°）
      why: 随意写角度，不检验是否满足 180°
      how_to_explain: 三个角的和永远是 180°——这是铁的法则。画的三角形如果不满足这一点，在现实世界不存在。
    - mistake: 判断三边关系只看一条不等式
      example: 只验证 a+b>c 就认为能构成三角形
      why: 三条不等式都要满足——虽然如果 a+b>c（且 c 是最长边），另外两条自动满足
      how_to_explain: 最短两边之和 > 最长边——这一条就够了（最严格的一条）。但最保险的方法是排序后验证。
    - mistake: 认为高线一定在三角形内部
      example: 画钝角三角形的高——发现高在三角形外面时感到困惑
      why: 学生对'高'的概念停留在锐角三角形
      how_to_explain: 高线 = 顶点到对边的垂线段。对钝角顶点，对边在顶点'下方很远'——垂足在对边的延长线上。这不是例外，是定义的自然结果。
  alternate_explanations:
    - method: 撕角拼凑法（内角和证明）
      when_to_use: 学生不相信内角和一定是 180°
      prompt: 拿一张纸，画一个三角形，把三个角撕下来（或剪下来），然后把三个角的顶点拼在一起——你会发现它们刚好组成一个平角（180°）。这个小小的动手实验比任何证明都更让人信服。
    - method: 建筑类比法（稳定性）
      when_to_use: 学生不理解为什么三角形稳定而四边形不稳定
      prompt: 想想工地上的脚手架——对角线需要加斜撑才能稳固。加了斜撑后，四边形被分成了两个三角形。三角形不需要任何额外支撑——三条边一确定，形状就锁死了。这就是为什么自行车车架是三角形的。
  question_templates:
    difficulty_1_2: 出 2 道基本角计算题：已知两角求第三角，或判断三线段能否构成三角形
    difficulty_3: 出 1 道含未知数的角计算：内角用代数式表示，利用内角和=180°列方程
    difficulty_4: 出 1 道证明/推理题：利用外角定理或内角和画辅助线推导角的等量关系

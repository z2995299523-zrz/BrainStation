slug: systems-linear-equations
subject: math
title: "二元一次方程组"
tier: core
difficulty: 2
prerequisites: ["linear-equation"]
estimated_min: 25

trigger:
  type: story
  title: "两个未知数，一个答案——从鸡兔同笼说起"
  content:
    text: |
      1500 年前的《孙子算经》里有道名题：

      "今有雉兔同笼，上有三十五头，下有九十四足，问雉兔各几何？"

      翻译：鸡和兔子关在一个笼子里，35 个头，94 只脚。几只鸡？几只兔子？

      古人用"抬脚法"解开——让每只动物抬起一只脚……非常巧妙。
      但如果你学会列方程组：

      x + y = 35
      2x + 4y = 94

      两行方程，两个未知数，代入消元——10 秒出答案。

      方程组的力量在于：它允许你同时用多个条件来锁定唯一的解。
      这就像从两个不同的角度拍摄同一个物体——两张照片合在一起，
      就能精确还原它的三维位置。
    question: "如果没有方程组，只用一元一次方程，怎么解鸡兔同笼？哪种方法更简洁？"

display:
  concept:
    summary: "二元一次方程组由两个含有两个未知数的一次方程组成。本章学习两种核心解法：代入消元法和加减消元法，以及用方程组解决实际问题。"
    sections:
      - title: "一、什么是二元一次方程组"
        content: |
          **定义**：由两个一次方程组成，含有两个未知数。

          一般形式：
          $$\begin{cases} a_1x + b_1y = c_1 \\ a_2x + b_2y = c_2 \end{cases}$$

          **解**：同时满足两个方程的一对 (x, y) 值。

          解的几何意义：两条直线的交点坐标。

          解的三种情况：
          - 唯一解（两条直线相交于一点）
          - 无解（两条直线平行，无交点）
          - 无穷多解（两条直线重合）

      - title: "二、代入消元法"
        content: |
          **核心思路**：从一个方程解出一个变量，代入另一个方程 → 化为一元一次方程。

          步骤：
          1. 选一个变量（系数为 1 的最好）
          2. 移项，得到 y = ... （或 x = ...）
          3. 代入另一个方程，消去这个变量
          4. 解一元一次方程
          5. 代回，求另一个变量

          例如：
          $$\begin{cases} x + y = 10 \\ 2x - y = 5 \end{cases}$$
          由①：y = 10 - x
          代入②：2x - (10 - x) = 5 → 3x - 10 = 5 → 3x = 15 → x = 5
          代回：y = 10 - 5 = 5
          解为 (5, 5)

      - title: "三、加减消元法"
        content: |
          **核心思路**：让两个方程中某个变量的系数互为相反数 → 相加消去该变量。

          步骤：
          1. 对齐两个方程（同名变量对齐）
          2. 必要时给方程两边同乘一个数，使某个变量的系数相等或相反
          3. 相加（系数相反）或相减（系数相等）消去该变量
          4. 解得出的一元一次方程

          例如：
          $$\begin{cases} 2x + 3y = 8 \\ 2x - y = 0 \end{cases}$$
          ① - ②：(2x+3y) - (2x-y) = 8 - 0 → 4y = 8 → y = 2
          代入②：2x - 2 = 0 → x = 1
          解为 (1, 2)

      - title: "四、选择策略"
        content: |
          | 情况 | 推荐方法 | 原因 |
          |------|----------|------|
          | 某变量系数为 1 | 代入法 | 移项简单 |
          | 两方程某变量系数相同 | 加减法（相减） | 直接消元 |
          | 两方程某变量系数相反 | 加减法（相加） | 直接消元 |
          | 系数都不一样 | 加减法（先配系数） | 避免分数运算 |

  examples:
    - title: "鸡兔同笼（现实应用题）"
      problem: "鸡兔同笼，35 个头，94 只脚。鸡和兔各几只？"
      steps:
        - "第 1 步：设鸡 x 只，兔 y 只。头数：x + y = 35"
        - "第 2 步：脚数：鸡 2 只脚，兔 4 只脚 → 2x + 4y = 94"
        - "第 3 步：代入法——由①得 x = 35 - y，代入② → 2(35-y) + 4y = 94"
        - "第 4 步：70 - 2y + 4y = 94 → 2y = 24 → y = 12，x = 23"
      answer: "鸡 23 只，兔 12 只"

    - title: "加减消元法"
      problem: "解方程组：3x + 2y = 7, 5x - 2y = 1"
      steps:
        - "第 1 步：y 的系数 +2 和 -2——互为相反数"
        - "第 2 步：① + ②：(3x+2y)+(5x-2y) = 7+1 → 8x = 8 → x = 1"
        - "第 3 步：代回①：3(1)+2y = 7 → 2y = 4 → y = 2"
      answer: "x = 1, y = 2"

    - title: "先配系数再消元"
      problem: "解方程组：2x + 3y = 11, 3x + 2y = 9"
      steps:
        - "第 1 步：两个变量的系数都不相同或相反——先配系数"
        - "第 2 步：消 x——①×3: 6x+9y=33，②×2: 6x+4y=18"
        - "第 3 步：相减：(6x+9y)-(6x+4y) = 33-18 → 5y = 15 → y = 3"
        - "第 4 步：代回①：2x+9 = 11 → x = 1"
      answer: "x = 1, y = 3"

  practice:
    - id: "sys-prac-001"
      stem: "解方程组：x + y = 8, x - y = 2"
      answer: "x = 5, y = 3"
      hints: ["用加减法——两式相加可消去 y", "或代入法——由①得 x = 8-y"]

    - id: "sys-prac-002"
      stem: "解方程组：y = 2x - 1, 3x + y = 14"
      answer: "x = 3, y = 5"
      hints: ["第一个方程已经把 y 写成了 x 的表达式", "直接代入第二个方程"]

    - id: "sys-prac-003"
      stem: "2x + y = 7, 4x - y = 5。y 的系数互为相反数，最适合用什么方法？"
      answer: "加减消元法——两式相加即可消去 y"
      hints: ["y 的系数分别是 +1 和 -1", "相加后 y 就消失了"]

    - id: "sys-prac-004"
      stem: "甲买了 2 支笔和 3 个本子花了 12 元，乙买了 3 支笔和 2 个本子花了 13 元。设笔单价 x 元，本子单价 y 元，列出方程组。"
      answer: "2x + 3y = 12, 3x + 2y = 13"
      hints: ["甲的购买：2 笔 + 3 本 = 12 元", "乙的购买：3 笔 + 2 本 = 13 元"]

    - id: "sys-prac-005"
      stem: "解你在上面列出的方程组，笔和本子各多少钱？"
      answer: "x = 3（笔 3 元）, y = 2（本子 2 元）"
      hints: ["用加减法：①×3 - ②×2 可消去 x", "或者消 y：①×2 - ②×3"]

  test:
    - id: "sys-test-001"
      stem: "解方程组：x + y = 10, x - y = 4"
      answer: "x = 7, y = 3"
      difficulty: 1
      layer: operation

    - id: "sys-test-002"
      stem: "解方程组：y = 3x, 2x + y = 15"
      answer: "x = 3, y = 9"
      difficulty: 1
      layer: operation

    - id: "sys-test-003"
      stem: "解方程组：3x - 2y = 1, 2x + 3y = 18"
      answer: "x = 3, y = 4"
      difficulty: 2
      layer: operation

    - id: "sys-test-004"
      stem: "两个数的和是 20，差是 4。这两个数各是多少？"
      answer: "12 和 8。设 x+y=20, x-y=4 → x=12, y=8"
      difficulty: 2
      layer: operation

    - id: "sys-test-005"
      stem: "方程组 2x - y = 5, 4x - 2y = 7 有解吗？为什么？"
      answer: "无解。将第一个方程 ×2 得 4x-2y=10，与第二个方程 4x-2y=7 矛盾（等式左边相同但右边不等）。几何上：两条直线平行但不重合。"
      difficulty: 3
      layer: understand

    - id: "sys-test-006"
      stem: "若方程组 x + 2y = m, 3x - y = n 的解是 (2, 3)，求 m 和 n。"
      answer: "代入 (2,3)：m = 2+2×3 = 8, n = 3×2-3 = 3"
      difficulty: 2
      layer: operation

    - id: "sys-test-007"
      stem: "一个两位数，十位数字与个位数字之和为 12，交换十位和个位后所得新数比原数大 36。求原数。"
      answer: "设十位数字 x，个位 y。x+y=12；(10y+x)-(10x+y)=36 → 9y-9x=36 → y-x=4。解方程组 → x=4, y=8。原数=48。"
      difficulty: 4
      layer: connect

    - id: "sys-test-008"
      stem: "代入法和加减法本质上是一样的吗？从'消元'的角度解释。"
      answer: "本质上都是消元。代入法是将一个变量用另一个表示后消去一个变量，加减法是通过乘系数后相加消去一个变量。它们的目标都是将二元方程组转化为一元一次方程。在一些问题中两种方法等价。"
      difficulty: 3
      layer: connect

ai_context:
  topic_summary: "二元一次方程组是解含有两个未知数问题的标准工具。核心内容：代入消元法（从一个方程解出一个变量代入另一个）、加减消元法（配系数后相加/减消去一个变量）、根据系数特点选择合适解法。解的几何意义：两条直线的交点。解的情况分三种：唯一解（相交）、无解（平行）、无穷多解（重合）。"
  key_insights:
    - "消元是核心思想——二元化一元，复杂化简单——这是数学最基本的策略"
    - "代入法和加减法本质相同，选择取决于系数——系数为 1 用代入，系数相等/相反用加减"
    - "检验解的正确性：将 (x,y) 代回两个原方程，都要满足"
    - "方程组有无穷多解时，两个方程实际上是同一个方程的变形——可以约化"
  common_mistakes:
    - mistake: "代入时忘记变号"
      example: "由 x + y = 10 得 y = 10 + x（应为 y = 10 - x）"
      why: "移项时忘记符号变化"
      how_to_explain: "移项 = 等式两边同时减去那个数。x + y = 10 → x + y - x = 10 - x → y = 10 - x。不是'移过去'——是'减过去'。"

    - mistake: "加减法消元时只加左边不加右边"
      example: "3x+2y+5x-2y = 7+1 → 学生只算左边忘了右边"
      why: "忘记等式的基本性质：等式两边必须同时加同一个数"
      how_to_explain: "① + ② 意味着把两个等式的左边加起来，右边也加起来。左边加左边 = 右边加右边。不能只加一边。"

    - mistake: "忘记检验解"
      example: "解出 x=1, y=2 代回原方程发现不满足"
      why: "计算过程中某步出错但没发现"
      how_to_explain: "养成习惯——解出 (x,y) 后花 10 秒代回检验。这是一种'免费'的保险。"
  alternate_explanations:
    - method: "天平法"
      when_to_use: "学生对消元法不理解其合理性"
      prompt: "想象两个天平。天平 1：左边有 2 个苹果和 3 个橘子，右边有 8 个砝码。天平 2：左边有 2 个苹果和 1 个橘子，右边有 4 个砝码。把天平 1 减去天平 2——苹果抵消了，只剩橘子——求出橘子重，再回去求苹果重。这就是加减消元。"

    - method: "几何图像法"
      when_to_use: "学生对'无解'和'无穷多解'感到困惑"
      prompt: "在坐标纸上画两条直线。相交→唯一解（绝大多数情况）。平行但不重合→无解（矛盾方程）。完全重合→无穷多解（两个方程本质上是一个）。画图比抽象思考直观 10 倍。"

  question_templates:
    difficulty_1_2: "出 2 道基础解方程组题（系数简单，适合直接代入或加减）"
    difficulty_3: "出 1 道应用题：需要先设未知数、列出方程组再求解（如购物问题、行程问题）"
    difficulty_4: "出 1 道含参题：方程组的解满足某条件，反求参数的值"

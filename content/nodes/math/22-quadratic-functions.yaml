slug: quadratic-functions
subject: math
title: "二次函数"
tier: core
difficulty: 4
prerequisites: ["linear-functions", "quadratic-equations"]
estimated_min: 35

trigger:
  type: story
  title: "篮球出手的那一刻，命运已经写好"
  content:
    text: |
      当球员把篮球投向篮筐，球离手的瞬间，它的整条飞行轨迹就已经被决定了。
      那条优美的弧线不是圆，也不是直线——而是一条抛物线，二次函数的图象。
      物理学家发现，任何被抛出的物体，在重力作用下都沿抛物线飞行。
      喷泉的水柱、彩虹桥的拱、卫星天线的截面，全都是抛物线。
      二次函数的顶点，就是篮球飞到的最高点；它的对称轴，把整条弧线分成完美对称的两半。
      看懂 $y = ax^2 + bx + c$，你就能算出球什么时候到最高点、能不能进框。
    question: "为什么把同一个二次函数图象左右翻折，它和自己完全重合？这条对称轴在哪里？"

display:
  concept:
    summary: "二次函数 y=ax²+bx+c（a≠0）的图象是抛物线，a 决定开口方向和大小，顶点是最值点。"
    sections:
      - title: "一、定义与三种表达式"
        content: |
          形如下式的函数叫二次函数：

          $$y = ax^2 + bx + c \quad (a \neq 0)$$

          它有三种常用形式：
          - 一般式：$y = ax^2 + bx + c$
          - 顶点式：$y = a(x-h)^2 + k$，顶点为 $(h,\,k)$
          - 交点式：$y = a(x-x_1)(x-x_2)$，其中 $x_1$、$x_2$ 是与 $x$ 轴交点的横坐标

      - title: "二、a、b、c 的作用"
        content: |
          - $a$ 决定开口：$a > 0$ 开口向上（有最小值），$a < 0$ 开口向下（有最大值）；$|a|$ 越大开口越窄
          - $c$ 是图象与 $y$ 轴交点的纵坐标，即点 $(0,\,c)$
          - $a$、$b$ 共同决定对称轴位置：

          $$x = -\frac{b}{2a}$$

      - title: "三、顶点与对称轴"
        content: |
          抛物线关于直线 $x = -\dfrac{b}{2a}$ 对称，顶点坐标为：

          $$\left(-\frac{b}{2a},\ \frac{4ac - b^2}{4a}\right)$$

          顶点的纵坐标就是函数的最大值或最小值。
          实际题目里，把一般式配方成顶点式 $y = a(x-h)^2 + k$，顶点 $(h,\,k)$ 一眼就能看出。

      - title: "四、与 x 轴的交点"
        content: |
          令 $y = 0$，得到 $ax^2 + bx + c = 0$——又回到一元二次方程！
          所以交点情况由判别式 $\Delta = b^2 - 4ac$ 决定：
          - $\Delta > 0$：抛物线与 $x$ 轴有两个交点
          - $\Delta = 0$：只有一个交点（顶点在 $x$ 轴上）
          - $\Delta < 0$：没有交点

          这就是二次函数和一元二次方程的桥梁。

      - title: "五、最值与实际应用"
        content: |
          求最值就是求顶点纵坐标：
          - $a > 0$：函数有最小值，在顶点处取得
          - $a < 0$：函数有最大值，在顶点处取得

          利润最大、面积最大、投篮最高点……这类"最优化"问题，几乎都靠二次函数顶点解决。

  examples:
    - title: "配方求顶点"
      problem: '把 $y = x^2 - 4x + 1$ 配成顶点式，并写出顶点和对称轴。'
      steps:
        - '第 1 步：$y = (x^2 - 4x) + 1$。'
        - '第 2 步：配方，加减 $4$：$y = (x^2 - 4x + 4) - 4 + 1$。'
        - '第 3 步：$y = (x-2)^2 - 3$。'
        - '第 4 步：顶点 $(2,\,-3)$，对称轴 $x = 2$。'
      answer: "顶点(2,-3)，对称轴 x=2"

    - title: "用顶点公式直接求最值"
      problem: '求 $y = -2x^2 + 8x - 5$ 的最大值。'
      steps:
        - '第 1 步：$a = -2 < 0$，开口向下，有最大值。'
        - '第 2 步：对称轴 $x = -\frac{b}{2a} = -\frac{8}{2\times(-2)} = 2$。'
        - '第 3 步：把 $x = 2$ 代回：$y = -2\times 4 + 16 - 5 = 3$。'
      answer: "最大值为 3"

    - title: "求与 x 轴交点"
      problem: '求 $y = x^2 - 5x + 6$ 与 $x$ 轴的交点。'
      steps:
        - '第 1 步：令 $y = 0$，得 $x^2 - 5x + 6 = 0$。'
        - '第 2 步：因式分解 $(x-2)(x-3) = 0$。'
        - '第 3 步：$x = 2$ 或 $x = 3$。'
      answer: "交点(2,0)和(3,0)"

  practice:
    - id: "qfn-prac-001"
      stem: '二次函数 $y = 3x^2$ 的开口方向是？'
      answer: "向上"
      hints: ["看 a 的符号", "a=3>0 开口向上"]

    - id: "qfn-prac-002"
      stem: '求 $y = (x-1)^2 + 2$ 的顶点坐标。'
      answer: "(1, 2)"
      hints: ["顶点式 y=a(x-h)²+k", "顶点就是 (h,k)"]

    - id: "qfn-prac-003"
      stem: '求 $y = x^2 + 2x - 3$ 的对称轴。'
      answer: "x = -1"
      hints: ["用 x=-b/(2a)", "a=1, b=2"]

    - id: "qfn-prac-004"
      stem: '二次函数 $y = x^2 - 6x + 8$ 与 $x$ 轴交点的横坐标是？'
      answer: "2 和 4"
      hints: ["令 y=0 解方程", "x²-6x+8=0 分解"]

    - id: "qfn-prac-005"
      stem: '求 $y = x^2 - 4x + 5$ 的最小值。'
      answer: "1"
      hints: ["配方成 (x-2)²+1", "最小值就是顶点纵坐标"]

    - id: "qfn-prac-006"
      stem: '抛物线 $y = ax^2 + bx + c$ 与 $y$ 轴交点是 $(0,\,-4)$，则 $c$ 等于多少？'
      answer: "-4"
      hints: ["与 y 轴交点纵坐标就是 c", "令 x=0"]

    - id: "qfn-prac-007"
      stem: '判断 $y = x^2 + x + 1$ 与 $x$ 轴有几个交点。'
      answer: "0 个（Δ=1-4=-3<0）"
      hints: ["算判别式 b²-4ac", "Δ<0 时无交点"]

  test:
    - id: "qfn-test-001"
      stem: '二次函数 $y = -x^2 + 3$ 的开口方向和顶点是？'
      answer: "开口向下，顶点(0,3)"
      difficulty: 1
      layer: operation

    - id: "qfn-test-002"
      stem: '求 $y = 2(x+3)^2 - 1$ 的对称轴。'
      answer: "x = -3"
      difficulty: 1
      layer: operation

    - id: "qfn-test-003"
      stem: '把 $y = x^2 + 2x - 8$ 配成顶点式。'
      answer: "y = (x+1)² - 9"
      difficulty: 2
      layer: operation

    - id: "qfn-test-004"
      stem: '求 $y = -x^2 + 4x - 3$ 的最大值及取得最大值时的 x。'
      answer: "x=2 时取最大值 1"
      difficulty: 3
      layer: connect

    - id: "qfn-test-005"
      stem: '抛物线 $y = x^2 - 2mx + 4$ 与 $x$ 轴只有一个交点，求 $m$。'
      answer: "m=2 或 m=-2（Δ=4m²-16=0）"
      difficulty: 4
      layer: connect

    - id: "qfn-test-006"
      stem: "二次函数与一元二次方程有什么联系？请用'交点'来解释。"
      answer: "令 y=0 时二次函数变成一元二次方程，方程的根就是抛物线与 x 轴交点的横坐标。"
      difficulty: 3
      layer: understand

    - id: "qfn-test-007"
      stem: "某商品每件利润与降价 x 元的关系是 y=-x²+10x+200，问降价多少元利润最大，最大利润多少？"
      answer: "降价5元，最大利润225（顶点 x=5, y=225）"
      difficulty: 4
      layer: connect

    - id: "qfn-test-008"
      stem: '已知抛物线过 $(1,\,0)$、$(3,\,0)$、$(0,\,3)$，求其交点式解析式。'
      answer: "y = (x-1)(x-3)，验证(0,3)：(-1)(-3)=3 ✓"
      difficulty: 4
      layer: connect

ai_context:
  topic_summary: "二次函数是初中数学的最高峰，把代数（一元二次方程）与几何（抛物线图象）彻底融合。学生需要掌握三种表达式的互换、顶点与对称轴的求法、与坐标轴交点的分析，以及最优化实际应用。它是中考压轴题的绝对核心，也直接衔接高中函数。"
  key_insights:
    - "a 管开口（方向与胖瘦），c 管与 y 轴的交点，对称轴 x=-b/(2a) 由 a、b 共同决定"
    - "三种表达式各有所长：顶点式看最值最快，交点式看 x 轴交点最快，一般式最通用"
    - "令 y=0 就回到一元二次方程，判别式同时决定方程根数和抛物线与 x 轴交点数"
    - "一切'最大/最小'实际问题的答案都藏在顶点里，先建模再求顶点纵坐标"
  common_mistakes:
    - mistake: "配方时常数项加减不配平"
      example: "y=x²-4x+1 配成 (x-2)²+1，漏减 4"
      why: "只记得加上一次项系数一半的平方，忘了要同时减回来"
      how_to_explain: "你给括号里凭空加了 4，为了不改变原式，外面必须再减 4。配方是'加多少就减多少'，函数式不能用移项。"

    - mistake: "对称轴公式漏掉负号或除以 2a"
      example: "y=x²+2x 把对称轴写成 x=2"
      why: "记不全公式 x=-b/(2a)"
      how_to_explain: "对称轴是 x=-b/(2a)，三个要点：负号、b、分母 2a 都不能丢。a=1,b=2 时 x=-2/2=-1。"

    - mistake: "求最值时只算出 x 就当成答案"
      example: "求最大值，算出对称轴 x=2 就回答 2"
      why: "混淆了'在哪取最值'和'最值是多少'"
      how_to_explain: "对称轴的 x 只是告诉你在哪里取最值，最值本身是把这个 x 代回去算出的 y。要再走一步算 y。"
  alternate_explanations:
    - method: "平移变换法"
      when_to_use: "学生理解顶点式但不懂它和一般式关系时"
      prompt: "所有抛物线都是把 y=ax² 平移得到的。y=a(x-h)²+k 就是把基本抛物线向右移 h、向上移 k。顶点 (0,0) 跟着搬到 (h,k)。"

    - method: "投篮/喷泉轨迹模型"
      when_to_use: "学生觉得最值、对称轴抽象时"
      prompt: "把抛物线想成喷泉水柱。顶点是水到的最高点，对称轴是水柱左右对称的那条中线，与 x 轴的两个交点是水落地的两处。问题立刻变具体。"

  question_templates:
    difficulty_1_2: "出 2 道直接读开口、顶点、对称轴或配方的基础题"
    difficulty_3: "出 1 道求最值或分析与 x 轴交点情况的综合题"
    difficulty_4: "出 1 道实际最优化应用题或含参数的判别式讨论题"

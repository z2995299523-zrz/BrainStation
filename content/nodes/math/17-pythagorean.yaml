slug: pythagorean
subject: math
title: "勾股定理"
tier: core
difficulty: 2
prerequisites: ["rational-numbers"]
estimated_min: 25

trigger:
  type: story
  title: "勾股定理：人类最早的大数据"
  content:
    text: |
      勾股定理是人类历史上证明方法最多的定理——超过 400 种！

      从中国的《周髀算经》（勾三股四弦五）到古希腊的毕达哥拉斯，
      从印度的《绳法经》到阿拉伯的代数证明——
      每个文明都独立发现了它。

      最惊艳的证明之一来自美国总统加菲尔德（1881年），
      他用梯形的面积公式就证出来了。

      一个定理，跨越 3000 年、6 个大陆，被反复证明——
      它在人类知识中有什么魔力？
    question: "为什么勾股定理是人类历史上证明方法最多的定理？"

content:
  operation:
    text: |
      ## 勾股定理：直角边的平方和等于斜边的平方

      $$a^2 + b^2 = c^2$$

      其中 c 是斜边（直角对边），a 和 b 是直角边。

      **常用勾股数**：
      - 3-4-5：$3^2 + 4^2 = 9 + 16 = 25 = 5^2$
      - 5-12-13：$25 + 144 = 169 = 13^2$
      - 6-8-10：$36 + 64 = 100 = 10^2$（3-4-5 的 2 倍）
      - 8-15-17：$64 + 225 = 289 = 17^2$

      **判断直角三角形**：如果三角形三边满足 $a^2+b^2=c^2$，就是直角三角形。
    examples:
      - input: "直角边 3 和 4，求斜边"
        output: "5"
        method: "c = √(9+16) = √25 = 5"

  understand:
    text: |
      ## 为什么 $a^2+b^2=c^2$ 是对的？

      **面积法直觉证明**：

      想象一个边长为 a+b 的大正方形，里面画 4 个全等的直角三角形。
      - 中间空出一个边长为 c 的小正方形
      - 大正方形面积 = 4 个三角形 + c²
      - $(a+b)^2 = 4 × (ab/2) + c^2$
      - $a^2 + 2ab + b^2 = 2ab + c^2$
      - **$a^2 + b^2 = c^2$** ✓

      本质：面积不变，用两种方式算同一块面积——巧妙！
    highlights:
      - "400+种证明，因为它是几何和代数之间的桥梁"
      - "面积法证明是最优雅的方式之一"

  connect:
    text: |
      ## 勾股定理无处不在

      - **GPS 导航**：你的手机计算你和卫星的距离，用的就是勾股定理（三维版）
      - **建筑**：古代埃及人用 3-4-5 绳子做直角
      - **物理**：相对论中的时空间隔公式就是勾股定理的变体
      - **计算机图形**：屏幕上两点之间的距离就是勾股定理

      更深一层：勾股定理把直角和距离联系在了一起。
      没有它，我们无法统一地定义两点之间的距离。
    thought_seeds:
      - "3-4-5 三角形是古代测量直角的标准工具"
      - "相对论中的时空间隔本质上是勾股定理的推广"

feynman:
  base_prompt: "用你自己的话解释：勾股定理说的是什么？为什么它是对的？"
  key_elements:
    - "直角三角形斜边的平方等于两直角边的平方和"
    - "可以用于求某一边的长度"
    - "逆定理可以判定直角三角形"
    - "在生活中有广泛应用"
  deep_questions:
    - "如果勾股定理不成立，我们生活的世界会是什么样？"
    - "你觉得为什么每个文明都独立发现了它？"
  missing_hints:
    "直角三角形斜边的平方等于两直角边的平方和": "直角三角型的三条边中哪条最长？长的和其他两条有什么关系？"
    "可以用于求某一边的长度": "知道两条直角边，能求什么？"
    "逆定理可以判定直角三角形": "如果三边满足 a²+b²=c²，这个三角形是什么三角形？"
    "在生活中有广泛应用": "除了数学题，哪里用到勾股定理？"

thought_card: "今天你学到了什么让你觉得原来如此的东西？"

slug: pythagorean
subject: math
title: "勾股定理"
tier: core
difficulty: 2
prerequisites: ["rational-numbers"]
estimated_min: 25

trigger:
  type: story
  title: "勾股定理：人类最早的大数据"
  content:
    text: |
      勾股定理是人类历史上证明方法最多的定理——超过 400 种！

      从中国的《周髀算经》（勾三股四弦五）到古希腊的毕达哥拉斯，
      从印度的《绳法经》到阿拉伯的代数证明——
      每个文明都独立发现了它。

      最惊艳的证明之一来自美国总统加菲尔德（1881年），
      他用梯形的面积公式就证出来了。

      一个定理，跨越 3000 年、6 个大陆，被反复证明——
      它在人类知识中有什么魔力？
    question: "为什么勾股定理是人类历史上证明方法最多的定理？"

display:
  concept:
    summary: "勾股定理说的是：直角三角形两条直角边的平方和等于斜边的平方。它把直角和距离联系在一起，是几何与代数之间的桥梁。"
    sections:
      - title: "一、勾股定理的内容"
        content: |
          在直角三角形中，两条直角边为 $a$、$b$，斜边为 $c$（直角所对的边，最长），则：
          $$a^2 + b^2 = c^2$$

          斜边 $c$ 永远是最长的边，因为它对着最大的角（$90°$）。

      - title: "二、常用勾股数"
        content: |
          满足 $a^2+b^2=c^2$ 的整数组，叫勾股数，记住它们能快速解题：

          - $3\text{-}4\text{-}5$：$3^2+4^2 = 9+16 = 25 = 5^2$
          - $5\text{-}12\text{-}13$：$25+144 = 169 = 13^2$
          - $6\text{-}8\text{-}10$：$36+64 = 100 = 10^2$（即 $3\text{-}4\text{-}5$ 的 $2$ 倍）
          - $8\text{-}15\text{-}17$：$64+225 = 289 = 17^2$

      - title: "三、勾股定理的逆定理"
        content: |
          反过来也成立：如果三角形三边满足
          $$a^2 + b^2 = c^2$$
          那么这个三角形一定是直角三角形（$c$ 所对的角是直角）。

          古埃及人正是用 $3\text{-}4\text{-}5$ 的绳子来在地面上画出标准直角的。

      - title: "四、为什么 $a^2+b^2=c^2$ 成立"
        content: |
          面积法直觉证明：取一个边长为 $a+b$ 的大正方形，里面摆 $4$ 个全等的直角三角形，中间恰好空出一个边长为 $c$ 的小正方形。

          用两种方式算大正方形面积：
          $$(a+b)^2 = 4\times\frac{ab}{2} + c^2$$
          $$a^2 + 2ab + b^2 = 2ab + c^2$$
          两边同时减去 $2ab$：
          $$a^2 + b^2 = c^2$$

          本质：同一块面积用两种方法算，结果必然相等——优雅！

  examples:
    - title: "已知两直角边求斜边"
      problem: '直角三角形两直角边为 $3$ 和 $4$，求斜边 $c$'
      steps:
        - '第 1 步：用勾股定理 $c^2 = 3^2 + 4^2 = 9 + 16 = 25$'
        - '第 2 步：开平方 $c = \sqrt{25} = 5$'
      answer: "5"

    - title: "已知斜边和一直角边求另一边"
      problem: '直角三角形斜边为 $13$，一直角边为 $5$，求另一直角边 $b$'
      steps:
        - '第 1 步：$b^2 = c^2 - a^2 = 13^2 - 5^2 = 169 - 25 = 144$'
        - '第 2 步：开平方 $b = \sqrt{144} = 12$'
      answer: "12"

    - title: "用逆定理判断直角三角形"
      problem: '三角形三边为 $6$、$8$、$10$，它是直角三角形吗？'
      steps:
        - '第 1 步：找最长边 10 作斜边，验证 $6^2 + 8^2 = 36 + 64 = 100$'
        - '第 2 步：而 $10^2 = 100$，两边相等，满足勾股定理'
      answer: "是直角三角形"

  practice:
    - id: "pyth-prac-001"
      stem: '直角三角形两直角边为 $6$ 和 $8$，求斜边。'
      answer: "10"
      hints: ["c² = 6²+8²", "√100 = 10"]

    - id: "pyth-prac-002"
      stem: '直角三角形斜边为 $5$，一直角边为 $3$，求另一直角边。'
      answer: "4"
      hints: ["b² = c²-a² = 25-9", "√16 = 4"]

    - id: "pyth-prac-003"
      stem: '直角三角形两直角边为 $5$ 和 $12$，求斜边。'
      answer: "13"
      hints: ["这是常见勾股数吗？", "5-12-13"]

    - id: "pyth-prac-004"
      stem: '三角形三边为 $8$、$15$、$17$，它是直角三角形吗？'
      answer: "是，因为 8²+15²=64+225=289=17²"
      hints: ["最长边 17 当斜边", "验证 8²+15² 是否等于 17²"]

    - id: "pyth-prac-005"
      stem: '一个长方形长 $8$、宽 $6$，求它的对角线长。'
      answer: "10"
      hints: ["对角线把长方形分成直角三角形", "对角线² = 8²+6²"]

    - id: "pyth-prac-006"
      stem: '一架 $5$ 米长的梯子靠墙，底端离墙 $3$ 米，梯子顶端离地多高？'
      answer: "4 米"
      hints: ["梯子是斜边 5，墙高是一直角边", "高² = 5²-3²"]

  test:
    - id: "pyth-test-001"
      stem: '直角三角形两直角边为 $3$ 和 $4$，求斜边。'
      answer: "5"
      difficulty: 1
      layer: operation

    - id: "pyth-test-002"
      stem: '直角三角形两直角边为 $9$ 和 $12$，求斜边。'
      answer: "15"
      difficulty: 2
      layer: operation

    - id: "pyth-test-003"
      stem: '直角三角形斜边为 $10$，一直角边为 $6$，求另一直角边。'
      answer: "8"
      difficulty: 2
      layer: operation

    - id: "pyth-test-004"
      stem: '三角形三边为 $5$、$12$、$13$，判断它是不是直角三角形并说明理由。'
      answer: "是。因为 5²+12²=25+144=169=13²，满足勾股定理的逆定理。"
      difficulty: 3
      layer: understand

    - id: "pyth-test-005"
      stem: '一个长方形长 $12$、宽 $5$，求对角线长。'
      answer: "13"
      difficulty: 3
      layer: connect

    - id: "pyth-test-006"
      stem: '一架 $10$ 米的梯子靠墙，底端离墙 $6$ 米，顶端离地多高？'
      answer: "8 米（高² = 10²-6² = 64）"
      difficulty: 3
      layer: connect

    - id: "pyth-test-007"
      stem: "用面积法简述为什么 a²+b²=c²（写出关键步骤）。"
      answer: "边长 a+b 的大正方形 = 4 个直角三角形 + 边长 c 的小正方形：(a+b)²=4·(ab/2)+c²，展开 a²+2ab+b²=2ab+c²，两边减 2ab 得 a²+b²=c²。"
      difficulty: 4
      layer: understand

    - id: "pyth-test-008"
      q_type: choice
      stem: "在直角三角形中，下列哪条边一定最长？"
      options:
        - "A: 直角边 a"
        - "B: 直角边 b"
        - "C: 斜边 c"
        - "D: 不确定"
      answer: "C"
      difficulty: 1
      layer: understand

ai_context:
  topic_summary: "勾股定理是几何的核心定理：直角三角形两直角边平方和等于斜边平方。它连接了直角与距离，应用于求边长、判定直角三角形以及大量实际测量问题，是后续学习距离公式、三角函数的重要基础。"
  key_insights:
    - "公式 a²+b²=c²，其中 c 是斜边（最长边、直角所对的边）"
    - "记住常用勾股数（3-4-5、5-12-13）能大幅提速"
    - "逆定理：三边满足 a²+b²=c² 则是直角三角形"
    - "面积法证明是把同一块面积用两种方式计算——优雅且本质"
  common_mistakes:
    - mistake: "把斜边和直角边的位置搞混"
      example: "已知斜边 5、直角边 3，却算 $\\sqrt{5^2+3^2}$"
      why: "学生套公式时没分清哪条是斜边 c"
      how_to_explain: "斜边永远是最长的、对着直角的那条。求直角边要用减法：b²=c²-a²=25-9=16，b=4。"
    - mistake: "算出平方后忘记开方"
      example: "求斜边时答 $25$ 而不是 $5$"
      why: "学生算到 a²+b²=25 就停了，忘了 c² 还要开平方"
      how_to_explain: "公式给的是 c²。算出 c²=25 后还要再开方：c=√25=5，才是边长。"
    - mistake: "对非直角三角形也套用公式"
      example: "对普通三角形直接写 a²+b²=c²"
      why: "学生忽略了勾股定理只对直角三角形成立"
      how_to_explain: "勾股定理的前提是直角三角形。普通三角形不满足，要先确认有直角才能用。"
  alternate_explanations:
    - method: "面积拼图法"
      when_to_use: "学生想直观看到定理为什么成立时"
      prompt: "画一个大正方形（边长 a+b），里面放 4 个一样的直角三角形，中间会留出一个边长 c 的正方形。用两种方法算大正方形面积，一比较就得出 a²+b²=c²。"
    - method: "绳子量直角"
      when_to_use: "学生想理解逆定理的实际用途时"
      prompt: "拿一根打了 12 个等距结的绳子，围成 3-4-5 的三角形，3 和 4 之间的夹角必然是直角。古埃及人就是这样在地上画直角的。"
  question_templates:
    difficulty_1_2: "出 2 道已知两边求第三边的直接计算题，最好用勾股数"
    difficulty_3: "出 1 道生活情境题（梯子、对角线、距离）或逆定理判定题"
    difficulty_4: "出 1 道要求简述面积法证明或解释斜边为何最长的理解题"

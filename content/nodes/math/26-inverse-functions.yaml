slug: inverse-functions
subject: math
title: "反比例函数"
tier: core
difficulty: 3
prerequisites: ["linear-functions", "coordinate-plane"]
estimated_min: 30

trigger:
  type: story
  title: "走得越快，用时越少——藏在生活里的双曲线"
  content:
    text: |
      你要走 100 米的路。
      每秒走 1 米，需要 100 秒；每秒走 2 米，只要 50 秒；每秒走 5 米，20 秒就到。
      速度越大，时间越短——但它们的乘积永远是 100。
      电学里电压不变时，电流越大电阻越小；
      物理里压力不变时，受力面积越大压强越小。
      这种"一个变大、另一个就按比例变小，乘积不变"的关系，
      画出来是一条优雅弯曲的双曲线——这就是反比例函数。
    question: "为什么反比例函数的图象永远碰不到坐标轴？"

display:
  concept:
    summary: "反比例函数形如 y=k/x（k≠0），两个变量乘积为常数 k，图象是双曲线。"
    sections:
      - title: "一、反比例函数的定义"
        content: |
          一般形式：
          $$y = \frac{k}{x} \quad (k \neq 0)$$

          其中 $k$ 叫比例系数，$x \neq 0$。

          等价变形（判断是否为反比例函数的利器）：
          $$xy = k \quad \text{或} \quad y = kx^{-1}$$

          只要两个变量的乘积是一个非零常数，它们就成反比例关系。

      - title: "二、图象与性质"
        content: |
          反比例函数的图象是双曲线，分布在两个象限：
          - 当 $k > 0$：图象在第一、第三象限，每个分支上 $y$ 随 $x$ 增大而减小
          - 当 $k < 0$：图象在第二、第四象限，每个分支上 $y$ 随 $x$ 增大而增大

          重要性质：
          - 图象关于原点中心对称
          - 两个分支无限靠近 $x$ 轴和 $y$ 轴，但永远不与它们相交（因为 $x\neq 0$ 且 $y\neq 0$）

      - title: "三、k 的几何意义（面积不变）"
        content: |
          在反比例函数 $y=\frac{k}{x}$ 图象上任取一点 $P(x, y)$，
          过 $P$ 作 $x$ 轴、$y$ 轴的垂线，与坐标轴围成一个矩形，
          矩形面积恒为：
          $$S = |x| \cdot |y| = |xy| = |k|$$

          这是反比例函数最常考的隐藏武器——
          无论点取在哪里，这个矩形面积都等于 $|k|$，不随点的移动而改变。

      - title: "四、求解析式（待定系数法）"
        content: |
          反比例函数只有一个待定系数 $k$，所以只需一个已知点即可确定。

          步骤：
          1. 设 $y = \frac{k}{x}$
          2. 把已知点 $(x_0, y_0)$ 代入，求出 $k = x_0 y_0$
          3. 写出解析式

          例：图象过点 $(2, 6)$，则 $k = 2 \times 6 = 12$，解析式为 $y = \frac{12}{x}$。

  examples:
    - title: "判断反比例函数"
      problem: '下列函数哪个是反比例函数？$(1)\ y=\frac{3}{x}\quad (2)\ y=\frac{x}{3}\quad (3)\ xy=5$'
      steps:
        - '第 1 步：$y=\frac{3}{x}$ 符合 $y=\frac{k}{x}$，是反比例函数（$k=3$）'
        - '第 2 步：$y=\frac{x}{3}=\frac{1}{3}x$ 是正比例函数，不是'
        - '第 3 步：$xy=5$ 可变形为 $y=\frac{5}{x}$，是反比例函数（$k=5$）'
      answer: "(1) 和 (3) 是反比例函数"

    - title: "待定系数法求解析式"
      problem: '反比例函数图象经过点 $(-3, 4)$，求它的解析式。'
      steps:
        - '第 1 步：设 $y=\frac{k}{x}$'
        - '第 2 步：代入点 $(-3, 4)$：$4 = \frac{k}{-3}$，得 $k = 4 \times (-3) = -12$'
        - '第 3 步：解析式为 $y = -\frac{12}{x}$'
      answer: "y = -12/x"

    - title: "利用 k 的几何意义求面积"
      problem: '点 $P$ 在 $y=\frac{6}{x}$ 的图象上，过 $P$ 向两坐标轴作垂线，求所围矩形的面积。'
      steps:
        - '第 1 步：矩形面积 $S = |x| \cdot |y| = |xy|$'
        - '第 2 步：在图象上 $xy = k = 6$，所以 $|xy| = 6$'
        - '第 3 步：无论 $P$ 在哪个分支，面积都是 $6$'
      answer: "6"

  practice:
    - id: "inv-prac-001"
      stem: '反比例函数 $y=\frac{8}{x}$ 中 $k$ 等于多少？'
      answer: "8"
      hints: ["对照一般形式 y=k/x", "分子就是 k"]

    - id: "inv-prac-002"
      stem: '当 $k>0$ 时，反比例函数图象在哪两个象限？'
      answer: "第一、第三象限"
      hints: ["k 同号决定象限", "k>0 在一、三象限"]

    - id: "inv-prac-003"
      stem: '反比例函数图象过点 $(4, 2)$，求其解析式。'
      answer: "y = 8/x"
      hints: ["设 y=k/x", "k = 4×2 = 8"]

    - id: "inv-prac-004"
      stem: '点 $(5, m)$ 在 $y=\frac{10}{x}$ 上，求 $m$。'
      answer: "2"
      hints: ["把 x=5 代入", "m = 10/5"]

    - id: "inv-prac-005"
      stem: '反比例函数 $y=\frac{-12}{x}$ 图象上一点向两轴作垂线，围成矩形面积是多少？'
      answer: "12"
      hints: ["矩形面积 = |k|", "k=-12，取绝对值"]

    - id: "inv-prac-006"
      stem: '反比例函数的图象会与坐标轴相交吗？'
      answer: "不会。因为 x≠0 且 y≠0，图象无限靠近坐标轴但永不相交。"
      hints: ["x 能等于 0 吗？", "y=k/x 中分母不能为 0"]

    - id: "inv-prac-007"
      stem: '在 $y=\frac{6}{x}$（$k>0$）的第一象限分支上，当 $x$ 增大时 $y$ 怎样变化？'
      answer: "y 随 x 增大而减小"
      hints: ["k>0 时同一分支上的增减性", "x 变大乘积不变，y 就变小"]

  test:
    - id: "inv-test-001"
      stem: '反比例函数 $y=\frac{5}{x}$ 的比例系数 $k$ 是多少？'
      answer: "5"
      difficulty: 1
      layer: understand

    - id: "inv-test-002"
      stem: '反比例函数图象经过点 $(2, -3)$，求解析式。'
      answer: "y = -6/x"
      difficulty: 2
      layer: operation

    - id: "inv-test-003"
      stem: '点 $(-2, n)$ 在 $y=\frac{12}{x}$ 上，求 $n$。'
      answer: "-6"
      difficulty: 2
      layer: operation

    - id: "inv-test-004"
      stem: '反比例函数 $y=\frac{k}{x}$ 的图象在第二、四象限，则 $k$ 的符号是什么？'
      answer: "k < 0（负数）"
      difficulty: 2
      layer: understand

    - id: "inv-test-005"
      stem: '点 $P$ 在 $y=\frac{-9}{x}$ 图象上，过 $P$ 作两坐标轴垂线围成矩形，求其面积。'
      answer: "9（面积 = |k| = |-9| = 9）"
      difficulty: 3
      layer: connect

    - id: "inv-test-006"
      stem: '反比例函数 $y=\frac{4}{x}$ 上有两点 $A(1, y_1)$、$B(2, y_2)$，比较 $y_1$ 与 $y_2$ 的大小并说明理由。'
      answer: "y₁ > y₂。因为 k=4>0，在第一象限分支上 y 随 x 增大而减小，1<2 所以 y₁>y₂。（y₁=4，y₂=2）"
      difficulty: 3
      layer: connect

    - id: "inv-test-007"
      stem: '已知 $y$ 与 $x$ 成反比例，当 $x=3$ 时 $y=4$，求当 $x=6$ 时 $y$ 的值。'
      answer: "2（先求 k=3×4=12，y=12/x，代 x=6 得 y=2）"
      difficulty: 3
      layer: operation

    - id: "inv-test-008"
      stem: "为什么反比例函数图象上任一点向两坐标轴作垂线围成的矩形面积总是 |k|，与点的位置无关？"
      answer: "因为图象上任一点 (x,y) 满足 xy=k，矩形的两边长分别是 |x| 和 |y|，面积 = |x|·|y| = |xy| = |k|。由于乘积 k 是常数，所以无论点取在哪里，面积都恒等于 |k|。"
      difficulty: 4
      layer: understand

ai_context:
  topic_summary: "反比例函数 y=k/x（k≠0）描述两个变量乘积不变的关系，图象是分布在两个象限的双曲线。k 的正负决定图象所在象限和增减性。最重要的隐藏性质是图象上任一点向两轴作垂线围成的矩形面积恒为 |k|。求解析式用待定系数法，只需一个已知点。"
  key_insights:
    - "反比例函数的本质是 xy=k，两变量乘积为非零常数"
    - "k>0 图象在一、三象限，k<0 在二、四象限，图象关于原点中心对称"
    - "图象无限靠近坐标轴但永不相交，因为 x≠0 且 y≠0"
    - "图象上任一点向两轴作垂线围成的矩形面积恒为 |k|，与点的位置无关"
  common_mistakes:
    - mistake: "把 y=x/k 或 y=kx 误当成反比例函数"
      example: "认为 y=x/3 是反比例函数"
      why: "没分清自变量 x 在分子还是分母"
      how_to_explain: "反比例函数 x 必须在分母：y=k/x。y=x/3 其实是 y=(1/3)x，x 在分子，是正比例函数。判断时把式子整理成 y=k/x 形式看看。"

    - mistake: "比较函数值大小时忽略分支，跨象限直接比"
      example: "在 y=k/x（k>0）上，看到 -1<2 就直接说 f(-1)<f(2)"
      why: "反比例函数在整个定义域上不是单调的，两个分支要分开看"
      how_to_explain: "反比例函数有两条分支，增减性只在同一条分支内成立。x=-1 在第三象限分支，x=2 在第一象限分支，不能直接套增减性，要分别算出函数值再比。"

    - mistake: "求矩形面积时忘记 k 可能为负要取绝对值"
      example: "k=-9 时回答面积为 -9"
      why: "面积一定非负，但 k 可以是负数"
      how_to_explain: "面积是长乘宽，永远非负。公式是 S=|xy|=|k|，k 为负时要取绝对值，所以 k=-9 对应的面积是 9。"
  alternate_explanations:
    - method: "总量守恒类比"
      when_to_use: "学生不理解为什么是反比例时"
      prompt: "想象固定 100 元买苹果。单价越高，能买的斤数越少，但单价×斤数永远是 100。这个不变的乘积就是 k，y=k/x 就描述了这种此消彼长的关系。"

    - method: "矩形面积可视化"
      when_to_use: "学生记不住 k 的几何意义时"
      prompt: "在双曲线上选个点，从它向左画到 y 轴、向下画到 x 轴，和两条坐标轴围出一个长方形。把这个点沿曲线滑动，长方形会变胖变瘦，但面积始终是 |k| 不变——这就是反比例的奇妙之处。"

  question_templates:
    difficulty_1_2: "出 2 道基础题，识别反比例函数、用待定系数法求解析式或代入求值"
    difficulty_3: "出 1 道结合 k 几何意义求矩形面积，或比较同分支函数值大小的题"
    difficulty_4: "出 1 道解释性质成因的理解题，如矩形面积不变、为何不与坐标轴相交"

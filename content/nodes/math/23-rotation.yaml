slug: rotation
subject: math
title: "图形的旋转"
tier: core
difficulty: 2
prerequisites: ["basic-geometry", "axis-symmetry", "coordinate-plane"]
estimated_min: 30

trigger:
  type: story
  title: "钟表为什么能精确报时？"
  content:
    text: |
      一只钟表的指针，每分钟绕中心转过 6 度，每小时转过 360 度回到原点。
      它从不改变自己的长度，只改变方向。
      这正是数学里的"旋转"——绕一个固定点转动一个角度。
      风车、摩天轮、芭蕾舞者的转身、甚至地球的自转，
      都遵守同一条铁律：旋转不改变图形的形状和大小，只改变位置。
    question: "把一个图形绕某点转 180 度，和把它沿某条线翻折，结果会一样吗？什么时候一样？"

display:
  concept:
    summary: "旋转是把图形绕一个定点转动一个角度，旋转不改变形状和大小；中心对称是旋转 180 度的特例。"
    sections:
      - title: "一、旋转的三要素"
        content: |
          旋转由三个要素完全决定：
          - 旋转中心：图形绕着转的那个定点
          - 旋转方向：顺时针或逆时针
          - 旋转角：转过的角度

          例：把点 $P$ 绕点 $O$ 逆时针旋转 $90^\circ$，得到点 $P'$。
          描述旋转必须说清楚这三件事，缺一不可。

      - title: "二、旋转的性质"
        content: |
          旋转前后（对应点记作 $A$ 与 $A'$）满足：
          1. 对应点到旋转中心的距离相等：$OA = OA'$
          2. 任意一对对应点与中心连线的夹角都等于旋转角：$\angle AOA' = $ 旋转角
          3. 旋转前后图形全等（形状、大小不变）

          一句话：旋转是"刚体运动"，只搬家不变形。

      - title: "三、中心对称（旋转 180° 的特例）"
        content: |
          中心对称：把一个图形绕某点旋转 $180^\circ$ 后能与另一个图形重合。
          这个点叫对称中心，重合的点叫对称点。

          性质：连接对应点的线段都经过对称中心，且被它平分。
          即对称中心是任意一对对应点连线的中点。

          中心对称图形：一个图形绕某点转 $180^\circ$ 后与自身重合。
          例：平行四边形、圆、正方形都是中心对称图形；
          而正三角形不是（转 $180^\circ$ 不重合）。

      - title: "四、坐标系中的旋转（绕原点）"
        content: |
          点 $(x, y)$ 绕原点 $O$ 旋转，对应点坐标：
          - 旋转 $180^\circ$（即关于原点中心对称）：$(x, y) \to (-x, -y)$
          - 逆时针旋转 $90^\circ$：$(x, y) \to (-y, x)$
          - 顺时针旋转 $90^\circ$：$(x, y) \to (y, -x)$

          记忆：转 $180^\circ$ 就是两个坐标都变号。

  examples:
    - title: "求旋转后的对应边"
      problem: '把线段 $AB$ 绕点 $O$ 顺时针旋转 $60^\circ$ 得到 $A^\prime B^\prime$，已知 $AB = 5$，$\angle AOA^\prime$ 等于多少？$A^\prime B^\prime$ 长多少？'
      steps:
        - '第 1 步：旋转不改变长度，所以 $A^\prime B^\prime = AB = 5$'
        - '第 2 步：每对对应点与中心连线的夹角都等于旋转角，所以 $\angle AOA^\prime = 60^\circ$'
      answer: "A′B′ = 5，∠AOA′ = 60°"

    - title: "中心对称求对称点"
      problem: '点 $A(3, -2)$ 关于原点 $O$ 的对称点 $A^\prime$ 坐标是多少？'
      steps:
        - '第 1 步：关于原点中心对称相当于绕原点旋转 $180^\circ$'
        - '第 2 步：规则 $(x,y) \to (-x,-y)$，把两个坐标都变号'
        - '第 3 步：$A(3,-2) \to A^\prime(-3, 2)$'
      answer: "A′(-3, 2)"

    - title: "坐标系中旋转 90°"
      problem: '点 $P(2, 1)$ 绕原点逆时针旋转 $90^\circ$ 得到 $P^\prime$，求其坐标。'
      steps:
        - '第 1 步：逆时针 $90^\circ$ 规则为 $(x, y) \to (-y, x)$'
        - '第 2 步：代入 $x=2, y=1$，得 $(-1, 2)$'
      answer: "P′(-1, 2)"

  practice:
    - id: "rot-prac-001"
      stem: "旋转有哪三个要素？"
      answer: "旋转中心、旋转方向、旋转角"
      hints: ["想想描述一次旋转需要说清哪几件事", "绕哪转、往哪转、转多少"]

    - id: "rot-prac-002"
      stem: '点 $(4, 5)$ 关于原点的中心对称点坐标是？'
      answer: "(-4, -5)"
      hints: ["中心对称 = 绕原点转 180°", "(x,y)→(-x,-y)，两坐标都变号"]

    - id: "rot-prac-003"
      stem: "正方形是中心对称图形吗？"
      answer: "是。正方形绕中心旋转 180° 后与自身完全重合。"
      hints: ["把正方形转半圈，还和原来一样吗？", "看对角线交点"]

    - id: "rot-prac-004"
      stem: '把三角形绕点 $O$ 旋转 $90^\circ$ 后，对应边的长度变了吗？'
      answer: "没变。旋转不改变图形的形状和大小，对应边相等。"
      hints: ["旋转是刚体运动", "只搬家不变形"]

    - id: "rot-prac-005"
      stem: '点 $P(0, 3)$ 绕原点顺时针旋转 $90^\circ$，求对应点坐标。'
      answer: "(3, 0)"
      hints: ["顺时针 90° 规则 (x,y)→(y,-x)", "代入 x=0, y=3"]

    - id: "rot-prac-006"
      stem: "正三角形是中心对称图形吗？"
      answer: "不是。正三角形绕中心转 180° 后与原图不重合（它的对称是旋转 120°）。"
      hints: ["试着把正三角形倒过来", "180° 后顶点朝向变了吗？"]

  test:
    - id: "rot-test-001"
      stem: "旋转的三要素是什么？"
      answer: "旋转中心、旋转方向、旋转角"
      difficulty: 1
      layer: understand

    - id: "rot-test-002"
      stem: '点 $A(-2, 6)$ 关于原点的对称点坐标是？'
      answer: "(2, -6)"
      difficulty: 1
      layer: operation

    - id: "rot-test-003"
      stem: '点 $P(3, 4)$ 绕原点逆时针旋转 $90^\circ$ 后的坐标是？'
      answer: "(-4, 3)"
      difficulty: 2
      layer: operation

    - id: "rot-test-004"
      stem: "下列图形哪个不是中心对称图形？A 平行四边形  B 圆  C 正五边形  D 矩形"
      answer: "C（正五边形不是中心对称图形）"
      difficulty: 2
      layer: understand

    - id: "rot-test-005"
      stem: '把 $\triangle ABC$ 绕点 $O$ 旋转得到 $\triangle A^\prime B^\prime C^\prime$，已知 $\angle AOA^\prime = 70^\circ$，则 $\angle BOB^\prime$ 等于多少？为什么？'
      answer: "70°。因为每一对对应点与旋转中心连线的夹角都等于同一个旋转角。"
      difficulty: 3
      layer: connect

    - id: "rot-test-006"
      stem: "旋转 180° 和沿一条直线翻折，什么情况下结果相同？"
      answer: "当图形既是中心对称又关于该直线轴对称时（如长方形绕中心转 180° 与沿对称轴翻折后位置一致）。一般情况下两者不同：旋转保持图形不翻面，翻折会改变左右朝向。"
      difficulty: 4
      layer: connect

    - id: "rot-test-007"
      stem: '点 $(5, -1)$ 绕原点顺时针旋转 $90^\circ$ 的对应点坐标是？'
      answer: "(-1, -5)"
      difficulty: 3
      layer: operation

    - id: "rot-test-008"
      stem: "为什么旋转前后两个图形一定全等？"
      answer: "因为旋转中对应点到中心的距离都相等，对应角也保持不变，图形的形状和大小都没有改变，所以旋转前后的图形全等。"
      difficulty: 3
      layer: understand

ai_context:
  topic_summary: "图形的旋转是绕定点转动一个角度的刚体运动，由旋转中心、方向、角度三要素决定。旋转保持形状和大小不变。中心对称是旋转 180° 的特殊情形，对称中心平分每对对应点的连线。坐标系中绕原点旋转有固定的坐标变换规则。"
  key_insights:
    - "旋转是刚体运动：只改变位置，不改变形状和大小，旋转前后全等"
    - "每一对对应点与旋转中心连线的夹角都等于同一个旋转角"
    - "中心对称是旋转 180° 的特例，对称中心是对应点连线的中点"
    - "绕原点转 180° 就是 (x,y)→(-x,-y)，两个坐标都变号"
  common_mistakes:
    - mistake: "把中心对称图形和轴对称图形混淆"
      example: "认为正三角形是中心对称图形"
      why: "学生没区分绕点转 180° 与沿线翻折两种变换"
      how_to_explain: "中心对称是转半圈，轴对称是照镜子。正三角形转 180° 顶点朝向反了，不重合，所以不是中心对称图形。"

    - mistake: "旋转 90° 时坐标变换记错"
      example: "把 (x,y) 逆时针 90° 错写成 (y,-x)"
      why: "顺时针和逆时针的公式记反了"
      how_to_explain: "逆时针 90° 是 (x,y)→(-y,x)，顺时针 90° 是 (x,y)→(y,-x)。可取一个具体点如 (1,0) 代入验证：逆时针应转到 (0,1)。"

    - mistake: "认为旋转会改变线段长度"
      example: "旋转后算对应边长度时重新去量或计算，得到不同的值"
      why: "没掌握旋转是刚体运动的核心性质"
      how_to_explain: "旋转就像转动一张照片，照片里的东西尺寸不会变。对应边必然等长，对应角必然相等，不用重算。"
  alternate_explanations:
    - method: "钟表指针类比"
      when_to_use: "学生不理解旋转角和旋转中心时"
      prompt: "把图形想象成钟表的指针，旋转中心是钟的轴心。指针长度永远不变（旋转不改变大小），转过的角度就是旋转角。"

    - method: "扑克牌 180° 翻转"
      when_to_use: "学生不理解中心对称时"
      prompt: "拿一张扑克牌（如方块 J），绕牌中心转 180°，上下颠倒后图案与原来重合——这就是中心对称图形。"

  question_templates:
    difficulty_1_2: "出 2 道基础题，求中心对称点坐标或判断是否为中心对称图形"
    difficulty_3: "出 1 道坐标系旋转计算题或利用旋转性质求角度/边长的题"
    difficulty_4: "出 1 道对比旋转与轴对称、或解释旋转性质成因的理解题"

slug: linear-equation
subject: math
title: "一元一次方程"
tier: core
difficulty: 2
prerequisites: ["rational-numbers", "polynomials"]
estimated_min: 25

trigger:
  type: story
  title: "未知数：人类最强大的思维工具"
  content:
    text: |
      古埃及人在《莱因德纸草书》（公元前 1650 年）中就解过方程。
      他们用"堆"（aha）来代表未知数。

      比如："一堆加上它的 1/4 等于 15，这堆是多少？"
      用今天的写法：$x + x/4 = 15$ → $x = 12$

      古人没学过代数，但他们发现：承认有个我们不知道的数存在，
      我们就可以通过已知关系把它逼出来。
    question: "如果你不知道一个数是多少，你怎么可能算出来它？"

display:
  concept:
    summary: "一元一次方程是只含一个未知数、且未知数次数为 1 的方程。解方程的核心是保持等式两边平衡，逐步把未知数解出来。"
    sections:
      - title: "一、什么是一元一次方程"
        content: |
          一元：只含一个未知数。
          一次：未知数的最高次数是 $1$。

          标准形式：
          $$ax + b = 0 \quad (a \neq 0)$$

          例如 $2x + 3 = 7$、$5x = 10$ 都是一元一次方程；
          而 $x^2 = 4$（二次）、$xy = 6$（两个未知数）都不是。

      - title: "二、等式的基本性质"
        content: |
          解方程的全部依据，就是等式两边可以同时做相同的运算：

          - 两边同时加（减）同一个数，等式仍成立
          - 两边同时乘（除以）同一个不为 $0$ 的数，等式仍成立

          把等式想象成天平：只要两边动作一样，天平始终平衡。

      - title: "三、解方程的五步法"
        content: |
          1. 去分母：两边同乘各分母的最小公倍数
          2. 去括号：注意括号前负号要变号
          3. 移项：把含未知数的项移到一边，常数移到另一边（过等号变号）
          4. 合并同类项：化成 $ax = b$ 的形式
          5. 系数化为 1：两边同时除以系数 $a$

          示例：
          $$\frac{x+1}{2} - \frac{x-2}{3} = 1$$
          去分母 $\times 6$：$3(x+1) - 2(x-2) = 6$
          去括号：$3x + 3 - 2x + 4 = 6$
          合并：$x + 7 = 6$
          移项、系数化 1：$x = -1$

      - title: "四、为什么移项要变号"
        content: |
          移项不是"搬过去变号"这条死规矩，它是等式性质的简记。

          以 $2x + 3 = 7$ 为例，两边同时减 $3$：
          $$2x + 3 - 3 = 7 - 3 \;\Rightarrow\; 2x = 4$$

          表面上看 $+3$ 从左边跑到右边变成了 $-3$，
          真相是两边同时做了减法。理解了这一点，移项就再也不会错。

  examples:
    - title: "最简单的移项"
      problem: '解方程 $2x + 3 = 7$'
      steps:
        - '第 1 步：移项，把 +3 移到右边变 -3：$2x = 7 - 3$'
        - '第 2 步：合并：$2x = 4$'
        - '第 3 步：系数化为 1，两边除以 2：$x = 2$'
      answer: "x = 2"

    - title: "带括号的方程"
      problem: '解方程 $3(x+2) = 2x + 8$'
      steps:
        - '第 1 步：去括号：$3x + 6 = 2x + 8$'
        - '第 2 步：移项，含 x 的归左、常数归右：$3x - 2x = 8 - 6$'
        - '第 3 步：合并：$x = 2$'
      answer: "x = 2"

    - title: "带分母的方程"
      problem: '解方程 $\frac{x+1}{2} - \frac{x-2}{3} = 1$'
      steps:
        - '第 1 步：去分母，两边同乘 6：$3(x+1) - 2(x-2) = 6$'
        - '第 2 步：去括号：$3x + 3 - 2x + 4 = 6$'
        - '第 3 步：合并并移项：$x + 7 = 6$，得 $x = -1$'
      answer: "x = -1"

  practice:
    - id: "lineq-prac-001"
      stem: '解方程 $x + 5 = 12$'
      answer: "x = 7"
      hints: ["把 +5 移到右边", "移项要变号：12-5"]

    - id: "lineq-prac-002"
      stem: '解方程 $3x = 15$'
      answer: "x = 5"
      hints: ["系数是 3", "两边同时除以 3"]

    - id: "lineq-prac-003"
      stem: '解方程 $2x - 1 = 9$'
      answer: "x = 5"
      hints: ["先移项：2x = 9+1", "再系数化为 1"]

    - id: "lineq-prac-004"
      stem: '解方程 $5x + 2 = 3x + 10$'
      answer: "x = 4"
      hints: ["含 x 的项归左边，常数归右边", "5x-3x = 10-2"]

    - id: "lineq-prac-005"
      stem: '解方程 $2(x - 3) = 4$'
      answer: "x = 5"
      hints: ["先去括号 2x-6=4", "再移项、系数化为 1"]

    - id: "lineq-prac-006"
      stem: '解方程 $\frac{x}{2} + 1 = 4$'
      answer: "x = 6"
      hints: ["先移项：x/2 = 3", "再两边乘 2"]

  test:
    - id: "lineq-test-001"
      stem: '解方程 $x - 4 = 6$'
      answer: "x = 10"
      difficulty: 1
      layer: operation

    - id: "lineq-test-002"
      stem: '解方程 $4x = 20$'
      answer: "x = 5"
      difficulty: 1
      layer: operation

    - id: "lineq-test-003"
      stem: '解方程 $3x + 1 = 2x + 7$'
      answer: "x = 6"
      difficulty: 2
      layer: operation

    - id: "lineq-test-004"
      stem: '解方程 $2(x + 1) = 3x - 4$'
      answer: "x = 6"
      difficulty: 3
      layer: operation

    - id: "lineq-test-005"
      stem: '解方程 $\frac{x+1}{2} - \frac{x-2}{3} = 1$'
      answer: "x = -1"
      difficulty: 4
      layer: operation

    - id: "lineq-test-006"
      q_type: choice
      stem: '下列哪个是一元一次方程？'
      options:
        - 'A: $x^2 = 4$'
        - 'B: $2x + 3 = 7$'
        - 'C: $xy = 6$'
        - 'D: $\frac{1}{x} = 2$'
      answer: "B"
      difficulty: 2
      layer: understand

    - id: "lineq-test-007"
      stem: "解方程时把 2x+3=7 写成 2x=7+3，错在哪里？正确应是什么？"
      answer: "移项要变号。+3 移到右边应变成 -3，即 2x=7-3=4，x=2。"
      difficulty: 3
      layer: understand

    - id: "lineq-test-008"
      stem: "一堆苹果，小明拿走一半还剩 8 个。设原有 x 个，列方程并求解。"
      answer: "方程：x - x/2 = 8，即 x/2 = 8，解得 x = 16。原有 16 个苹果。"
      difficulty: 4
      layer: connect

ai_context:
  topic_summary: "一元一次方程是方程思想的起点。学生需理解解方程的本质是利用等式性质保持两边平衡，并熟练运用去分母、去括号、移项、合并、系数化为 1 这五步法。这是解一切方程与应用题的基础。"
  key_insights:
    - "一元一次：一个未知数，最高次数为 1"
    - "等式两边同时做相同的运算，等式才成立——这是解方程的全部依据"
    - "移项变号不是规定，是等式两边同时加减的结果"
    - "五步法有固定顺序：去分母→去括号→移项→合并→系数化为 1"
  common_mistakes:
    - mistake: "移项时忘记变号"
      example: "由 $2x+3=7$ 写成 $2x=7+3$"
      why: "学生把移项当成简单搬家，没意识到它代表两边同时减"
      how_to_explain: "移项的真相是两边同时减 3：2x+3-3=7-3。所以 +3 过去要变 -3，写成 2x=7-3=4。"
    - mistake: "去分母时漏乘没有分母的项"
      example: "$\\frac{x}{2}+1=4$ 两边乘 2 写成 $x+1=8$"
      why: "学生只对带分母的项乘了 2，忘了 +1 也要乘"
      how_to_explain: "两边的每一项都要乘最小公倍数。$\\frac{x}{2}+1=4$ 乘 2 后是 x+2=8，不是 x+1=8。"
    - mistake: "去括号时负号没分配"
      example: "$-(x-2)$ 去括号写成 $-x-2$"
      why: "负号没乘进括号每一项"
      how_to_explain: "括号前是负号，里面每项都变号：$-(x-2)=-x+2$。可借助乘 -1 来检查。"
  alternate_explanations:
    - method: "天平模型"
      when_to_use: "学生不理解为什么两边要做同样的操作时"
      prompt: "把等号画成天平。左右两边一样重才平衡。你从左盘拿走一个砝码，必须从右盘也拿走同样的，天平才不倒。这就是等式性质。"
    - method: "倒推还原法"
      when_to_use: "学生对'未知数怎么算出来'感到困惑时"
      prompt: "把方程看成对 x 做了一连串操作（先乘 2 再加 3）。解方程就是按相反顺序倒回去：先减 3 再除以 2，把 x 还原出来。"
  question_templates:
    difficulty_1_2: "出 2 道一两步即可解出的简单方程，考察移项和系数化为 1"
    difficulty_3: "出 1 道含括号或两边都有未知数的方程，考察去括号与移项"
    difficulty_4: "出 1 道含分母的方程，或一道需要列方程的简单应用题"

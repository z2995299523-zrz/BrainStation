slug: linear-equation
subject: math
title: "一元一次方程"
tier: core
difficulty: 2
prerequisites: ["rational-numbers", "polynomials"]
estimated_min: 25

trigger:
  type: story
  title: "未知数：人类最强大的思维工具"
  content:
    text: |
      古埃及人在《莱因德纸草书》（公元前 1650 年）中就解过方程。
      他们用"堆"（aha）来代表未知数。

      比如："一堆加上它的 1/4 等于 15，这堆是多少？"
      用今天的写法：$x + x/4 = 15$ → $x = 12$

      古人没学过代数，但他们发现：承认有个我们不知道的数存在，
      我们就可以通过已知关系把它逼出来。
    question: "如果你不知道一个数是多少，你怎么可能算出来它？"

content:
  operation:
    text: |
      ## 一元一次方程：一个未知数 + 最高次数 1

      **标准形式**：$ax + b = 0$（a ≠ 0）

      **解方程的核心思想**：等式两边同时做相同的运算，天平平衡

      **基本步骤（五步法）**：
      1. 去分母（同乘最小公分母）
      2. 去括号
      3. 移项（过等号变号）
      4. 合并同类项
      5. 系数化为 1

      **示例**：
      $\frac{x+1}{2} - \frac{x-2}{3} = 1$
      → 去分母 ×6：$3(x+1) - 2(x-2) = 6$
      → $3x + 3 - 2x + 4 = 6$
      → $x + 7 = 6$
      → $x = -1$
    examples:
      - input: "解 2x+3=7"
        output: "x=2"
        method: "移项：2x=7-3=4, x=2"

  understand:
    text: |
      ## 为什么移项过等号要变号？

      移项的本质是等式的两边同时做同一件事。

      $2x + 3 = 7$

      两边同时减 3：
      $2x + 3 - 3 = 7 - 3$
      $2x = 4$

      看到 3 从左边移到右边变成 -3——这只是表象。
      真相是：两边同时做了减法。移项是等式性质的简记法。

      为什么两边可以做同样的事？
      因为等号表示左右相等。如果你只改变一边，天平就倾了。
    highlights:
      - "移项变号不是死记硬背，是等式两边同时操作的结果"
      - "方程本质是：未知数必须满足什么条件"

  connect:
    text: |
      ## 方程思维：用已知求未知

      方程不只是数学题——它是一种思维方式：
      - 侦探破案：已知线索 → 未知凶手
      - 医生诊断：已知症状 → 未知病因
      - 工程：已知受力 → 未知材料强度

      每次你问在什么条件下这件事会发生，你都在用方程思维。

      延伸到二元一次方程：$y = 2x + 1$ 不仅仅是方程——它是直线的方程，
      连接了代数和几何。笛卡尔发明坐标系的那一刻，代数和几何就结婚了。
    thought_seeds:
      - "方程 = 天平，等号两边永远相等"
      - "笛卡尔用坐标系把代数变成了图像"

feynman:
  base_prompt: "用你自己的话解释：解方程的核心思想是什么？为什么移项要变号？"
  key_elements:
    - "等式两边同时做相同的运算"
    - "移项变号是等式性质的结果"
    - "最终求出未知数的值"
    - "方程可以用来解实际问题"
  deep_questions:
    - "如果你来教一个从没学过方程的同学，你会怎么解释等式两边同时加减？"
    - "方程和算术最大的区别是什么？"
  missing_hints:
    "等式两边同时做相同的运算": "天平两边如果一边拿走砝码，另一边应该怎么办？"
    "移项变号是等式性质的结果": "移项到底做了什么？有没有更本质的解释？"
    "最终求出未知数的值": "解方程的目标是什么？"
    "方程可以用来解实际问题": "除了数学题，生活中什么时候需要解方程？"

thought_card: "今天学到的哪一点最让你意外？为什么？"

slug: coordinate-plane
subject: math
title: "平面直角坐标系"
tier: core
difficulty: 2
prerequisites: ["rational-numbers"]
estimated_min: 25

trigger:
  type: story
  title: "笛卡尔的苍蝇——坐标系的诞生"
  content:
    text: |
      1619 年，法国哲学家笛卡尔病了，躺在军队营房里。
      他盯着天花板上一只苍蝇——突然产生了一个改变数学的想法：

      "我可以用两个数字精确描述苍蝇在天花板上的位置！"

      他说：把墙角的两条边沿当作两条参考线，
      分别测量苍蝇到每条线的距离——
      (3, 5) 就能唯一确定一个位置。

      这个看似简单的想法，把几何和代数第一次真正连接在一起。
      从此以后，图形可以用方程描述，方程可以用图形理解。

      这只苍蝇飞走了，但它留下的坐标系，
      是 GPS 导航、计算机图形学、物理模拟的基石。
    question: "如果只有一条参考线（数轴），能确定平面上一个点的位置吗？为什么？"

display:
  concept:
    summary: "平面直角坐标系用一对有序实数 (x, y) 确定平面上点的位置。本章学习坐标的读写、象限的划分、点的平移和对称、以及两点间的距离。"
    sections:
      - title: "一、坐标系的基本概念"
        content: |
          **组成**：
          - x 轴（横轴）：水平的数轴，向右为正
          - y 轴（纵轴）：竖直的数轴，向上为正
          - 原点 O：两轴交点，坐标为 (0, 0)

          **坐标表示**：点 P 的坐标记作 P(x, y)
          - x = 横坐标（到 y 轴的有向距离）
          - y = 纵坐标（到 x 轴的有向距离）

          关键：**有序**实数对——顺序重要！(3, 5) ≠ (5, 3)

      - title: "二、四个象限"
        content: |
          ```
                    y
                    ↑
          第二象限   │   第一象限
          (-, +)    │   (+, +)
                    │
          ──────────O──────────→ x
                    │
          第三象限   │   第四象限
          (-, -)    │   (+, -)
                    │
          ```

          | 位置 | x 符号 | y 符号 | 例子 |
          |------|--------|--------|------|
          | 第一象限 | + | + | (3, 4) |
          | 第二象限 | - | + | (-3, 4) |
          | 第三象限 | - | - | (-3, -4) |
          | 第四象限 | + | - | (3, -4) |
          | x 轴上 | 任意 | 0 | (5, 0) |
          | y 轴上 | 0 | 任意 | (0, -2) |

      - title: "三、点的平移"
        content: |
          点在坐标系中的平移 = 坐标的加减：

          - 向右平移 a 个单位：x → x + a
          - 向左平移 a 个单位：x → x - a
          - 向上平移 b 个单位：y → y + b
          - 向下平移 b 个单位：y → y - b

          例如：将 (3, 4) 向左平移 5 个单位，再向上 3 个单位
          → (3-5, 4+3) = (-2, 7)

      - title: "四、点的对称"
        content: |
          | 对称类型 | 变化规则 | (a, b) 对称后 |
          |----------|----------|---------------|
          | 关于 x 轴对称 | y 取相反数 | (a, -b) |
          | 关于 y 轴对称 | x 取相反数 | (-a, b) |
          | 关于原点对称 | x、y 都取相反数 | (-a, -b) |

          记忆：关于谁对称，谁的坐标就不变。

      - title: "五、两点间距离"
        content: |
          两点 A(x₁, y₁) 和 B(x₂, y₂) 之间的距离（用勾股定理）：

          $$AB = \sqrt{(x_2 - x_1)^2 + (y_2 - y_1)^2}$$

          特例——平行于坐标轴的线段：
          - AB 水平（y₁ = y₂）：$AB = |x_2 - x_1|$
          - AB 竖直（x₁ = x₂）：$AB = |y_2 - y_1|$

  examples:
    - title: "判断点所在的象限"
      problem: "点 P(-5, 2) 在哪个象限？"
      steps:
        - "第 1 步：x = -5 < 0，y = 2 > 0"
        - "第 2 步：x 负 y 正 → 第二象限"
        - "第 3 步：注意——不要只看数字，要看符号"
      answer: "第二象限"

    - title: "点的平移"
      problem: "将点 A(2, -1) 向右平移 3 个单位，再向上平移 4 个单位。求新坐标。"
      steps:
        - "第 1 步：右移 3 单位 → x: 2 + 3 = 5"
        - "第 2 步：上移 4 单位 → y: -1 + 4 = 3"
        - "第 3 步：新坐标 (5, 3)"
      answer: "(5, 3)"

    - title: "求两点间距离"
      problem: "求 A(1, 2) 和 B(4, 6) 之间的距离。"
      steps:
        - "第 1 步：x₂ - x₁ = 4 - 1 = 3"
        - "第 2 步：y₂ - y₁ = 6 - 2 = 4"
        - "第 3 步：AB = √(3² + 4²) = √25 = 5"
      answer: "5"

  practice:
    - id: "coord-prac-001"
      stem: "点 P(-3, -7) 在哪个象限？"
      answer: "第三象限（x 负 y 负）"
      hints: ["x = -3，y = -7——两个都是负数", "x 负 y 负 → 第三象限"]

    - id: "coord-prac-002"
      stem: "点 A(2, 3) 关于 x 轴对称的点的坐标是？"
      answer: "(2, -3)"
      hints: ["关于 x 轴对称 → x 不变，y 取反", "(a, b) → (a, -b)"]

    - id: "coord-prac-003"
      stem: "将点 B(-1, 4) 向下平移 6 个单位，坐标变成什么？"
      answer: "(-1, -2)"
      hints: ["向下平移只改变 y 坐标", "4 - 6 = ?"]

    - id: "coord-prac-004"
      stem: "点 M 在 x 轴上，且到原点的距离是 5。M 的坐标可能是？"
      answer: "(5, 0) 或 (-5, 0)"
      hints: ["x 轴上的点 y = 0", "距离为 5 意味着 x = 5 或 x = -5"]

    - id: "coord-prac-005"
      stem: "求 P(0, 3) 到 Q(4, 0) 的距离。"
      answer: "5（√(4² + (-3)²) = √25 = 5）"
      hints: ["用两点间距离公式", "x 差 = 4 - 0 = 4, y 差 = 0 - 3 = -3"]

  test:
    - id: "coord-test-001"
      stem: "点 P(0, -5) 在哪个轴上？"
      answer: "y 轴上（x = 0）"
      difficulty: 1
      layer: operation

    - id: "coord-test-002"
      stem: "点 A(-2, 3) 关于原点对称的坐标是？"
      answer: "(2, -3)"
      difficulty: 1
      layer: operation

    - id: "coord-test-003"
      stem: "点 (a, b) 在第三象限，则 a 和 b 的符号分别是？"
      answer: "a < 0, b < 0"
      difficulty: 1
      layer: understand

    - id: "coord-test-004"
      stem: "线段 AB，A(1, 5)，B(1, -3)。求 AB 的长度。"
      answer: "8（|5 - (-3)| = 8，x 坐标相同，竖直距离 = |y 差|）"
      difficulty: 2
      layer: operation

    - id: "coord-test-005"
      stem: "点 P 在第二象限，且到 x 轴的距离为 4，到 y 轴的距离为 3。P 的坐标是？"
      answer: "(-3, 4)。第二象限 x 负 y 正，|x|=3 → x=-3，|y|=4 → y=4。"
      difficulty: 3
      layer: understand

    - id: "coord-test-006"
      stem: "将点 (x, y) 先向左平移 2，再关于 y 轴对称，最终坐标为 (5, 3)。求原坐标 (x, y)。"
      answer: "逆向推导：(5,3) 关于 y 轴对称 → (-5,3)；再逆向'向左移 2'（即向右移 2）→ (-3, 3)。所以原坐标 = (-3, 3)。"
      difficulty: 4
      layer: connect

    - id: "coord-test-007"
      stem: "已知 A(2, 3) 和 B(5, 7)。A 如何平移得到 B？"
      answer: "向右平移 3 个单位，向上平移 4 个单位。"
      difficulty: 2
      layer: operation

    - id: "coord-test-008"
      stem: "笛卡尔发明坐标系后，几何问题可以用代数方法解决。举一个例子说明这种'数形结合'的好处。"
      answer: "例如，判断三点是否共线——可以直接计算坐标看是否满足线性关系，而不需要画图。或者计算两点距离——不需要用尺子量，直接用公式 √((x₂-x₁)² + (y₂-y₁)²)。"
      difficulty: 3
      layer: connect

ai_context:
  topic_summary: "平面直角坐标系是数与形结合的第一个工具。核心内容：坐标的定义（有序实数对）、四个象限的符号特征、点的平移（x±a, y±b）、点的对称（关于 x 轴/y 轴/原点的坐标变化规律）、两点间距离公式。坐标系的本质是把几何问题转化为代数问题，是后续学习函数图像、解析几何的基础。"
  key_insights:
    - "有序实数对——'有序'是关键：(3,5)≠(5,3)，这使每个点和唯一坐标配对"
    - "象限符号模式：一(+,+)、二(-,+)、三(-,-)、四(+,-)——记住'逆时针，先正后负'"
    - "对称规则：关于 x 轴对称→y 变号；关于 y 轴对称→x 变号；关于原点对称→都变号"
    - "两点距离公式本质是勾股定理——水平差和竖直差是直角边，距离是斜边"
  common_mistakes:
    - mistake: "象限编号记错"
      example: "学生说 (3, -4) 在第二象限"
      why: "混淆了象限的编号顺序——象限是逆时针编号的"
      how_to_explain: "从 x 轴正方向开始，逆时针转：右上是 1，左上是 2，左下是 3，右下是 4。"

    - mistake: "混淆 x 轴和 y 轴上的点"
      example: "学生认为 (0, 5) 在 x 轴上"
      why: "看了第二个数字 5 就断定位置——忽略 x=0 这个关键信息"
      how_to_explain: "x=0 的点全在 y 轴上，不论 y 是多少。y=0 的点全在 x 轴上。问自己：哪个坐标是 0？"

    - mistake: "距离公式忘记平方"
      example: "学生写 AB = √((x₂ - x₁) + (y₂ - y₁))"
      why: "和勾股定理的 a+b=c 混淆——忘了勾股定理是平方和"
      how_to_explain: "画一个直角三角形：水平差是 a，竖直差是 b，距离是斜边 c。勾股定理：a² + b² = c²。所以 c = √(a² + b²)。你没有平方就相当于 a + b = c——这就不是勾股定理了。"
  alternate_explanations:
    - method: "游戏地图法"
      when_to_use: "学生对坐标概念感到抽象"
      prompt: "坐标系就像游戏里的地图。坐标 (x, y) = 你在游戏地图上的位置。x 是从地图左边走到右边的距离，y 是从下边走到上边的距离。'向右移 3 格' = 把 x 坐标 +3。'关于 y 轴对称' = 像镜子一样从地图左边翻到右边。每个游戏角色都有一个 (x, y) 坐标！"

    - method: "手指导航法"
      when_to_use: "学生对平移规则容易搞混方向"
      prompt: "伸出食指放在原点。右移 = x+，左移 = x-，上移 = y+，下移 = y-。向右（正方向）→ 坐标增加。向左（负方向）→ 坐标减少。你的手指就是那个点，动一动，坐标跟着变。"

  question_templates:
    difficulty_1_2: "出 2 道定位题：给坐标判断在哪个象限/轴上，或求一个点关于某个轴的对称点"
    difficulty_3: "出 1 道逆推题：给平移/对称后的最终坐标，反求原坐标"
    difficulty_4: "出 1 道综合题：结合距离公式和平移/对称，如'平移后两点距离不变——验证'"

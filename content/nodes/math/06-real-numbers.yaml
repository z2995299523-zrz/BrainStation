slug: real-numbers
subject: math
title: 实数
tier: core
difficulty: 2
prerequisites:
  - rational-numbers
estimated_min: 25
trigger:
  type: story
  title: 希帕索斯之死——一个数字引发的血案
  content:
    text: "公元前 500 年，毕达哥拉斯学派信奉一条铁律：\n\"万物皆数\"——所有数都可以写成分数（有理数）。\n\n一天，学生希帕索斯在研究正方形对角线时发现了一个恐怖的事实：\n边长为 1 的正方形，对角线长度竟然无法写成分数！\n\n$$\\sqrt{2} \\neq \\frac{a}{b}$$\n\n他发现了\"无理数\"——一个让整个学派的信仰崩塌的数字。\n\n据说，希帕索斯因为这个发现被扔进了海里。\n但真相是淹不死的——$\\sqrt{2}$、$\\pi$、$\\sqrt{3}$……\n这些\"不讲理\"的数字从此出现在数学的每个角落。\n\n有理数 + 无理数 = 实数。\n你现在拥有的，是数学家用了 2000 年才完全接受的数字世界。\n"
    question: 你能证明 √2 不能写成分数吗？试试反证法：假设 √2 = p/q。
display:
  concept:
    summary: 实数由有理数和无理数组成。本章学习平方根和立方根的概念、算术平方根的双重非负性（被开方数≥0，结果≥0）、无理数的识别、实数的大小比较以及在数轴上的表示。
    sections:
      - title: 一、平方根
        content: "**定义**：如果 $x^2 = a$，那么 $x$ 是 $a$ 的平方根。\n\n例如：$3^2 = 9$，$(-3)^2 = 9$ → 9 的平方根是 $\\pm 3$\n\n**算术平方根**：正数 $a$ 的正的平方根，记作 $\\sqrt{a}$\n\n例如：$\\sqrt{9} = 3$（算术平方根，只取正的那个），但 9 的平方根是 $\\pm 3$\n\n**双重非负性**：\n1. 被开方数 $a \\geq 0$（负数没有平方根！）\n2. $\\sqrt{a} \\geq 0$（算术平方根非负）\n"
      - title: 二、立方根
        content: "**定义**：如果 $x^3 = a$，那么 $x$ 是 $a$ 的立方根，记作 $\\sqrt[3]{a}$\n\n与平方根的关键区别：**任何实数都有立方根**（负数也有！）\n\n例如：$\\sqrt[3]{8} = 2$，$\\sqrt[3]{-8} = -2$\n\n为什么？因为 $(-2)^3 = -8$——负数的奇数次方仍是负数。\n"
      - title: 三、无理数
        content: "**定义**：无限不循环小数叫无理数。\n\n经典例子：\n- $\\sqrt{2} = 1.4142135623...$（没有循环节）\n- $\\pi = 3.1415926535...$（没有循环节）\n- $\\sqrt{3} = 1.7320508075...$\n\n**判断方法**：能写成 $\\frac{a}{b}$（a、b 整数，b≠0）→ 有理数；否则 → 无理数。\n\n注意：$0.1010010001...$（每两个 1 之间多一个 0）→ 无理数（没有循环节）\n"
      - title: 四、实数与数轴
        content: "**实数** = 有理数 ∪ 无理数\n\n**实数与数轴上的点一一对应**：数轴上的每一个点都对应唯一一个实数，\n每一个实数都对应数轴上唯一一个点。这条数轴现在被\"填满\"了。\n\n实数的分类：\n```\n实数\n├── 有理数（可写成分数）\n│   ├── 整数（... -2, -1, 0, 1, 2 ...）\n│   └── 分数/有限小数/无限循环小数\n└── 无理数（无限不循环小数）\n```\n\n实数的相反数和绝对值定义与有理数完全相同。\n"
  examples:
    - title: 求平方根
      problem: 求 25 的平方根和算术平方根。
      steps:
        - 第 1 步：$5^2 = 25$，$(-5)^2 = 25$ → 25 的平方根是 ±5
        - 第 2 步：算术平方根只取正的那个 → √25 = 5
        - 第 3 步：注意区别——'平方根'是 ±a，'算术平方根'是 |a|
      answer: 平方根：±5，算术平方根：5
    - title: 判断无理数
      problem: 判断下列哪个是无理数：A. √4  B. 22/7  C. √2  D. 0.333...
      steps:
        - 第 1 步：√4 = 2 = 2/1 → 有理数
        - 第 2 步：22/7 → 分数形式 → 有理数
        - 第 3 步：√2 ≈ 1.4142... 无限不循环 → 无理数
        - 第 4 步：0.333... = 1/3 → 有理数
      answer: C. √2 是无理数
    - title: 实数比大小
      problem: 比较 √10 和 3.2 的大小。
      steps:
        - 第 1 步：$3.2^2 = 10.24$
        - 第 2 步：$10 < 10.24$ → √10 < 3.2
        - 第 3 步：或者估算 √10 ≈ 3.162 < 3.2
      answer: √10 < 3.2
  practice:
    - id: real-prac-001
      stem: √16 的值是多少？
      answer: '4'
      hints:
        - 4² = ?
        - 算术平方根只取正值
    - id: real-prac-002
      stem: -8 的立方根是多少？
      answer: '-2'
      hints:
        - (-2)³ = ?
        - 负数也有立方根
    - id: real-prac-003
      stem: √(-9) 有意义吗？为什么？
      answer: 没有。被开方数必须 ≥ 0，-9 < 0。
      hints:
        - 平方根要求被开方数 ≥ 0
        - 负数没有实数平方根
    - id: real-prac-004
      stem: 3.14144144414444...（每两个 1 之间多一个 4）是有理数还是无理数？
      answer: 无理数——没有循环节，数字规律是递增而非循环
      hints:
        - 有无循环节是关键
        - 这个数的模式是递增的，不会重复
    - id: real-prac-005
      stem: 比较：√5 ___ 2.3（填 >、< 或 =）
      answer: <（2.3² = 5.29 > 5，所以 √5 < 2.3）
      hints:
        - 平方后比较
        - 2.3² = ?
  test:
    - id: real-test-001
      stem: 81 的算术平方根是？
      answer: C
      difficulty: 1
      layer: operation
      q_type: choice
      options:
        - A. ±9
        - B. -9
        - C. 9
        - D. 3
    - id: real-test-002
      stem: 下列哪个是无理数？
      answer: D
      difficulty: 1
      layer: operation
      q_type: choice
      options:
        - A. 0.5
        - B. √9
        - C. 3.1416
        - D. √3
    - id: real-test-003
      stem: √(x-2) 有意义，x 的取值范围是？
      answer: x ≥ 2（被开方数 x-2 ≥ 0）
      difficulty: 2
      layer: operation
    - id: real-test-004
      stem: √(a²) 一定等于 a 吗？举例说明。
      answer: 不一定。当 a ≥ 0 时 √(a²) = a；当 a < 0 时 √(a²) = -a（即 |a|）。例如 a = -3：√((-3)²) = √9 = 3 = -(-3)。所以 √(a²) = |a|。
      difficulty: 3
      layer: understand
    - id: real-test-005
      stem: 0.3 和 1/3 哪个大？
      answer: 1/3 > 0.3。1/3 = 0.333...，而 0.3 = 0.300...。0.333... > 0.300...
      difficulty: 2
      layer: operation
    - id: real-test-006
      stem: 画一条数轴，在数轴上大致标出 √2 的位置。
      answer: √2 ≈ 1.414，在 1 和 1.5 之间，靠近 1.4。更精确：边长为 1 的正方形对角线长度 = √2，可在数轴上用圆规作图表出。
      difficulty: 3
      layer: understand
    - id: real-test-007
      stem: 若 √(a-1) + √(b+2) = 0，求 a 和 b。
      answer: 两个非负数之和为 0，各项必须为 0。a-1=0 → a=1；b+2=0 → b=-2。
      difficulty: 4
      layer: connect
    - id: real-test-008
      stem: 小明说：'无理数就是无限小数。' 这句话对吗？为什么？
      answer: 不对。无限小数包括无限循环小数（如 0.333...=1/3，这是有理数）和无限不循环小数（如 π，这是无理数）。正确说法：无理数是无限不循环小数。
      difficulty: 3
      layer: understand
ai_context:
  topic_summary: 实数是初中数系扩展的最后一步，将有理数扩展到实数——完成从自然数到实数的完整数系。核心内容：平方根（重点：算术平方根的双重非负性）、立方根（与平方根的区别：负数也有立方根）、无理数的定义和识别（关键是'无限不循环'）、实数与数轴的一一对应。本章最关键的思维转换：从'所有数都能写成分数'到'存在大量不能写成分数的数'。
  key_insights:
    - √(a²) = |a| 而不是 a——这是平方根和绝对值之间最深的联系
    - 算术平方根的双重非负性是解方程和求取值范围的基础——a≥0 且 √a≥0
    - 无理数不是'没有道理'——它只是不能写成分数。无理数的存在说明分数体系是不完整的
    - 任何实数都可以在数轴上精确表示——实数'填满'了数轴上的每一个点
  common_mistakes:
    - mistake: 混淆平方根和算术平方根
      example: 学生写 √16 = ±4
      why: √ 符号本身表示算术平方根（取正值），而'16 的平方根'才是 ±4
      how_to_explain: 看到 √ → 只取正。问'平方根' → 正负都要。一个符号，一个词，区别在此。
    - mistake: 认为 √(a²) = a
      example: a = -3 时学生算 √((-3)²) = -3
      why: 忘记平方根的非负性——开方结果不可能为负
      how_to_explain: 先平方（得到正数）再开方（得到正数），中间的符号被'洗掉'了。√(a²) = |a|——对任意实数 a。
    - mistake: 认为 √2 = 1.414
      example: 学生把 1.414 当作 √2 的精确值
      why: 混淆了近似值和精确值
      how_to_explain: 1.414 是 √2 的三位小数近似值。√2 的精确值就是 √2——像 π 一样，它是一个确切的数，只是无法用有限小数表示。
    - mistake: 认为负数没有立方根
      example: 学生说 ∛(-8) 无意义
      why: 把平方根的限制（被开方数 ≥ 0）套到立方根上
      how_to_explain: 奇数次方保号——(-2)³ = -8，所以 ∛(-8) = -2。负数有奇次方根，没有偶次方根。
  alternate_explanations:
    - method: 正方形对角线法（√2 可视化）
      when_to_use: 学生不理解√2从哪来
      prompt: 画一个边长 1 的正方形。对角线多长？用勾股定理：d² = 1² + 1² = 2，所以 d = √2。在纸上画出对角线，用圆规把这段长度搬到数轴上——这就是 √2 在数轴上的位置。
    - method: 故事法（数系扩展史）
      when_to_use: 学生不理解为什么需要这么多'新数'
      prompt: 自然数(1,2,3...)不够用→引入分数。正数不够用→引入负数。分数不够用→引入无理数。每次扩展都是因为'需要一个数但现有数系里找不到'。√2 就是分数的数系里找不到的那个数。
  question_templates:
    difficulty_1_2: 出 2 道计算题：求平方根/算术平方根/立方根的值，或判断一个数是有理数还是无理数
    difficulty_3: 出 1 道条件题：给含平方根的条件（如被开方数≥0）求参数取值范围
    difficulty_4: 出 1 道综合题：结合绝对值和平方根（如 √(a²) = |a|），要求学生分类讨论

slug: basic-geometry
subject: math
title: 几何图形初步
tier: core
difficulty: 1
prerequisites: []
estimated_min: 25
trigger:
  type: story
  title: 从金字塔到空间站——几何无处不在
  content:
    text: "公元前 3000 年，埃及人建造金字塔时，没有 GPS，没有测绘仪——\n但他们精确测量了每条边、每个角，误差不到 0.1%。\n\n他们靠什么？几何学。\n\n\"Geo\" = 土地，\"Metry\" = 测量。\n几何最初的使命就是测量土地。\n\n今天你学的每一个图形、每一条线、每一个角，\n都和 5000 年前的埃及工匠使用着完全相同的规则。\n这就是数学的永恒之美。\n"
    question: 你周围有哪些几何图形？试着找到至少 5 种不同的形状。
display:
  concept:
    summary: 几何是研究图形的形状、大小和位置关系的数学分支。本章学习最基本的几何概念：点、线、面、体，以及线段、射线、直线、角。
    sections:
      - title: 一、几何的基本元素
        content: "几何世界由四个层次构成：\n\n- **点**：没有大小，只有位置。用大写字母表示：点 A、点 B\n- **线**：点动成线。没有宽度，只有长度\n- **面**：线动成面。有长度和宽度，没有厚度\n- **体**：面动成体。有长度、宽度和高度\n\n生活中的例子：\n- 笔尖碰到纸 → 点\n- 拉紧的线 → 线段\n- 桌面 → 平面\n- 盒子 → 长方体\n"
      - title: 二、线段、射线与直线
        content: "| 类型 | 端点 | 延长 | 表示法 | 长度 |\n|------|------|------|--------|------|\n| 线段 | 2 个 | 不能延长 | AB（上划线） | 有 |\n| 射线 | 1 个 | 单向无限 | 端点+方向 | 无 |\n| 直线 | 0 个 | 双向无限 | 小写 l 或两点 | 无 |\n\n**关键区别**：\n- 线段像一根绳子——两端有头\n- 射线像手电筒的光——从一点射出去，永不停止\n- 直线像铁轨——向两个方向无限延伸\n\n**两点确定一条直线**——这是几何的第一条基本事实（公理）。\n"
      - title: 三、角的概念
        content: "**定义**：从一点引出两条射线所组成的图形叫角。这点叫顶点，两条射线叫边。\n\n角的表示：∠AOB（顶点在中间）或 ∠O\n\n**角的分类**：\n| 类型 | 范围 | 例子 |\n|------|------|------|\n| 锐角 | 0° < α < 90° | 80° |\n| 直角 | α = 90° | ┐ |\n| 钝角 | 90° < α < 180° | 120° |\n| 平角 | α = 180° | — |\n| 周角 | α = 360° | ⊙ |\n\n**关键事实**：1 直角 = 90°，1 平角 = 180°，1 周角 = 360°\n"
      - title: 四、角的度量与计算
        content: "**度分秒制**：1° = 60′（分），1′ = 60″（秒）\n\n类比：度分秒就像时间的时分秒——都是 60 进制。\n\n**余角与补角**：\n- ∠A + ∠B = 90° → 互为余角\n- ∠A + ∠B = 180° → 互为补角\n\n例如：30° 的余角是 60°，30° 的补角是 150°。\n"
  examples:
    - title: 识别线段与射线
      problem: 手电筒射出的光是什么？用几何语言描述。
      steps:
        - 第 1 步：手电筒的光从灯泡出发——有一个端点
        - 第 2 步：光向外无限延伸——只有一个方向
        - 第 3 步：一个端点 + 单向无限延伸 = 射线
      answer: 射线——从手电筒灯泡这个端点出发，沿一个方向无限延伸。
    - title: 计算余角
      problem: 一个角的度数是 35°，求它的余角和补角。
      steps:
        - 第 1 步：余角 = 两角之和为 90° → 90° - 35° = 55°
        - 第 2 步：补角 = 两角之和为 180° → 180° - 35° = 145°
        - 第 3 步：注意——余角和补角都是针对两个角的关系定义的
      answer: 余角 = 55°，补角 = 145°
    - title: 度分秒换算
      problem: 把 2.5° 化成度分秒。
      steps:
        - 第 1 步：2.5° = 2° + 0.5°
        - 第 2 步：0.5° = 0.5 × 60′ = 30′
        - 第 3 步：所以 2.5° = 2°30′
      answer: 2°30′
  practice:
    - id: geo-prac-001
      stem: 下列哪个是线段？
      answer: B
      hints:
        - 线段有几个端点？
        - 拉直的绳子两头有头吗？
      q_type: choice
      options:
        - A. 手电筒的光
        - B. 拉直的绳子
        - C. 铁轨
    - id: geo-prac-002
      stem: 一个角的度数是 40°，它的余角是多少度？
      answer: 50°
      hints:
        - 两角互余→和为 90°
        - 90° - 40° = ?
    - id: geo-prac-003
      stem: 一个角的度数是 110°，它是什么角？
      answer: 钝角（大于 90° 且小于 180°）
      hints:
        - 直角是 90°，平角是 180°
        - 110° 在这两者之间吗？
    - id: geo-prac-004
      stem: 过两点可以画几条直线？
      answer: 1 条（两点确定一条直线）
      hints:
        - 想象纸上有两个点
        - 用直尺连接它们——只有一种画法
    - id: geo-prac-005
      stem: 1.5° 等于多少分？
      answer: 90′
      hints:
        - 1° = 60′
        - 1.5 × 60 = ?
  test:
    - id: geo-test-001
      stem: 判断题：射线有两个端点。
      answer: 错。射线有一个端点，向一侧无限延伸。
      difficulty: 1
      layer: operation
    - id: geo-test-002
      stem: 下列哪个角是钝角？
      answer: C
      difficulty: 1
      layer: operation
      q_type: choice
      options:
        - A. 30°
        - B. 90°
        - C. 135°
        - D. 180°
    - id: geo-test-003
      stem: ∠A = 25°，∠B = 65°。它们是什么关系？
      answer: 互为余角。25° + 65° = 90°。
      difficulty: 1
      layer: operation
    - id: geo-test-004
      stem: 一个角的补角比它的余角大多少度？
      answer: 90°。因为补角 = 180° - x，余角 = 90° - x，差 = (180° - x) - (90° - x) = 90°——与 x 无关。
      difficulty: 3
      layer: understand
    - id: geo-test-005
      stem: 把 3.75° 化成度分秒。
      answer: 3°45′。3.75° = 3° + 0.75° = 3° + 0.75×60′ = 3°45′
      difficulty: 2
      layer: operation
    - id: geo-test-006
      stem: 线段、射线和直线中，哪些可以度量长度？为什么？
      answer: 只有线段可以度量长度。因为线段有两个端点，长度是确定的。射线和直线都是无限延伸的，没有固定的长度。
      difficulty: 2
      layer: understand
    - id: geo-test-007
      stem: 一个角的余角和它的补角之比是 1:3，求这个角的度数。
      answer: 设角为 x°，则余角 = 90°-x，补角 = 180°-x。(90-x):(180-x) = 1:3 → 3(90-x) = 180-x → 270-3x = 180-x → 90 = 2x → x = 45°
      difficulty: 4
      layer: connect
    - id: geo-test-008
      stem: 为什么说几何学是人类最早的精确科学？结合埃及人建造金字塔的例子说明。
      answer: 几何学起源于实际需要（测量土地、建造建筑），它用严格的逻辑推理代替了直觉猜测。埃及人造金字塔时用几何知识精确测量角度和长度，误差极小——这说明几何是一种精确、可复现的工具。
      difficulty: 3
      layer: connect
ai_context:
  topic_summary: 几何图形初步是初中几何的第一课，建立点、线、面、体的基本概念，区分线段/射线/直线三种基本线形，掌握角的概念、分类（锐角/直角/钝角/平角/周角）、度量（度分秒制）和基本关系（互余/互补）。这是后续所有几何学习的基础——没有这些基本概念，三角形、全等、相似都无法理解。
  key_insights:
    - 点动成线、线动成面、面动成体——这是从低维到高维的递进思维，比记忆图形定义更重要
    - 两点确定一条直线是几何的第一条公理——公理不证明，是所有推理的起点
    - 度分秒制和时间的时分秒制一样是 60 进制——利用已有的时间概念帮助理解角的度量
    - 互余（和=90°）和互补（和=180°）是角的关系，不是角的属性——一个角单独存在时不能说它是'余角'
  common_mistakes:
    - mistake: 混淆线段、射线和直线
      example: 学生说'射线 AB 和射线 BA 是同一条射线'
      why: 射线有方向——端点在前，方向由端点指向另一点。射线 AB 以 A 为端点向 B 延伸，射线 BA 以 B 为端点向 A 延伸——方向相反
      how_to_explain: 射线像手电筒——从灯泡（端点）照出去。射线 AB = 手电筒在 A，照向 B。射线 BA = 手电筒在 B，照向 A。完全不一样！
    - mistake: 认为钝角 > 180°
      example: 学生把 200° 叫做钝角
      why: 混淆了钝角和超过平角的角——钝角定义是 90° < α < 180°
      how_to_explain: 角从锐到周：锐角(0-90) < 直角(=90) < 钝角(90-180) < 平角(=180) < 周角(=360)。钝角在直角和平角之间——超过 180° 就没有专门的名字了。
    - mistake: 度分秒换算时忘记是 60 进制
      example: 把 2.5° 写成 2°50′
      why: 习惯十进制——2.5° 中 0.5 是半度 = 30′，不是 50′
      how_to_explain: 度和分的关系像小时和分钟——1.5 小时 = 1 小时 30 分钟，不是 1 小时 50 分钟！
    - mistake: 分不清'互余'和'互补'
      example: 求 40° 的余角时写成 180° - 40° = 140°
      why: 记混了两个概念——余 = 90，补 = 180
      how_to_explain: 口诀：'余'字比'补'字笔画少——余角用小数(90°)，补角用大数(180°)。或者记：'有余'=有剩余=不满一百=90°。
  alternate_explanations:
    - method: 身体几何法
      when_to_use: 学生对点线面体概念感到抽象
      prompt: 伸出食指→点。拉紧一根线→线段。挥动手臂画一个弧→面。捧起一本书→体。几何就在你身上——点线面体是一层一层构建起来的。
    - method: 钟表类比法（角度）
      when_to_use: 学生不理解角度分类
      prompt: 把钟表想象成角度计。3 点整=90°=直角。1 点半≈45°=锐角。5 点≈150°=钝角。6 点整=180°=平角。一圈=360°=周角。每次看表都是复习角度。
  question_templates:
    difficulty_1_2: 出 2 道识别题：给图形或度数让学生判断线段/射线/直线类型或角的分类
    difficulty_3: 出 1 道计算题：涉及度分秒换算或互余/互补计算，需要两步推理
    difficulty_4: 出 1 道探究题：让学生发现一个几何性质（如'补角-余角=90°与角度无关'）并解释原因

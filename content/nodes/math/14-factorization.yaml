    "是乘法分配律的逆运算": "整式乘法和因式分解是什么关系？"
    "可以用来解方程": "$(x+2)(x+3)=0$ 的解是多少？为什么？"
    "和分解质因数类似": "12 的质因数分解和 x²-9 的因式分解有什么相似？"


    - "是乘法分配律的逆运算"
    - "可以用来解方程"
    - "和分解质因数类似"
  deep_questions:
    - "如果你来设计一个加密方法，你会用因式分解的哪个特性？"
    - "一个完全不懂数学的人问你因式分解有什么用，你怎么回答？"
  missing_hints:

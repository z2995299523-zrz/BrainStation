slug: factorization
subject: math
title: "因式分解"
tier: core
difficulty: 3
prerequisites: ["polynomials"]
estimated_min: 25

trigger:
  type: story
  title: "RSA加密：你的密码靠因式分解保护"
  content:
    text: |
      你每次登录微信、网购支付——背后都有一个数学操作在保护你：因式分解。

      RSA 加密的核心是：两个大质数相乘很容易，但把一个巨大的乘积
      拆回原来的两个质数极难——即使是最快的计算机也要算几万年。

      这就是正向容易、逆向极难的魔力。
      而这种拆分的思维，就是因式分解。
    question: "为什么把东西拆开有时候比拼起来难得多？"

content:
  operation:
    text: |
      ## 因式分解：把多项式还原成乘积形式

      整式乘法：$(x+2)(x+3) = x^2 + 5x + 6$
      因式分解：$x^2 + 5x + 6 = (x+2)(x+3)$ ← 逆过程！

      **三大基本方法**：

      1. **提公因式**：$ab + ac = a(b+c)$
         例：$3x^2 + 6x = 3x(x + 2)$

      2. **公式法**：
         - 平方差：$a^2 - b^2 = (a+b)(a-b)$
         - 完全平方：$a^2 + 2ab + b^2 = (a+b)^2$
         - 完全平方：$a^2 - 2ab + b^2 = (a-b)^2$

      3. **十字相乘法**：
         $x^2 + (p+q)x + pq = (x+p)(x+q)$
         例：$x^2 + 5x + 6 = (x+2)(x+3)$
    examples:
      - input: "分解 $x^2-9$"
        output: "$(x+3)(x-3)$"
        method: "平方差公式"

  understand:
    text: |
      ## 为什么因式分解这么有用？

      因式分解的核心威力：把一个难的问题拆成几个简单的问题。

      **解方程的应用**：
      $x^2 + 5x + 6 = 0$
      → $(x+2)(x+3) = 0$
      → $x = -2$ 或 $x = -3$（乘积为 0 意味着至少一个因子为 0）

      没有因式分解，二次方程很难解。

      **为什么 RSA 加密依赖因式分解困难？**
      因为正向乘是 O(n²) 的计算量，逆向分解可能是指数级的。
      这种不对称性正是密码学的基石。
    highlights:
      - "因式分解让解二次方程从猜变成了算"
      - "乘积为 0 则至少一个因子为 0"

  connect:
    text: |
      ## 因式分解的跨学科意义

      - **密码学**：RSA 加密 = 大数质因数分解的困难性
      - **信号处理**：傅里叶变换本质上是把信号因式分解成不同频率
      - **化学**：化学方程式配平 = 线性方程组的整数解

      更深一层：分解→分析→重构是解决所有复杂问题的通用方法，
      因式分解只是这个思维模式的数学表达。
    thought_seeds:
      - "解方程是数学中最常见的操作，因式分解让它变简单"
      - "逆向思维：不是算出来，而是退回去"

feynman:

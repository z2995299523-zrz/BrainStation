slug: factorization
subject: math
title: "因式分解"
tier: core
difficulty: 3
prerequisites: ["polynomials"]
estimated_min: 25

trigger:
  type: story
  title: "RSA加密：你的密码靠因式分解保护"
  content:
    text: |
      你每次登录微信、网购支付——背后都有一个数学操作在保护你：因式分解。

      RSA 加密的核心是：两个大质数相乘很容易，但把一个巨大的乘积
      拆回原来的两个质数极难——即使是最快的计算机也要算几万年。

      这就是正向容易、逆向极难的魔力。
      而这种拆分的思维，就是因式分解。
    question: "为什么把东西拆开有时候比拼起来难得多？"

display:
  concept:
    summary: "因式分解就是把一个多项式还原成几个整式相乘的形式，它是整式乘法的逆运算，是解方程、化简分式的有力工具。"
    sections:
      - title: "一、什么是因式分解"
        content: |
          整式乘法（展开）：
          $$(x+2)(x+3) = x^2 + 5x + 6$$

          因式分解（逆过程）：
          $$x^2 + 5x + 6 = (x+2)(x+3)$$

          因式分解把"和差"形式变成"乘积"形式，结果必须是几个整式相乘。

      - title: "二、提公因式法"
        content: |
          如果多项式各项有公共的因式，先把它提到括号外面：
          $$ab + ac = a(b+c)$$

          例如：
          $$3x^2 + 6x = 3x(x + 2)$$

          这是因式分解的第一步，永远先看有没有公因式可提。

      - title: "三、公式法"
        content: |
          平方差公式：
          $$a^2 - b^2 = (a+b)(a-b)$$

          完全平方公式：
          $$a^2 + 2ab + b^2 = (a+b)^2$$
          $$a^2 - 2ab + b^2 = (a-b)^2$$

          例如：$x^2 - 9 = x^2 - 3^2 = (x+3)(x-3)$。

      - title: "四、十字相乘法与威力"
        content: |
          对于 $x^2 + (p+q)x + pq$ 型：
          $$x^2 + (p+q)x + pq = (x+p)(x+q)$$

          例如 $x^2 + 5x + 6$，找两个数相乘得 $6$、相加得 $5$，即 $2$ 和 $3$：
          $$x^2 + 5x + 6 = (x+2)(x+3)$$

          威力：因式分解把难问题拆成简单问题。解 $x^2+5x+6=0$ 时，
          分解成 $(x+2)(x+3)=0$，由"乘积为 0 则至少一个因子为 0"得 $x=-2$ 或 $x=-3$。

  examples:
    - title: "提公因式"
      problem: '分解因式 $3x^2 + 6x$'
      steps:
        - '第 1 步：观察各项，公因式是 $3x$'
        - '第 2 步：提出 $3x$：$3x^2 \div 3x = x$，$6x \div 3x = 2$'
      answer: "3x(x + 2)"

    - title: "平方差公式"
      problem: '分解因式 $x^2 - 9$'
      steps:
        - '第 1 步：写成平方差形式 $x^2 - 3^2$'
        - '第 2 步：套用 $a^2-b^2=(a+b)(a-b)$'
      answer: "(x+3)(x-3)"

    - title: "十字相乘"
      problem: '分解因式 $x^2 + 5x + 6$'
      steps:
        - '第 1 步：找两个数，乘积为 6、和为 5，即 2 和 3'
        - '第 2 步：写成 $(x+2)(x+3)$'
      answer: "(x+2)(x+3)"

  practice:
    - id: "fact-prac-001"
      stem: '分解因式 $2x^2 + 4x$'
      answer: "2x(x + 2)"
      hints: ["公因式是什么？", "提出 2x"]

    - id: "fact-prac-002"
      stem: '分解因式 $x^2 - 16$'
      answer: "(x+4)(x-4)"
      hints: ["这是平方差吗？16 = 4²", "套用 a²-b²=(a+b)(a-b)"]

    - id: "fact-prac-003"
      stem: '分解因式 $x^2 + 6x + 9$'
      answer: "(x+3)^2"
      hints: ["像完全平方公式吗？", "9=3²，6x=2·x·3，是 (x+3)²"]

    - id: "fact-prac-004"
      stem: '分解因式 $x^2 + 7x + 12$'
      answer: "(x+3)(x+4)"
      hints: ["找两个数：乘积 12、和 7", "3 和 4 满足"]

    - id: "fact-prac-005"
      stem: '分解因式 $x^2 - 5x + 6$'
      answer: "(x-2)(x-3)"
      hints: ["乘积 6、和 -5 的两个数", "-2 和 -3"]

    - id: "fact-prac-006"
      stem: '分解因式 $4a^2 - b^2$'
      answer: "(2a+b)(2a-b)"
      hints: ["4a² 是 (2a)²", "平方差公式：a 换成 2a"]

  test:
    - id: "fact-test-001"
      stem: '分解因式 $5x^2 + 10x$'
      answer: "5x(x + 2)"
      difficulty: 1
      layer: operation

    - id: "fact-test-002"
      stem: '分解因式 $x^2 - 25$'
      answer: "(x+5)(x-5)"
      difficulty: 2
      layer: operation

    - id: "fact-test-003"
      stem: '分解因式 $x^2 - 4x + 4$'
      answer: "(x-2)^2"
      difficulty: 2
      layer: operation

    - id: "fact-test-004"
      stem: '分解因式 $x^2 + 8x + 15$'
      answer: "(x+3)(x+5)"
      difficulty: 3
      layer: operation

    - id: "fact-test-005"
      stem: '分解因式 $2x^2 - 8$'
      answer: "2(x+2)(x-2)"
      difficulty: 3
      layer: operation

    - id: "fact-test-006"
      stem: '解方程 $x^2 + 5x + 6 = 0$（用因式分解）'
      answer: "(x+2)(x+3)=0，所以 x=-2 或 x=-3"
      difficulty: 4
      layer: connect

    - id: "fact-test-007"
      stem: "因式分解 x²-9=(x+3)(x-3) 和把 12 分解成 2×2×3，有什么共同的思想？"
      answer: "都是把一个整体还原成更小的因子相乘，即'分解'的思想，便于分析和进一步运算。"
      difficulty: 3
      layer: understand

    - id: "fact-test-008"
      stem: "为什么 (x+2)(x+3)=0 能推出 x=-2 或 x=-3？"
      answer: "因为两个数相乘等于 0，则至少有一个因子为 0，所以 x+2=0 或 x+3=0。"
      difficulty: 4
      layer: understand

ai_context:
  topic_summary: "因式分解是整式乘法的逆运算，是初中代数的核心技能。掌握提公因式、公式法（平方差、完全平方）、十字相乘三大方法，能把多项式化成乘积形式，从而简化分式运算、求解一元二次方程。"
  key_insights:
    - "因式分解是整式乘法的逆过程：把和差变成乘积"
    - "永远先看能不能提公因式，再考虑公式法或十字相乘"
    - "因式分解让解二次方程从猜变成了算（乘积为 0 则有因子为 0）"
    - "分解→分析→重构是解决复杂问题的通用思路，因式分解只是它的数学表达"
  common_mistakes:
    - mistake: "分解不彻底，提完公因式后没继续分解"
      example: "$2x^2-8$ 只写成 $2(x^2-4)$ 就停下"
      why: "学生提完公因式后忘了括号内还能用平方差继续分解"
      how_to_explain: "因式分解要进行到每个因式都不能再分为止。$2(x^2-4)$ 中 $x^2-4$ 还是平方差，应继续分成 $2(x+2)(x-2)$。"
    - mistake: "把因式分解和解方程混淆"
      example: "对 $x^2+5x+6$ 直接写成 $x=-2,x=-3$"
      why: "学生没看清是要分解还是要解方程"
      how_to_explain: "因式分解的结果是乘积式 (x+2)(x+3)，不是 x 的值。只有当题目是方程 =0 时才求 x。"
    - mistake: "结果不是乘积形式"
      example: "把 $x^2+5x+6$ 写成 $x(x+5)+6$"
      why: "学生没把整个式子化成几个整式相乘"
      how_to_explain: "因式分解的最终形式必须是整式的乘积，中间不能再有加减。检查一下：你的结果是不是几个括号相乘？"
  alternate_explanations:
    - method: "拼图逆向类比"
      when_to_use: "学生不理解因式分解与乘法的关系时"
      prompt: "整式乘法像把拼图块拼成一张图（展开），因式分解像把整张图拆回原来的拼图块（还原）。两者是互逆的。"
    - method: "凑数游戏"
      when_to_use: "学生面对十字相乘不知如何下手时"
      prompt: "对 $x^2+bx+c$，玩一个游戏：找两个数，乘起来等于 c，加起来等于 b。找到这两个数 p、q，答案就是 (x+p)(x+q)。"
  question_templates:
    difficulty_1_2: "出 2 道提公因式或平方差的基础分解题，数字简单"
    difficulty_3: "出 1 道十字相乘或需先提公因式再用公式的综合分解题"
    difficulty_4: "出 1 道用因式分解解一元二次方程，或解释'乘积为 0'原理的题"

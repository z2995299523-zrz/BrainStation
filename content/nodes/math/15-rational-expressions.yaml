slug: rational-expressions
subject: math
title: "分式"
tier: core
difficulty: 3
prerequisites: ["factorization"]
estimated_min: 25

trigger:
  type: story
  title: "当除法遇到代数——分式的世界"
  content:
    text: |
      你早就认识分数了——1/2, 3/4, 2/3。
      它们有一个共同点：分子和分母都是数字。

      如果分母字母出现了变量呢？
      $$\frac{x+1}{x-2}$$

      它叫**分式**——分数的代数升级版。
      分式和分数遵循几乎相同的规则：
      - 分母不能为 0
      - 约分要分子分母同除以一个非零因式
      - 通分要找最简公分母

      区别在于：分数约分用质因数分解；
      分式约分用**因式分解**——这就是为什么因式分解是前提。

      分式是通往更高阶方程（分式方程、反比例函数）的大门。
      掌握分式，你就拿到了高等代数的入场券。
    question: "x = 2 时，分式 (x+1)/(x-2) 有意义吗？为什么？"

display:
  concept:
    summary: "分式是分母中含有字母的有理式。本章学习分式的基本性质（分母不为 0）、约分与最简分式、分式的四则运算（加减乘除）以及分式方程的解法。"
    sections:
      - title: "一、分式的概念"
        content: |
          **定义**：形如 A/B（B 中含有字母，B ≠ 0）的式子叫分式。

          关键区分：
          - 整式：x + 1, 2x², 5 → 分母中没有字母
          - 分式：1/x, (x+1)/(x-2) → 分母中有字母

          **分式有意义的条件**：分母 ≠ 0

          例如：分式 1/(x-3) 有意义 → x ≠ 3

      - title: "二、分式的基本性质"
        content: |
          **基本性质**：
          $$\frac{A}{B} = \frac{A \cdot M}{B \cdot M} = \frac{A \div M}{B \div M} \quad (M \neq 0)$$

          分式的分子和分母同乘（或同除）一个不等于 0 的整式，分式的值不变。

          这完全等同于分数的基本性质——只是把"数"换成了"式"。

      - title: "三、约分与最简分式"
        content: |
          **约分**：分子分母同除以它们的公因式。

          步骤：
          1. 分子分母分别因式分解
          2. 约去公因式

          例如：$\frac{x^2-4}{x^2-2x} = \frac{(x+2)(x-2)}{x(x-2)} = \frac{x+2}{x}$（x ≠ 0, x ≠ 2）

          **注意事项**：
          - 约分时要约去的是**因式**，不是项！
          - $\frac{x+1}{x} \neq 1$——不能约去 x（x 在分子中不是因式，是项）

      - title: "四、分式的四则运算"
        content: |
          **乘除**：
          - 乘法：分子乘分子，分母乘分母。$\frac{A}{B} \cdot \frac{C}{D} = \frac{AC}{BD}$
          - 除法：变成乘以倒数。$\frac{A}{B} \div \frac{C}{D} = \frac{A}{B} \cdot \frac{D}{C}$

          **加减**：
          - 同分母：分子相加减，分母不变
          - 异分母：先通分（找最简公分母），再加减

          最简公分母 = 各分母因式分解后，取每个不同因式的最高次幂的积

      - title: "五、分式方程"
        content: |
          分母中含有未知数的方程叫分式方程。

          解法：去分母 → 化为整式方程 → 求解 → **检验**！

          检验是必须的——去分母过程可能产生**增根**（使原方程分母为 0 的根）。

          例如：$\frac{x}{x-2} = \frac{3}{x-2}$
          去分母：x = 3
          但 x = 2 使原分母为 0——如果解出 x=2 就要舍去！

  examples:
    - title: "判断分式有意义的条件"
      problem: "当 x 取何值时，分式 (x+1)/(x²-4) 有意义？"
      steps:
        - "第 1 步：分式有意义 → 分母 ≠ 0"
        - "第 2 步：x² - 4 = 0 → (x+2)(x-2) = 0 → x = 2 或 x = -2"
        - "第 3 步：所以 x ≠ 2 且 x ≠ -2"
      answer: "x ≠ 2 且 x ≠ -2"

    - title: "分式化简（约分）"
      problem: "化简：x²-9 / (x²+6x+9)"
      steps:
        - "第 1 步：分子因式分解——x²-9 = (x+3)(x-3)"
        - "第 2 步：分母因式分解——x²+6x+9 = (x+3)²"
        - "第 3 步：约去公因式 (x+3)——(x-3)/(x+3)，其中 x ≠ -3"
      answer: "(x-3)/(x+3)，x ≠ -3"

    - title: "解分式方程"
      problem: "解方程：x/(x-1) = 3/(x-1) + 1"
      steps:
        - "第 1 步：去分母——两边同乘 (x-1)：x = 3 + (x-1)"
        - "第 2 步：化简——x = 3 + x - 1 → x - x = 2 → 0 = 2——矛盾！"
        - "第 3 步：方程无解（去分母后得到矛盾等式）"
      answer: "无解"

  practice:
    - id: "fe-prac-001"
      stem: "当 x = ? 时，分式 1/(2x-6) 无意义？"
      answer: "x = 3（分母 2x-6 = 0）"
      hints: ["分母为 0 时分式无意义", "2x - 6 = 0 → x = ?"]

    - id: "fe-prac-002"
      stem: "化简：6x²y/9xy²"
      answer: "2x/3y"
      hints: ["分子分母同时除以 3xy", "6÷3=2, x²÷x=x, y÷y²=?（哦不是，应该y²÷y=y?）"]
      hints: ["正确：6x²y ÷ 3xy = 2x, 9xy² ÷ 3xy = 3y"]

    - id: "fe-prac-003"
      stem: "计算：3/(x+1) + 2/(x+1)"
      answer: "5/(x+1)"
      hints: ["同分母分式——分子直接相加", "分母相同，分子 3+2 = 5"]

    - id: "fe-prac-004"
      stem: "计算：1/x + 1/(x+1)"
      answer: "(2x+1)/[x(x+1)]"
      hints: ["先通分——公分母为 x(x+1)", "第一个分式分子乘 (x+1)，第二个乘 x"]

    - id: "fe-prac-005"
      stem: "分式 (x-2)/(x²-4) 能约分吗？如果能，化简。"
      answer: "能。=(x-2)/[(x+2)(x-2)] = 1/(x+2)，x ≠ 2"
      hints: ["分母因式分解：x²-4 = (x+2)(x-2)", "x²-4 是平方差公式"]

  test:
    - id: "fe-test-001"
      stem: "当 x 取何值时，分式 1/(x+5) 无意义？"
      answer: "x = -5"
      difficulty: 1
      layer: operation

    - id: "fe-test-002"
      stem: "化简：(x²-1)/(x²+x)"
      answer: "=(x+1)(x-1)/[x(x+1)] = (x-1)/x，x ≠ -1"
      difficulty: 2
      layer: operation

    - id: "fe-test-003"
      stem: "计算：2/x · x²/4"
      answer: "x/2"
      difficulty: 2
      layer: operation

    - id: "fe-test-004"
      stem: "计算：1/(x-1) - 1/(x+1)"
      answer: "2/[(x-1)(x+1)]。通分：(x+1)/(x²-1) - (x-1)/(x²-1) = 2/(x²-1)。"
      difficulty: 2
      layer: operation

    - id: "fe-test-005"
      stem: "分式方程 x/(x-3) = 1 + 6/(x-3) 的解是？注意检验。"
      answer: "去分母后 x = x - 3 + 6 → 0 = 3，矛盾。方程无解（解出来的任何值都会使分母为 0——实际上没有解出任何值）。"
      difficulty: 3
      layer: understand

    - id: "fe-test-006"
      stem: "为什么约分时不能约去'项'只能约去'因式'？举例说明。"
      answer: "因为约分的本质是分子分母同除一个公因式——必须是乘法关系。x/(x+1)中分子是单因式x，分母是两项之和——没有公因式可约。如果强行'约去x'得到1/2是完全错误的。"
      difficulty: 3
      layer: understand

    - id: "fe-test-007"
      stem: "若分式 (x²+kx)/(x²-4) 能约去 (x+2)，求 k。"
      answer: "分母=(x+2)(x-2)。分子要有因式(x+2)，即 x²+kx 能被 (x+2) 整除。代 x=-2：(-2)²+k(-2)=0 → 4-2k=0 → k=2。"
      difficulty: 4
      layer: connect

    - id: "fe-test-008"
      stem: "甲的工效是 1/a，乙的工效是 1/b。两人合做需要多少天完成工作？用分式表达。"
      answer: "合作工效 = 1/a + 1/b = (a+b)/(ab)。完成时间 = 1 ÷ 合效 = ab/(a+b) 天。"
      difficulty: 3
      layer: connect

ai_context:
  topic_summary: "分式是分母中含有字母的有理式，是分数的代数化推广。核心内容：分式有意义的条件（分母≠0）、分式的基本性质（分子分母同乘除非零整式值不变）、约分与最简分式（需要因式分解分子分母后约去公因式）、分式的四则运算（乘法直接乘、除法乘倒数、加减需通分）、分式方程（去分母化整式方程+检验排除增根）。分式以因式分解为前置技能——分子分母分解后约分是核心操作。"
  key_insights:
    - "分式和分数遵循相同的规则——你已经在小学掌握了分数的全部运算，现在只需把'数'换成'式'"
    - "约分的前提是因式分解——不能分解就看不出公因式。因式分解是分式的'眼睛'"
    - "增根是分式方程特有的问题——去分母时可能引入使原分母为0的根，检验不是可选项而是必须项"
    - "最简公分母的找法和小学找最小公倍数逻辑完全相同——取每个不同因式的最高次幂"
  common_mistakes:
    - mistake: "约去项而不是约去因式"
      example: "学生把 (x+1)/(x) 约去 x 得到 1/1 = 1"
      why: "混淆了'因式'和'项'——分母 x 是一个因式（单因式），但分子 (x+1) 是两项之和"
      how_to_explain: "约分 = 分子分母同除。你只能在分子分母都是乘积形式时约分。分子 x+1 是'和'不是'积'——x 和 1 两个'项'被加号捆在一起，你没法单独约去 x。"

    - mistake: "忘记检验增根"
      example: "解分式方程得到 x=2，但 x=2 恰好使原分母为 0"
      why: "去分母后忘记检验——直接接受了整式方程的解"
      how_to_explain: "解分式方程永远多一步：把解代回原方程的分母——如果分母为 0 就舍去。这不是额外的作业，这是分式方程的规则。"

    - mistake: "加减时忘记通分"
      example: "1/x + 1/(x+1) = 2/(2x+1)"
      why: "把分子分母分别相加"
      how_to_explain: "分式加减和分数加减完全一样——异分母必须先通分（找最简公分母），不能直接加。可以类比：1/2 + 1/3 ≠ 2/5，而是 = 3/6+2/6 = 5/6。"
  alternate_explanations:
    - method: "分数类比法"
      when_to_use: "学生对分式运算感到陌生"
      prompt: "把分式想象成分数——x 只是一个你不知道的数字。1/2 + 1/3 怎么做？通分到 6。1/x + 1/(x+1) 同理——通分到 x(x+1)。不要被字母吓住——它们只是'暂时不知道的数字'。"

    - method: "图像法（增根含义）"
      when_to_use: "学生不理解'增根'的含义"
      prompt: "画 y = (x)/(x-2) - 3/(x-2) 的图像。x=2 处函数没有定义（分母为 0）——图上是一个'洞'。但如果你先去分母化简，可能会被骗——以为那个洞不存在。增根就是那个洞里的'假答案'。"

  question_templates:
    difficulty_1_2: "出 2 道运算题：分式约分或同分母分式加减"
    difficulty_3: "出 1 道异分母分式运算或简单分式方程（需检验）"
    difficulty_4: "出 1 道含参/逆推题：给分式约分结果反求原分式的参数"

slug: data-analysis
subject: math
title: "数据的分析"
tier: core
difficulty: 2
prerequisites: ["rational-numbers", "real-numbers"]
estimated_min: 30

trigger:
  type: story
  title: "一道菜的平均分，藏着一个骗局"
  content:
    text: |
      某餐厅广告说："顾客打分平均 8 分（满分 10）！"
      你信以为真，去了之后却很失望。
      原来 10 个评分是：1, 1, 1, 1, 1, 10, 10, 10, 10, 10。
      平均数确实是 8 没错……但根本没有一个人打 8 分。
      一半人很满意，一半人很糟糕——平均数把真相"抹平"了。
      这时候，中位数、众数和方差，才能告诉你完整的故事。
    question: "如果有人想用一个数字骗你，他最可能选平均数、中位数还是众数？为什么？"

display:
  concept:
    summary: "用平均数、中位数、众数描述数据的集中趋势，用方差描述数据的离散程度。"
    sections:
      - title: "一、平均数（集中趋势之一）"
        content: |
          平均数反映一组数据的总体水平。

          算术平均数：
          $$\bar{x} = \frac{x_1 + x_2 + \cdots + x_n}{n}$$

          加权平均数（各数据重要性不同时）：
          $$\bar{x} = \frac{x_1 f_1 + x_2 f_2 + \cdots + x_k f_k}{f_1 + f_2 + \cdots + f_k}$$

          其中 $f_i$ 是 $x_i$ 出现的次数（权）。
          平均数最大的弱点：容易被极端值"带跑"。

      - title: "二、中位数与众数"
        content: |
          中位数：把数据从小到大排列后，正中间的那个数。
          - 数据个数为奇数：取最中间一个
          - 数据个数为偶数：取中间两个的平均数

          众数：一组数据中出现次数最多的数（可以有多个，也可以没有）。

          对比：
          - 平均数：用上了每一个数据，但怕极端值
          - 中位数：不受极端值影响，反映中等水平
          - 众数：反映"最常见"的情况

      - title: "三、方差（离散程度）"
        content: |
          方差衡量数据偏离平均数的程度——越大越分散，越小越集中（稳定）。

          $$s^2 = \frac{1}{n}\left[(x_1-\bar{x})^2 + (x_2-\bar{x})^2 + \cdots + (x_n-\bar{x})^2\right]$$

          要点：
          - 先算平均数 $\bar{x}$
          - 再算每个数据与平均数之差的平方
          - 最后求这些平方差的平均
          标准差 $s = \sqrt{s^2}$，单位与原数据相同。

      - title: "四、怎么选用哪个量"
        content: |
          | 想表达什么 | 该用哪个量 |
          |---|---|
          | 总体平均水平 | 平均数 |
          | 中等水平、避开极端值 | 中位数 |
          | 最普遍、最流行 | 众数 |
          | 稳定性、波动大小 | 方差 / 标准差 |

          例：比较两名射击运动员，平均环数相同时，方差小的更稳定，应入选。

  examples:
    - title: "三个集中量一起算"
      problem: '一组数据：$3, 5, 5, 8, 9$。求平均数、中位数、众数。'
      steps:
        - '第 1 步：平均数 $\bar{x} = \frac{3+5+5+8+9}{5} = \frac{30}{5} = 6$'
        - '第 2 步：数据已从小到大排列，共 5 个（奇数），中位数取第 3 个，即 $5$'
        - '第 3 步：$5$ 出现了 2 次，最多，众数是 $5$'
      answer: "平均数 6，中位数 5，众数 5"

    - title: "比稳定性（方差）"
      problem: '甲组：$8, 9, 10$；乙组：$6, 9, 12$。两组平均数都是 9，谁更稳定？'
      steps:
        - '第 1 步：两组平均数均为 $\bar{x}=9$'
        - '第 2 步：甲方差 $s_甲^2 = \frac{(8-9)^2+(9-9)^2+(10-9)^2}{3} = \frac{1+0+1}{3} = \frac{2}{3}$'
        - '第 3 步：乙方差 $s_乙^2 = \frac{(6-9)^2+(9-9)^2+(12-9)^2}{3} = \frac{9+0+9}{3} = 6$'
        - '第 4 步：$\frac{2}{3} < 6$，甲组方差更小，甲组更稳定'
      answer: "甲组更稳定（方差更小）"

    - title: "偶数个数据的中位数"
      problem: '一组数据：$2, 4, 7, 10$。求中位数。'
      steps:
        - '第 1 步：共 4 个数据（偶数），取中间两个 $4$ 和 $7$'
        - '第 2 步：中位数 = 这两数的平均 $\frac{4+7}{2} = 5.5$'
      answer: "5.5"

  practice:
    - id: "data-prac-001"
      stem: '求数据 $2, 3, 3, 6, 6, 6$ 的众数。'
      answer: "6"
      hints: ["众数是出现次数最多的数", "数一数每个数出现了几次"]

    - id: "data-prac-002"
      stem: '求数据 $10, 20, 30, 40$ 的平均数。'
      answer: "25"
      hints: ["平均数 = 总和 ÷ 个数", "(10+20+30+40)÷4"]

    - id: "data-prac-003"
      stem: '求数据 $1, 3, 5, 7, 9$ 的中位数。'
      answer: "5"
      hints: ["先排序（已排好）", "5 个数取最中间第 3 个"]

    - id: "data-prac-004"
      stem: '某次考试 5 人成绩：$60, 70, 80, 90, 100$，求方差。'
      answer: "200"
      hints: ["先求平均数 = 80", "方差 = 各数据与 80 之差平方的平均"]

    - id: "data-prac-005"
      stem: '小明语文 90、数学 80、英语 70，三科按 2:2:1 计权重平均分。'
      answer: "82"
      hints: ["用加权平均：(90×2+80×2+70×1)÷(2+2+1)", "分母是权重之和 5"]

    - id: "data-prac-006"
      stem: '数据 $5, 5, 5, 5, 5$ 的方差是多少？'
      answer: "0"
      hints: ["所有数据都相同，没有波动", "每个数与平均数之差都是 0"]

    - id: "data-prac-007"
      stem: '一组数据 $1, 2, 100$，平均数和中位数哪个更能代表"中等水平"？'
      answer: "中位数（2）。因为 100 是极端值，把平均数拉到了约 34，不能代表中等水平。"
      hints: ["有没有极端大的数？", "平均数怕极端值，中位数不怕"]

  test:
    - id: "data-test-001"
      stem: '求数据 $4, 8, 8, 12$ 的平均数。'
      answer: "8"
      difficulty: 1
      layer: operation

    - id: "data-test-002"
      stem: '求数据 $3, 1, 4, 1, 5$ 的中位数。'
      answer: "3"
      difficulty: 2
      layer: operation

    - id: "data-test-003"
      stem: '求数据 $2, 2, 3, 5, 5, 5, 8$ 的众数。'
      answer: "5"
      difficulty: 1
      layer: operation

    - id: "data-test-004"
      stem: '求数据 $1, 2, 3, 4, 5$ 的方差。'
      answer: "2"
      difficulty: 3
      layer: operation

    - id: "data-test-005"
      stem: "两名运动员平均成绩相同，甲方差 2，乙方差 5，选谁参加稳定性要求高的比赛？为什么？"
      answer: "选甲。方差越小数据越稳定，甲方差 2 < 乙方差 5，甲发挥更稳定。"
      difficulty: 3
      layer: understand

    - id: "data-test-006"
      stem: "公司宣传平均工资 1 万元，但大多数员工只有 5 千。可能是什么原因？该用哪个量更真实？"
      answer: "少数高管工资极高，把平均数拉高了。用中位数或众数更能反映普通员工真实水平。"
      difficulty: 4
      layer: understand

    - id: "data-test-007"
      stem: '某商店一周销量 $20, 22, 18, 25, 20, 30, 20$（件），求这组数据的众数与中位数。'
      answer: "众数 20，中位数 20（排序后 18,20,20,20,22,25,30，中间第 4 个为 20）"
      difficulty: 3
      layer: connect

    - id: "data-test-008"
      stem: "如果把一组数据中每个数都加上 5，平均数、中位数、方差分别如何变化？"
      answer: "平均数加 5，中位数加 5，方差不变（整体平移不改变离散程度）。"
      difficulty: 4
      layer: connect

ai_context:
  topic_summary: "数据的分析研究如何用统计量刻画一组数据。平均数、中位数、众数描述集中趋势，方差和标准差描述离散程度（稳定性）。核心是理解每个量的适用场景和它们对极端值的不同敏感性。"
  key_insights:
    - "平均数用上了所有数据，但容易被极端值带偏"
    - "中位数不受极端值影响，更能代表中等水平"
    - "众数反映最普遍、最常见的情况"
    - "方差越小数据越稳定，方差为 0 说明数据完全相同"
  common_mistakes:
    - mistake: "求中位数前忘记排序"
      example: "对 3,1,4,1,5 直接取中间数 4，没先排成 1,1,3,4,5"
      why: "学生忽略了中位数的定义要求先按大小排列"
      how_to_explain: "中位数的关键词是排序后正中间。先排队再找中间那个人，永远先排序！"

    - mistake: "方差只算到差的平方就停了"
      example: "算完每个 (x-x̄)² 求和后没有除以 n"
      why: "忘记方差是平方差的平均数，不是总和"
      how_to_explain: "方差是平均的偏离程度，所以最后一定要除以数据个数 n。差→平方→求平均，三步缺一不可。"

    - mistake: "混淆方差大小与好坏"
      example: "认为方差大就是成绩好"
      why: "把离散程度误解为水平高低"
      how_to_explain: "方差只管稳不稳，不管高不高。平均数比高低，方差比稳定。射击要稳，所以方差越小越好。"
  alternate_explanations:
    - method: "天平模型理解平均数"
      when_to_use: "学生对平均数为何受极端值影响感到困惑时"
      prompt: "把数据想象成数轴上的小球，平均数是让天平平衡的支点。一个很远的球（极端值）会把支点强行拉向自己。"

    - method: "靶心模型理解方差"
      when_to_use: "学生分不清平均数和方差的作用时"
      prompt: "打靶时，平均数是弹孔的中心位置（准不准），方差是弹孔的分散程度（稳不稳）。两人中心都在靶心，弹孔更集中的方差更小。"

  question_templates:
    difficulty_1_2: "出 2 道直接计算题，给一组简单数据求平均数、中位数或众数"
    difficulty_3: "出 1 道方差计算题或需要排序、加权的综合题"
    difficulty_4: "出 1 道情境分析题，让学生判断该用哪个统计量并解释原因"

slug: probability
subject: math
title: "概率初步"
tier: core
difficulty: 2
prerequisites: ["rational-numbers"]
estimated_min: 30

trigger:
  type: story
  title: "赌徒的来信，催生了一门学问"
  content:
    text: |
      1654 年，一位法国赌徒梅雷向数学家帕斯卡提出一个难题：
      "如果两人赌博中途被迫停止，赌注该怎么公平地分？"
      帕斯卡写信请教费马，两位天才在书信往来中，
      第一次把"运气"变成了可以精确计算的数字。
      从此，掷骰子、抽签、买彩票背后那只看不见的手，
      被驯服成了一门严谨的学科——概率论。
    question: "抛一枚硬币，连续 9 次都是正面，第 10 次出现反面的可能性会更大吗？"

display:
  concept:
    summary: "概率用 0 到 1 之间的数刻画随机事件发生的可能性大小，等可能事件可用古典概型公式直接计算。"
    sections:
      - title: "一、随机事件与概率的取值"
        content: |
          事件分三类：
          - 必然事件：一定发生，概率为 $1$（如太阳从东边升起）
          - 不可能事件：一定不发生，概率为 $0$（如掷骰子出现 $7$）
          - 随机事件：可能发生也可能不发生，概率在 $0$ 与 $1$ 之间

          因此任何事件 $A$ 的概率满足：
          $$0 \leq P(A) \leq 1$$

          概率越大，越可能发生。

      - title: "二、古典概型（等可能事件）"
        content: |
          当一次试验中所有结果出现的可能性相等，且结果有限时，用古典概型公式：
          $$P(A) = \frac{A \text{包含的结果数}}{\text{所有可能结果总数}} = \frac{m}{n}$$

          例：掷一枚均匀骰子，出现偶数的概率。
          所有结果 $n=6$（点数 1~6），偶数有 $2,4,6$ 共 $m=3$ 个，
          $$P(\text{偶数}) = \frac{3}{6} = \frac{1}{2}$$

      - title: "三、用列表和树状图求概率"
        content: |
          当试验包含两步（如抛两次硬币、掷两枚骰子）时，
          直接数容易漏，可用列表法或树状图列出所有等可能结果。

          例：抛两枚硬币，求两枚都是正面的概率。
          所有结果：（正,正）（正,反）（反,正）（反,反），共 $4$ 种。
          两正只有 $1$ 种，所以
          $$P(\text{两正}) = \frac{1}{4}$$

          关键：（正,反）和（反,正）是两个不同的结果，不能合并！

      - title: "四、频率与概率的关系"
        content: |
          做大量重复试验，事件发生的频率
          $$\text{频率} = \frac{\text{发生次数}}{\text{试验总次数}}$$
          会在概率附近上下波动，试验次数越多越稳定，逐渐接近概率值。

          这就是用频率估计概率的依据——但单次或少数几次的结果不能代表概率。
          硬币连抛 9 次正面，第 10 次正反概率仍各是 $\frac{1}{2}$（硬币没有记忆）。

  examples:
    - title: "掷骰子的古典概型"
      problem: '掷一枚均匀骰子，求点数大于 $4$ 的概率。'
      steps:
        - '第 1 步：所有等可能结果共 $n=6$ 种（1 到 6 点）'
        - '第 2 步：点数大于 4 的有 5、6 两种，$m=2$'
        - '第 3 步：$P = \frac{m}{n} = \frac{2}{6} = \frac{1}{3}$'
      answer: "1/3"

    - title: "两步试验用列表法"
      problem: '同时掷两枚均匀骰子，求点数之和为 $5$ 的概率。'
      steps:
        - '第 1 步：每枚 6 种，两枚共 $6 \times 6 = 36$ 种等可能结果'
        - '第 2 步：和为 5 的有 (1,4)(2,3)(3,2)(4,1) 共 4 种'
        - '第 3 步：$P = \frac{4}{36} = \frac{1}{9}$'
      answer: "1/9"

    - title: "摸球问题"
      problem: '袋中有 $3$ 个红球、$2$ 个白球，搅匀后任摸一个，求摸到红球的概率。'
      steps:
        - '第 1 步：球总数 $n = 3 + 2 = 5$，每个球等可能被摸到'
        - '第 2 步：红球有 $m = 3$ 个'
        - '第 3 步：$P(\text{红}) = \frac{3}{5}$'
      answer: "3/5"

  practice:
    - id: "prob-prac-001"
      stem: "掷一枚均匀骰子，出现点数 3 的概率是多少？"
      answer: "1/6"
      hints: ["共有 6 种等可能结果", "点数 3 只有 1 种"]

    - id: "prob-prac-002"
      stem: "抛一枚硬币，出现正面的概率是多少？"
      answer: "1/2"
      hints: ["结果只有正、反两种且等可能", "P = 1/2"]

    - id: "prob-prac-003"
      stem: '掷一枚骰子，"出现点数小于 7"是什么事件？概率是多少？'
      answer: "必然事件，概率为 1"
      hints: ["骰子最大点数是几？", "一定会发生的事件概率是 1"]

    - id: "prob-prac-004"
      stem: "袋中有 4 个红球、6 个蓝球，任摸一个，摸到蓝球的概率？"
      answer: "3/5"
      hints: ["总数 4+6=10", "蓝球 6 个，P=6/10"]

    - id: "prob-prac-005"
      stem: "抛两枚硬币，求恰好一正一反的概率。"
      answer: "1/2"
      hints: ["列出全部 4 种结果", "一正一反有（正,反）（反,正）两种"]

    - id: "prob-prac-006"
      stem: "把硬币抛了 100 次，出现 52 次正面，正面出现的频率是多少？"
      answer: "0.52"
      hints: ["频率 = 发生次数 ÷ 总次数", "52 ÷ 100"]

    - id: "prob-prac-007"
      stem: "硬币已连抛 5 次都是正面，第 6 次出现正面的概率是多少？"
      answer: "1/2。硬币没有记忆，每次抛掷都是独立的，概率始终是 1/2。"
      hints: ["前几次结果会影响这一次吗？", "硬币没有记忆"]

  test:
    - id: "prob-test-001"
      stem: "掷一枚均匀骰子，出现奇数点的概率是多少？"
      answer: "1/2"
      difficulty: 1
      layer: operation

    - id: "prob-test-002"
      stem: "下列事件哪个是不可能事件？A 掷骰子得 6  B 太阳从西边升起  C 抛硬币得正面"
      answer: "B"
      difficulty: 1
      layer: understand

    - id: "prob-test-003"
      stem: "袋中 5 个红球、3 个白球、2 个黑球，任摸一个，摸到红球的概率是多少？"
      answer: "1/2（5/10）"
      difficulty: 2
      layer: operation

    - id: "prob-test-004"
      stem: "同时掷两枚均匀骰子，求两枚点数相同的概率。"
      answer: "1/6（共 36 种，相同的有 (1,1)…(6,6) 共 6 种，6/36=1/6）"
      difficulty: 3
      layer: operation

    - id: "prob-test-005"
      stem: "抛两枚硬币，求至少出现一次正面的概率。"
      answer: "3/4（全部 4 种结果中只有（反,反）没有正面，所以 3/4）"
      difficulty: 3
      layer: connect

    - id: "prob-test-006"
      stem: "小明说：彩票中奖概率是百万分之一，所以我连续买一百万张就一定能中。他对吗？"
      answer: "不对。概率是大量重复试验下的稳定比例，不保证任何具体次数内一定发生。每张彩票都是独立的，买一百万张也可能一张都不中。"
      difficulty: 4
      layer: understand

    - id: "prob-test-007"
      stem: '某事件概率为 $\frac{3}{8}$，做了 800 次试验，理论上大约发生多少次？'
      answer: "约 300 次（800 × 3/8 = 300）"
      difficulty: 3
      layer: connect

    - id: "prob-test-008"
      stem: "为什么试验次数越多，频率越接近概率？"
      answer: "因为单次结果有偶然性，少量试验会有较大波动；试验次数越多，偶然误差被平均掉，频率就越稳定地围绕并接近真实概率（大数现象）。"
      difficulty: 4
      layer: understand

ai_context:
  topic_summary: "概率初步用 0 到 1 的数衡量随机事件发生的可能性。必然事件概率为 1，不可能事件为 0。古典概型用公式 P=m/n 计算等可能事件的概率，两步试验用列表或树状图列举所有结果。频率随试验次数增多趋于稳定并接近概率。"
  key_insights:
    - "任何事件概率都在 0 到 1 之间，必然事件为 1，不可能事件为 0"
    - "古典概型的前提是所有结果等可能且有限，公式为 P=m/n"
    - "两步试验中（正,反）和（反,正）是不同结果，不能合并"
    - "频率不等于概率，但大量试验下频率会稳定接近概率"
  common_mistakes:
    - mistake: "抛两枚硬币时把一正一反只算一种结果"
      example: "认为抛两硬币有'两正、两反、一正一反'三种等可能结果，得 P(两正)=1/3"
      why: "忽略了（正,反）和（反,正）是顺序不同的两个结果"
      how_to_explain: "给两枚硬币编号 1 号、2 号。1正2反 和 1反2正 是两种不同情况。全部结果是 4 种等可能，两正只占 1 种，所以 P=1/4。"

    - mistake: "认为前面的结果会影响后面（赌徒谬误）"
      example: "连抛 9 次正面后，认为第 10 次更可能是反面"
      why: "误以为随机事件会自我平衡"
      how_to_explain: "硬币没有记忆，每次抛掷都是独立的。无论前面如何，第 10 次正反概率都还是 1/2。频率趋于 1/2 是靠后面无数次试验稀释，不是靠某一次纠偏。"

    - mistake: "混淆频率与概率"
      example: "抛 10 次硬币得 7 次正面，就断定正面概率是 0.7"
      why: "把少量试验的频率当成了概率本身"
      how_to_explain: "频率是实验数据，会波动；概率是理论值。试验次数太少时频率不可靠，要做大量试验，频率才会稳定接近真实概率 0.5。"
  alternate_explanations:
    - method: "切披萨比例法"
      when_to_use: "学生不理解古典概型公式时"
      prompt: "把所有等可能结果想象成把披萨平均切成 n 块，事件 A 占了其中 m 块，那么发生 A 的可能性就是 m/n 这么大一块。"

    - method: "画树状图列举两步试验"
      when_to_use: "学生在两步试验中数漏或数重时"
      prompt: "先画第一步的所有分支，每个分支末端再画第二步的所有分支，数一数末端总共有几条路径就是结果总数，符合条件的有几条就是 m。"

  question_templates:
    difficulty_1_2: "出 2 道单步古典概型题，如掷骰子、摸球求简单概率"
    difficulty_3: "出 1 道两步试验题（掷两骰子或抛两硬币），需列表或树状图"
    difficulty_4: "出 1 道辨析题，如赌徒谬误或频率与概率关系的理解题"

slug: axis-symmetry
subject: math
title: "轴对称"
tier: core
difficulty: 2
prerequisites: ["triangles"]
estimated_min: 25

trigger:
  type: story
  title: "镜子里的数学——对称统治世界"
  content:
    text: |
      拿起一面镜子，看看你的脸——左耳和右耳基本上是对称的。

      再观察：
      - 蝴蝶的翅膀 → 完全对称
      - 一片叶子 → 沿中脉对称
      - 故宫 → 沿中轴线完全对称
      - 人脸识别 → 算法利用对称性加速

      自然界中，对称无处不在——因为对称结构物理上最稳定、能量上最节省。
      数学中，轴对称不仅是一种美感，更是一种强大的推理工具：

      如果你知道一个图形关于某条直线对称，你就只需知道一半——
      另一半自动确定。

      这就是对称的力量：它把信息量减半。
    question: "折一张纸，在一边滴一滴墨水，对折后打开——你得到了一个什么图形？它有什么特点？"

display:
  concept:
    summary: "轴对称是一种几何变换。如果一个图形沿某条直线对折后两边完全重合，则称该图形关于这条直线轴对称。本章学习轴对称的性质、垂直平分线的性质、等腰三角形的对称性。"
    sections:
      - title: "一、轴对称的概念"
        content: |
          **定义**：一个图形沿一条直线对折，直线两侧的部分完全重合。

          这条直线叫**对称轴**。

          | 概念 | 说明 |
          |------|------|
          | 轴对称图形 | 一个图形本身有对称轴（如等腰三角形） |
          | 两个图形成轴对称 | 两个图形关于一条直线对称 |

          关键区别：
          - 轴对称图形 = 一个图形的自身性质
          - 两个图形成轴对称 = 两个图形之间的关系

      - title: "二、垂直平分线（中垂线）"
        content: |
          **定义**：经过线段中点且垂直于该线段的直线。

          **性质**（两种表述，互为逆定理）：
          1. 线段垂直平分线上的点到线段两端点的距离相等
          2. 到线段两端点距离相等的点在线段的垂直平分线上

          这条性质是轴对称的核心——对称轴就是对应点连线的垂直平分线。

          如果 P 在 AB 的垂直平分线上 → PA = PB

      - title: "三、轴对称的性质"
        content: |
          如果两个图形关于直线 l 对称：

          1. **对应点连线被对称轴垂直平分**——这是根本性质
          2. 对应线段相等
          3. 对应角相等
          4. 两个图形全等（轴对称是一种全等变换）

          轴对称 = 沿对称轴"翻折"——翻折后完全重合。

      - title: "四、等腰三角形的对称性"
        content: |
          等腰三角形是轴对称图形——对称轴是顶角的角平分线（也是底边的中线和高线）。

          **等腰三角形三线合一**：
          顶角的角平分线、底边的中线、底边的高线——三条线是同一条！

          这由全等直接推出：顶角角平分线分等腰三角形为两个全等三角形（SAS）。

          推论：
          - 等腰三角形两底角相等
          - 等边三角形三线合一（有三个对称轴）

      - title: "五、最短路径问题"
        content: |
          典型问题：在直线 l 的同侧有 A、B 两点，在 l 上找一点 P，使 AP + BP 最短。

          解法：作 A 关于 l 的对称点 A'，连接 A'B 交 l 于 P——则 P 为所求。

          原理：对称变换把"折线"变成了"直线"——两点之间线段最短。

  examples:
    - title: "判断轴对称图形"
      problem: "等腰三角形有几条对称轴？等边三角形呢？"
      steps:
        - "等腰三角形：只有一条（顶角角平分线 = 底边的垂直平分线）"
        - "等边三角形：三条（每个角平分线都是对称轴）"
        - "等边三角形是特殊的等腰三角形——有三条对称轴"
      answer: "等腰三角形：1 条。等边三角形：3 条。"

    - title: "垂直平分线性质求距离"
      problem: "P 在 AB 的垂直平分线上，PA = 5 cm。求 PB。"
      steps:
        - "P 在 AB 的垂直平分线上 → P 到 A 和到 B 的距离相等"
        - "PA = 5 cm → PB = 5 cm"
      answer: "PB = 5 cm"

    - title: "最短路径问题"
      problem: "河（直线 l）同侧有村庄 A 和 B。要在河边建一个水泵站 P，使 AP+BP 最短。确定 P 的位置。"
      steps:
        - "作 B 关于 l 的对称点 B'"
        - "连接 AB'（直线），交 l 于 P"
        - "P 即为所求位置。此时 AP+BP = AP+PB' = AB'（B 和 B' 关于 l 对称，BP = B'P）"
      answer: "作 B 关于河的对称点 B'，连 AB' 与河的交点即水泵站位置。"

  practice:
    - id: "sym-prac-001"
      stem: "线段有几条对称轴？"
      answer: "2 条——线段的垂直平分线和线段所在的直线。"
      hints: ["对称轴不一定是垂直平分线", "线段本身也是一条直线"]

    - id: "sym-prac-002"
      stem: "点 A(2, 3) 关于 y 轴的对称点坐标是？"
      answer: "(-2, 3)"
      hints: ["关于 y 轴对称 → x 取反，y 不变", "像镜子一样左右翻转"]

    - id: "sym-prac-003"
      stem: "等腰三角形两腰 AB = AC。D 是 BC 中点。AD 是哪些线的合体？"
      answer: "AD 是中线（D 是 BC 中点）、高线（AD⊥BC）、角平分线（∠BAD=∠CAD）——三线合一。"
      hints: ["等腰三角形三线合一", "从顶角到底边的那条特殊线"]

    - id: "sym-prac-004"
      stem: "在平面直角坐标系中，点 A 和点 B 关于 x 轴对称。A 的坐标是 (3, 5)，B 的坐标是？"
      answer: "(3, -5)"
      hints: ["关于 x 轴对称 → y 取反", "x 轴就是那条对称轴"]

    - id: "sym-prac-005"
      stem: "矩形有几条对称轴？"
      answer: "2 条——两条对边中点的连线（水平和竖直方向的中线）"
      hints: ["矩形不是正方形——对边相等但邻边不一定相等", "只有正方形的对称轴才有 4 条"]

  test:
    - id: "sym-test-001"
      stem: "等边三角形有几条对称轴？"
      answer: "3 条（每条角平分线 = 中线 = 高线）"
      difficulty: 1
      layer: operation

    - id: "sym-test-002"
      stem: "点 P 到 A(-3) 和 B(3) 的距离相等。P 在什么线上？"
      answer: "在 y 轴上——即 AB 的垂直平分线（AB 中点是原点，垂直于 x 轴）"
      difficulty: 2
      layer: operation

    - id: "sym-test-003"
      stem: "两条线段关于某直线 l 对称。它们一定相等吗？为什么？"
      answer: "一定相等。轴对称是一种全等变换——对应线段保持长度不变。"
      difficulty: 2
      layer: understand

    - id: "sym-test-004"
      stem: "在 △ABC 中 AB = AC，若 ∠A = 40°，则 ∠B = ?"
      answer: "70°。等腰三角形底角相等，(180° - 40°) ÷ 2 = 70°"
      difficulty: 1
      layer: operation

    - id: "sym-test-005"
      stem: "证明：等腰三角形底边上的中点到两腰的距离相等。"
      answer: "设 M 为 BC 中点，作 MD⊥AB 于 D，ME⊥AC 于 E。证明 △BDM≅△CEM（HL：MB=MC，∠B=∠C）→ MD=ME。"
      difficulty: 4
      layer: connect

    - id: "sym-test-006"
      stem: "一枚正方形印章，沿着对角线对折。对折后什么形状？"
      answer: "一个等腰直角三角形（半个正方形沿对角线折叠）"
      difficulty: 2
      layer: understand

    - id: "sym-test-007"
      stem: "A(1, 2) 和 B(5, 4)。求 AB 的垂直平分线方程。"
      answer: "AB 中点 M(3, 3)，AB 斜率 = (4-2)/(5-1) = 1/2 → 垂直平分线斜率 = -2。方程：y-3 = -2(x-3) → y = -2x+9。"
      difficulty: 4
      layer: connect

    - id: "sym-test-008"
      stem: "想一想：自然界的动物大多左右对称，为什么？从进化的角度分析对称性的优势。"
      answer: "左右对称与运动能力相关——对称的身体更容易直线移动、保持平衡。非对称的动物（如寄居蟹、比目鱼）往往是固着生活或特殊适应。对称也便于基因调控——只需编码一半身体结构，另一半自动镜像。"
      difficulty: 3
      layer: connect

ai_context:
  topic_summary: "轴对称是一种几何变换（翻折变换）。核心内容：轴对称的概念（沿对称轴对折重合）、垂直平分线的性质和逆性质（到两端点距离相等 ↔ 在垂直平分线上）、轴对称的性质（对应点连线被对称轴垂直平分、对应线段和角相等）、等腰三角形的三线合一（角平分线=中线=高线）。对称变化是解决最短路径问题的标准工具——利用对称将折线转化为直线。"
  key_insights:
    - "轴对称的本质：对称轴是对应点连线的垂直平分线——这是所有对称性质的根源"
    - "等腰三角形三线合一可以用全等严格证明——这是几何中'对称→简化'的经典案例"
    - "最短路径问题中对称的作用：将同侧两点转化为异侧两点——把折线拉直"
    - "垂直平分线是一类点的轨迹——到两端点距离相等的点的集合，这种'轨迹'视角是高等几何的起点"
  common_mistakes:
    - mistake: "混淆轴对称图形和两个图形成轴对称"
      example: "学生说'两个全等的三角形是轴对称的'"
      why: "全等不等于轴对称——轴对称要求特定的位置关系（对应点连线垂直于对称轴且被平分）"
      how_to_explain: "全等 = 形状大小相同（位置随意）。轴对称 = 全等 + 特殊位置关系（像镜像）。轴对称的两个图形一定是全等的，但全等的两个图形不一定是轴对称的。"

    - mistake: "等腰三角形三线合一中的'中线'理解错误"
      example: "学生以为等腰三角形三条中线都合一"
      why: "混淆了'三线合一'的具体含义"
      how_to_explain: "三线合一特指：从顶角到底边中点的那一条线段——它同时是角平分线、中线和高线。不是三角形的三条中线——三条中线永远交于重心，这是另一个概念。"
  alternate_explanations:
    - method: "折纸法"
      when_to_use: "学生对抽象的轴对称缺乏直观感受"
      prompt: "拿一张纸，随便画一个图形，然后把纸沿一条线对折——在橡皮泥上用力按压。展开后，你看到了什么？一个轴对称图形！折痕就是对称轴，压痕就是另一半。对称就是'折纸的痕迹'。"

    - method: "镜子法（最短路径）"
      when_to_use: "学生不理解为什么作对称点能找到最短路径"
      prompt: "站在镜子里看——B 在镜子里的像 B' 和真实的 B 关于镜子对称。从 A 到镜子再到 B 的最短路径，等于从 A 到镜子里 B' 的直线。因为光走最短路径——这就是为什么你照镜子时看到的光路是直的！"

  question_templates:
    difficulty_1_2: "出 2 道基础题：给坐标求对称点坐标，或用等腰三角形性质求角度"
    difficulty_3: "出 1 道证明题：用垂直平分线的性质（到两端点距离相等）证明某个点在某条线上"
    difficulty_4: "出 1 道最短路径应用题：需要作对称点将折线转化为直线"

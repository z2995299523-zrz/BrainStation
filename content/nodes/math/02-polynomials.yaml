slug: polynomials
subject: math
title: "整式的加减"
tier: core
difficulty: 1
prerequisites: ["rational-numbers"]
estimated_min: 25

trigger:
  type: story
  title: "代数：把话说给全世界听"
  content:
    text: |
      16 世纪，法国数学家韦达做了一件了不起的事：
      他用字母代替数字来写数学。

      在此之前，每个国家的数学书都用自己的语言描述。
      韦达用 $a + b$ 就搞定了——全世界都能看懂。

      从那天起，数学真正成了通用语言。
    question: "为什么要用字母表示数？用数字不好吗？"

content:
  operation:
    text: |
      ## 整式：由数和字母通过加减乘组成的式子

      **单项式**：数 × 字母的乘积，如 $3x^2$、$-5ab$

      **多项式**：多个单项式的和，如 $3x^2 - 5x + 2$

      **同类项**：字母部分完全相同的项，如 $3x^2$ 和 $-2x^2$

      **合并同类项**：系数相加，字母部分不变
      - $3x^2 + 5x^2 = 8x^2$
      - $7ab - 3ab = 4ab$

      **去括号**：
      - $+(a+b) = a+b$
      - $-(a+b) = -a-b$（括号前是负号，里面每项都要变号）
    examples:
      - input: "合并：3x + 5x - 2x"
        output: "6x"
        method: "(3+5-2)x = 6x"
      - input: "化简：-(x - y)"
        output: "-x + y"
        method: "每项变号"

  understand:
    text: |
      ## 为什么 $-(a-b)$ 等于 $-a+b$？

      括号前面的负号本质是"乘以 -1"：
      $$-(a-b) = (-1) \times (a-b) = (-1)\times a + (-1)\times(-b) = -a + (+b) = -a + b$$

      关键在最后一步：$(-1) \times (-b) = +b$——负负得正！

      **常见错误**：$- (x + 3)$ 写成 $-x + 3$。错！$-(x+3) = -x - 3$
    highlights:
      - "去括号的负号规则本质是分配律 + 负负得正"
      - "代数让数学从具体数字走向了一般规律"

  connect:
    text: |
      ## 整式运算的威力：从算术到方程

      整式是学方程的基础。没有整式的化简能力，你无法解：
      $$3(x+2) - 2(x-1) = 14$$

      化简后：$3x + 6 - 2x + 2 = x + 8 = 14$

      **物理学中的应用**：自由落体高度公式 $h = -\frac{1}{2}gt^2 + v_0t + h_0$ 就是整式。
    thought_seeds:
      - "代数让找规律从猜变成了算"
      - "所有科学公式本质上都是整式的组合"

feynman:
  base_prompt: "用你自己的话解释：什么是同类项？去括号时为什么括号前是负号就要变号？"
  key_elements:
    - "同类项是字母部分完全相同的项"
    - "合并同类项是系数相加"
    - "负号去括号每项都变号"
    - "因为负号相当于乘以-1"
  deep_questions:
    - "如果去掉括号 $-(a+b+c)$，结果是什么？为什么？"
    - "你觉得代数和算术最大的区别是什么？"
  missing_hints:
    "同类项是字母部分完全相同的项": "3x²和5x²有什么共同点？3x²和3x呢？"
    "合并同类项是系数相加": "把同类项合并时，字母部分怎么办？"
    "负号去括号每项都变号": "-(x+y) 展开后是什么？里面的每一项发生了什么？"
    "因为负号相当于乘以-1": "去掉括号本质上是用了什么运算律？"

thought_card: "今天你学到了什么让你觉得'原来如此'的东西？"

slug: polynomials
subject: math
title: "整式的加减"
tier: core
difficulty: 1
prerequisites: ["rational-numbers"]
estimated_min: 25

trigger:
  type: story
  title: "代数：把话说给全世界听"
  content:
    text: |
      16 世纪，法国数学家韦达做了一件了不起的事：
      他用字母代替数字来写数学。

      在此之前，每个国家的数学书都用自己的语言描述。
      韦达用 $a + b$ 就搞定了——全世界都能看懂。

      从那天起，数学真正成了通用语言。
    question: "为什么要用字母表示数？用数字不好吗？"

display:
  concept:
    summary: "整式是由数和字母通过加、减、乘组成的式子；整式的加减，核心就是去括号和合并同类项。"
    sections:
      - title: "一、单项式与多项式"
        content: |
          整式 = 由数和字母通过加、减、乘运算组成的式子。

          单项式：数与字母的乘积，如 $3x^2$、$-5ab$、$\frac{1}{2}y$。
          - 系数：单项式中的数字因数，如 $-5ab$ 的系数是 $-5$
          - 次数：所有字母指数之和，如 $3x^2y$ 的次数是 $3$

          多项式：几个单项式的和，如 $3x^2 - 5x + 2$。
          - 每个单项式叫做多项式的一项
          - 不含字母的项（如上式的 $2$）叫常数项

      - title: "二、同类项与合并同类项"
        content: |
          同类项：所含字母相同，并且相同字母的指数也相同的项。

          - $3x^2$ 与 $-2x^2$ 是同类项（都是 $x^2$）
          - $3x^2$ 与 $3x$ 不是同类项（指数不同）

          合并同类项：把同类项合成一项，系数相加，字母部分不变。

          $$3x^2 + 5x^2 = (3+5)x^2 = 8x^2$$
          $$7ab - 3ab = (7-3)ab = 4ab$$

      - title: "三、去括号法则"
        content: |
          括号前是正号，去括号后各项不变号：
          $$+(a+b) = a+b$$

          括号前是负号，去括号后括号里每一项都要变号：
          $$-(a+b) = -a-b \qquad -(a-b) = -a+b$$

          整式加减的一般步骤：先去括号，再合并同类项。

      - title: "四、为什么 $-(a-b) = -a+b$"
        content: |
          括号前面的负号，本质是"乘以 $-1$"：

          $$-(a-b) = (-1)\times(a-b) = (-1)\times a + (-1)\times(-b) = -a + b$$

          关键在最后一步：$(-1)\times(-b) = +b$——负负得正！

          所以去括号时负号必须分配到每一项，漏掉一项就会出错。

  examples:
    - title: "合并同类项"
      problem: '化简 $3x + 5x - 2x$'
      steps:
        - '第 1 步：三项都是 $x$ 的同类项，可以合并'
        - '第 2 步：系数相加 $3+5-2 = 6$，字母部分不变'
      answer: "6x"

    - title: "负号去括号"
      problem: '化简 $-(x - y)$'
      steps:
        - '第 1 步：括号前是负号，里面每一项都要变号'
        - '第 2 步：$x$ 变成 $-x$，$-y$ 变成 $+y$'
      answer: "-x + y"

    - title: "去括号后合并"
      problem: '化简 $3(x+2) - 2(x-1)$'
      steps:
        - '第 1 步：去括号 $3x + 6 - 2x + 2$（注意第二个括号前的负号让 $-1$ 变 $+2$）'
        - '第 2 步：合并同类项 $(3x - 2x) + (6 + 2)$'
      answer: "x + 8"

  practice:
    - id: "poly-prac-001"
      stem: '化简 $4a + 7a - 3a$'
      answer: "8a"
      hints: ["三项都是同类项吗？", "系数相加：4+7-3"]

    - id: "poly-prac-002"
      stem: '合并同类项 $5x^2 - 2x^2 + x^2$'
      answer: "4x^2"
      hints: ["它们都是 x² 的项", "系数相加，x² 不变"]

    - id: "poly-prac-003"
      stem: '去括号 $-(2a - 3b + 1)$'
      answer: "-2a + 3b - 1"
      hints: ["括号前是负号", "每一项都要变号，别漏掉常数项"]

    - id: "poly-prac-004"
      stem: '化简 $2(x+3) + (x-5)$'
      answer: "3x + 1"
      hints: ["先去括号：2x+6 和 x-5", "再把同类项合并"]

    - id: "poly-prac-005"
      stem: '化简 $3(2x - 1) - 2(x + 4)$'
      answer: "4x - 11"
      hints: ["去括号：6x-3 和 -2x-8", "注意第二个括号前的负号让每项变号"]

    - id: "poly-prac-006"
      stem: '化简 $5y - [3y - (2y - 1)]$'
      answer: "4y - 1"
      hints: ["从最里层括号开始去", "先去小括号，再去中括号"]

  test:
    - id: "poly-test-001"
      stem: '化简 $6m - 2m + 3m$'
      answer: "7m"
      difficulty: 1
      layer: operation

    - id: "poly-test-002"
      stem: '合并同类项 $4ab + ab - 2ab$'
      answer: "3ab"
      difficulty: 1
      layer: operation

    - id: "poly-test-003"
      stem: '去括号 $-(3x - 2y + 5)$'
      answer: "-3x + 2y - 5"
      difficulty: 2
      layer: operation

    - id: "poly-test-004"
      stem: '化简 $2(a + b) - 3(a - b)$'
      answer: "-a + 5b"
      difficulty: 3
      layer: operation

    - id: "poly-test-005"
      stem: '化简 $4x - [2x - (x - 3)]$'
      answer: "3x - 3"
      difficulty: 3
      layer: operation

    - id: "poly-test-006"
      q_type: choice
      stem: '下列哪一组是同类项？'
      options:
        - 'A: $3x$ 与 $3y$'
        - 'B: $2x^2$ 与 $5x^2$'
        - 'C: $x^2$ 与 $x^3$'
        - 'D: $ab$ 与 $a^2b$'
      answer: "B"
      difficulty: 2
      layer: understand

    - id: "poly-test-007"
      stem: '小明把 $-(x+3)$ 写成了 $-x+3$，他错在哪里？正确结果是什么？'
      answer: "他漏掉了对常数项变号。负号要分配到括号里每一项，正确结果是 -x-3。"
      difficulty: 3
      layer: understand

    - id: "poly-test-008"
      stem: '一个长方形长是 $3x+2$，宽是 $x-1$，用整式表示它的周长（化简）。'
      answer: "周长 = 2[(3x+2)+(x-1)] = 2(4x+1) = 8x+2"
      difficulty: 4
      layer: connect

ai_context:
  topic_summary: "整式的加减是代数运算的起点。核心是认识单项式、多项式与同类项，掌握合并同类项与去括号两项技能。整式化简能力是后续解方程、学函数的必备基础。"
  key_insights:
    - "同类组：字母相同且相同字母的指数也相同，才能合并"
    - "合并同类项只动系数（系数相加），字母部分原样保留"
    - "括号前是负号，去括号时每一项都要变号"
    - "去括号的负号规则本质是分配律加上负负得正"
  common_mistakes:
    - mistake: "去括号时负号只变第一项"
      example: "$-(x+3)$ 写成 $-x+3$"
      why: "学生只把负号作用到紧挨着的第一项，忘了它要分配到整个括号"
      how_to_explain: "负号相当于乘 -1，要乘进括号每一项。$-(x+3) = -x-3$，常数项 3 也得变号。"
    - mistake: "把不同类项当作同类项合并"
      example: "$3x^2 + 2x = 5x^2$ 或 $5x$"
      why: "学生只看字母相同，忽略了指数必须也相同"
      how_to_explain: "$x^2$ 和 $x$ 是两种不同的东西，就像苹果和西瓜不能相加。指数不同就不能合并。"
    - mistake: "合并时把字母指数也相加"
      example: "$3x^2 + 5x^2 = 8x^4$"
      why: "误把合并同类项当成乘法"
      how_to_explain: "合并是加法，只加系数。$3x^2+5x^2$ 就是 3 个 x² 加 5 个 x² 等于 8 个 x²，字母部分始终是 x²。"
  alternate_explanations:
    - method: "实物计数类比"
      when_to_use: "学生不理解为什么只有同类项能合并时"
      prompt: "把 x² 想成苹果，x 想成香蕉。3 个苹果 + 5 个苹果 = 8 个苹果（合并）；3 个苹果 + 2 根香蕉只能并排写，不能合成一个数。"
    - method: "乘 -1 展开法"
      when_to_use: "学生对去括号变号感到混乱时"
      prompt: "把括号前的负号改写成 ×(-1)，再用分配律一项一项乘进去，变号就自然发生，不用死记。"
  question_templates:
    difficulty_1_2: "出 2 道直接合并同类项或简单去括号的题，数字简单，考察基本规则"
    difficulty_3: "出 1 道含多重括号或负号去括号的化简题，考察分步处理能力"
    difficulty_4: "出 1 道用整式表示几何量（周长/面积）或需要解释错误原因的题"

slug: intersecting-parallel-lines
subject: math
title: 相交线与平行线
tier: core
difficulty: 2
prerequisites:
  - basic-geometry
estimated_min: 25
trigger:
  type: story
  title: 两条永远不会相遇的线——改变了世界
  content:
    text: "欧几里得在 2300 年前写下《几何原本》时，提出了五条公理。\n前四条都很直观——两点连直线、线段可延长、给定圆心和半径可画圆、所有直角相等。\n\n第五条：如果一条直线与两条直线相交，同一侧的内角和小于 180°，\n那么这两条直线最终会在那一侧相交。\n\n这条公理等价于：过直线外一点，有且只有一条直线与已知直线平行。\n\n2000 年来，无数数学家试图从前面四条推导出第五条——全都失败了。\n直到 19 世纪，俄国人罗巴切夫斯基说：\"如果我否定它呢？\"\n\n他假设过一点可以有无数条平行线——于是诞生了非欧几何。\n100 年后，爱因斯坦用非欧几何描述了弯曲的时空。\n\n两条线的故事，从初中课本一直到宇宙边缘。\n"
    question: 为什么平行线在现实中看起来会在远处相交（比如铁轨）？这和平行线的数学定义矛盾吗？
display:
  concept:
    summary: 相交线和平行线是平面几何中最基本的线线关系。本章重点：对顶角相等、邻补角互补、垂线的性质、三线八角（同位角/内错角/同旁内角）、平行线的判定与性质。
    sections:
      - title: 一、相交线
        content: "两条直线相交于一点，形成四个角：\n\n```\n    \\  ∠1 /\n     \\   /\n  ∠4  \\ /  ∠2\n       ●\n      / \\\n     /   \\\n    / ∠3  \\\n```\n\n**对顶角**：∠1 和 ∠3、∠2 和 ∠4 —— **对顶角相等**\n**邻补角**：∠1 和 ∠2、∠2 和 ∠3 等 —— 相邻且互补（和为 180°）\n\n关键性质：对顶角相等（可证明——利用平角 = 180°）\n"
      - title: 二、垂直
        content: "**定义**：两条直线相交成直角（90°）→ 互相垂直。交点叫垂足。\n\n记法：AB ⊥ CD\n\n**垂线的唯一性**：\n- 过一点，有且只有一条直线与已知直线垂直\n- \"垂线段最短\"——从线外一点到直线上各点的线段中，垂线段最短\n\n**点到直线的距离**：从该点向直线作垂线，垂线段的长度 = 距离。\n"
      - title: 三、三线八角
        content: "一条直线（截线）与两条直线相交，形成 8 个角：\n\n```\n    1   2\n----●---●---- 直线 a\n     \\ /\n  4   ●   3\n       \\\n  5   ●   6\n     / \\\n----●---●---- 直线 b\n    7   8\n```\n\n| 位置关系 | 名称 | 例子 |\n|----------|------|------|\n| 在截线同侧，两直线同侧 | 同位角 | ∠1 和 ∠5 |\n| 在截线两侧，两直线之间 | 内错角 | ∠3 和 ∠5 |\n| 在截线同侧，两直线之间 | 同旁内角 | ∠3 和 ∠6 |\n\n记忆口诀：同位角像 F，内错角像 Z，同旁内角像 C\n"
      - title: 四、平行线的判定与性质
        content: "**判定**（已知角的关系 → 两直线平行）：\n1. 同位角相等 → 两直线平行\n2. 内错角相等 → 两直线平行\n3. 同旁内角互补 → 两直线平行\n\n**性质**（已知两直线平行 → 角的关系）：\n1. 两直线平行 → 同位角相等\n2. 两直线平行 → 内错角相等\n3. 两直线平行 → 同旁内角互补\n\n**核心区别**：\n- 判定：从角推到线（\"因为角相等，所以线平行\"）\n- 性质：从线推到角（\"因为线平行，所以角相等\"）\n\n平行公理：过直线外一点，有且只有一条直线与已知直线平行。\n"
  examples:
    - title: 利用对顶角求角
      problem: 两条直线相交，其中一个角是 65°，求另外三个角。
      steps:
        - 第 1 步：对顶角相等 → 与 65° 对顶的角也是 65°
        - 第 2 步：邻补角互补 → 65° 的两个邻补角 = 180° - 65° = 115°
        - 第 3 步：四个角分别为 65°、115°、65°、115°
      answer: 65°, 115°, 65°, 115°
    - title: 判断平行
      problem: 如图，∠1 = 70°，∠2 = 70°，判断 a 是否平行于 b。
      steps:
        - 第 1 步：观察 ∠1 和 ∠2 的位置关系——它们是同位角
        - 第 2 步：∠1 = ∠2 = 70° → 同位角相等
        - 第 3 步：同位角相等 → 两直线平行（判定定理）
      answer: a ∥ b（同位角相等）
    - title: 平行线中的角度计算
      problem: a ∥ b，∠1 = 110°，求 ∠2（内错角）。
      steps:
        - 第 1 步：a ∥ b → 可使用平行线性质
        - 第 2 步：∠1 和 ∠2 是内错角
        - 第 3 步：两直线平行 → 内错角相等 → ∠2 = 110°
      answer: ∠2 = 110°
  practice:
    - id: ipl-prac-001
      stem: 两条直线相交，∠1 = 40°，和 ∠1 对顶的角是多少度？
      answer: 40°
      hints:
        - 对顶角相等
        - 对顶角在交点的对角位置
    - id: ipl-prac-002
      stem: AB ⊥ CD，垂足为 O。∠AOC 是多少度？
      answer: 90°
      hints:
        - 垂直的定义
        - ⊥ 就是 90°
    - id: ipl-prac-003
      stem: 如图，∠1 和 ∠5 是什么关系？
      answer: 同位角
      hints:
        - 看 F 形
        - 在截线的同一侧
    - id: ipl-prac-004
      stem: a ∥ b，∠1 = 75°（同位角位置），∠2 是 ∠1 的内错角。∠2 = ?
      answer: 75°
      hints:
        - 平行线性质：内错角相等
        - 或者：同位角相等 → 内错角也相等（通过等量代换）
    - id: ipl-prac-005
      stem: 同旁内角 ∠3 = 70°，要判断 a ∥ b，∠6（同旁内角）应满足什么条件？
      answer: ∠6 = 110°（同旁内角互补：70° + 110° = 180°）
      hints:
        - 同旁内角互补 → 平行
        - 70° + ? = 180°
  test:
    - id: ipl-test-001
      stem: 两条直线相交形成的四个角中，对顶角有几对？
      answer: 2 对
      difficulty: 1
      layer: operation
    - id: ipl-test-002
      stem: 如图，∠1 = 50°，求 ∠1 的邻补角。
      answer: 130°
      difficulty: 1
      layer: operation
    - id: ipl-test-003
      stem: 下列哪个不是判断平行的方法？
      answer: C
      difficulty: 2
      layer: understand
      q_type: choice
      options:
        - A. 同位角相等
        - B. 内错角相等
        - C. 对顶角相等
        - D. 同旁内角互补
    - id: ipl-test-004
      stem: a ∥ b，∠1 = 120°，和 ∠1 是同旁内角的 ∠2 = ?
      answer: 60°（同旁内角互补：180° - 120° = 60°）
      difficulty: 2
      layer: operation
    - id: ipl-test-005
      stem: "'同位角相等'既是平行线的判定又是性质——对吗？为什么？"
      answer: 对。作为判定：因为同位角相等，所以平行；作为性质：因为平行，所以同位角相等。判定从角→线，性质从线→角。
      difficulty: 3
      layer: understand
    - id: ipl-test-006
      stem: 过直线外一点可以画几条直线与已知直线平行？
      answer: 1 条（平行公理）——这是欧几里得第五公设的等价形式
      difficulty: 2
      layer: understand
    - id: ipl-test-007
      stem: 如图，a ∥ b，∠1 = 3x + 10°，∠2 = 2x + 30°（同位角）。求 x 和 ∠1。
      answer: 同位角相等：3x+10 = 2x+30 → x = 20 → ∠1 = 70°
      difficulty: 3
      layer: operation
    - id: ipl-test-008
      stem: 找一张纸，用折纸的方法折出一组平行线。描述你的方法并解释为什么这样折出来的线是平行的。
      answer: 将纸对折两次：第一次折任意折痕，第二次让折痕与第一次重合——这样两条折痕同时垂直于纸边，同位角都是 90°，因此平行。
      difficulty: 4
      layer: connect
ai_context:
  topic_summary: 相交线与平行线是初中几何的逻辑推理起点。核心内容：两线相交产生的对顶角（相等）和邻补角（互补）；垂直的定义和性质（唯一性、垂线段最短）；三线八角模型（同位角/内错角/同旁内角的识别）；平行线的判定（角→线）和性质（线→角）三大定理及其应用。平行公理（第五公设）是欧氏几何和非欧几何的分水岭。
  key_insights:
    - 对顶角相等可以通过'平角=180°'严格证明——这是学生第一次用已知事实推导新结论（演绎推理）
    - 平行线的判定和性质是互逆的——'若 A 则 B'（判定）和'若 B 则 A'（性质）的区别是逻辑思维的起点
    - 三线八角只要记住三种位置：F（同位角）、Z（内错角）、C（同旁内角）
    - 平行公理不能从其他公理推导——这是 2000 年数学史上最重要的发现之一
  common_mistakes:
    - mistake: 混淆判定和性质
      example: 题目问'判断是否平行'，学生写'因为 a∥b，所以同位角相等'
      why: 判定和性质的逻辑方向搞反了——还没有证明平行就先用了平行
      how_to_explain: 判定 = 破案（找证据 → 下结论），性质 = 利用（已知结论 → 推导新信息）。先破案再享受权利。
    - mistake: 对顶角和同位角混淆
      example: 学生把对顶角当同位角用
      why: 两种角都在不同位置成对出现，但位置关系完全不同——对顶角在交点对角，同位角在两线和截线的交点处
      how_to_explain: 对顶角 = X 交叉处对角。同位角 = F 的同一侧。X ≠ F。
    - mistake: 忘记同旁内角是互补不是相等
      example: 学生写'因为 a∥b，同旁内角相等'
      why: 把同旁内角和内错角混为一谈
      how_to_explain: 同旁内角在截线的同一侧、在两直线之间——它们加起来是 180°。内错角在截线两侧——它们相等。Z（内错角）≠ C（同旁内角）。
  alternate_explanations:
    - method: 折纸法
      when_to_use: 学生对三线八角的位置关系感到困惑
      prompt: 拿一张纸，画一条斜线（截线），然后折一条折痕（直线）。折痕被截线穿过后形成的角——用彩笔标出同位角（都在截线同一侧）、内错角（截线两侧交叉位置）、同旁内角（截线同侧且在两条线之间）。动手比看图更直观。
    - method: 火车轨道法
      when_to_use: 学生不理解'平行线永不相交'
      prompt: 铁轨是平行线的最好例子——两根铁轨在任何位置的距离都相同。截线（枕木）与两根铁轨都相交，形成的角全是直角——同位角=90°，内错角=90°。平行不是'看起来直'，而是'距离处处相等'。
  question_templates:
    difficulty_1_2: 出 2 道计算题：给一个角的大小，利用对顶角/邻补角/平行线性质求另一个角
    difficulty_3: 出 1 道方程题：角的关系用代数式表示，需要列方程求解（如'∠1=3x+10, ∠2=2x+30, 若 a∥b 求 x'）
    difficulty_4: 出 1 道逻辑推理题：给一组角的关系，让学生写完整的推理过程证明两条直线平行（用∵∴格式）

  - id: "fac-und-001"
    layer: understand
    q_type: choice
    difficulty: 3
    subject: math
    content:
      stem: |
        老师说："$x^2 - 5x + 6 = 0$ 的解是 $x=2$ 或 $x=3$。"
        为什么因式分解能帮我们解方程？
      options:
        - "因为因式分解让式子变美观"
        - "因为积为 0 意味着至少一个因子为 0，化为 (x-2)(x-3)=0 后一目了然"
        - "因为因式分解是一个规定"
        - "其实不能，需要用求根公式"
    answer: { correct: 1, explanation: "ab=0 ⇔ a=0 或 b=0，因式分解把二次方程化成两个一次方程的乘积。" }
  - id: "fac-und-002"
    layer: understand
    q_type: fill
    difficulty: 3
    subject: math
    content:
      stem: "为什么 $a^2-b^2$ 可以分解而 $a^2+b^2$ 不能（在实数范围内）？因为 ___"
    answer: { correct: "平方差公式需要减号", explanation: "a²-b²=(a+b)(a-b)但a²+b²没有类似的实数分解。" }
  - id: "fac-con-001"
    layer: connect

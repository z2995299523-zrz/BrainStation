node_slug: phonetics
questions:
  - id: "pho-op-001"
    layer: operation
    q_type: choice
    difficulty: 1
    subject: english
    content:
      stem: "🔈 点击下方按钮听发音，选出你听到的音标符号："
      options: ["/iː/", "/ɪ/", "/e/", "/æ/"]
      spoken_words:
        - { text: "ee-ee-ee", label: "🔈 点击听发音" }
    answer:
      correct: 0
      explanation: "听到的是 /iː/（长元音）。发音像拉长的'衣'。对比 /ɪ/ 是短音，像短促的'衣'。"

  - id: "pho-op-002"
    layer: operation
    q_type: choice
    difficulty: 1
    subject: english
    content:
      stem: "🔈 点击按钮听发音，选出你听到的辅音音标："
      options: ["/p/", "/b/", "/t/", "/d/"]
      spoken_words:
        - { text: "buh-buh-buh", label: "🔈 点击听发音" }
    answer:
      correct: 1
      explanation: "听到的是 /b/（浊辅音）。发音时声带振动。/p/ 是相对的清辅音，声带不振动。"

  - id: "pho-op-003"
    layer: operation
    q_type: choice
    difficulty: 1
    subject: english
    content:
      stem: "下面哪个是元音音标？"
      options: ["/p/", "/m/", "/aɪ/", "/θ/"]
    answer:
      correct: 2
      explanation: "/aɪ/ 是双元音。元音发音时气流不受阻碍，辅音（/p/ /m/ /θ/）发音时嘴唇、舌头或牙齿会阻挡气流。"

  - id: "pho-op-004"
    layer: operation
    q_type: choice
    difficulty: 2
    subject: english
    content:
      stem: "🔈 点击按钮听发音，判断这是清辅音还是浊辅音？"
      options: ["清辅音（声带不振动）", "浊辅音（声带振动）"]
      spoken_words:
        - { text: "fff-fff", label: "🔈 点击听发音" }
    answer:
      correct: 0
      explanation: "/f/ 是清辅音，发音时声带不振动。把手放在喉咙上感觉一下——没有震动。对比浊辅音 /v/，发音时声带会振动。"

  - id: "pho-op-005"
    layer: operation
    q_type: choice
    difficulty: 2
    subject: english
    content:
      stem: "🔈 先听第一个发音，再听第二个。哪一个音更长？"
      options: ["第一个音更长", "第二个音更长", "两个一样长", "无法判断"]
      spoken_words:
        - { text: "ee-ee-ee", label: "🔈 发音1（先听）" }
        - { text: "ih-ih-ih", label: "🔈 发音2（后听）" }
    answer:
      correct: 0
      explanation: "第一个是 /iː/（长元音），第二个是 /ɪ/（短元音）。音标中的 ː 符号表示长音——这是区分很多元音对的关键标志。"

  - id: "pho-op-006"
    layer: operation
    q_type: choice
    difficulty: 2
    subject: english
    content:
      stem: "下面哪个是双元音（两个元音滑动组合）？"
      options: ["/ɪ/", "/ɒ/", "/eɪ/", "/ʌ/"]
    answer:
      correct: 2
      explanation: "/eɪ/ 是双元音，从 /e/ 滑到 /ɪ/。注意它由两个符号组成。单元音只有一个符号（如 /ɪ/ /ɒ/ /ʌ/）。"

  - id: "pho-und-001"
    layer: understand
    q_type: choice
    difficulty: 3
    subject: english
    content:
      stem: |
        /θ/（清辅音）和 /s/ 听起来有点像，但发音方式完全不同。
        它们的区别是什么？
      options:
        - "/θ/ 舌头在上下牙之间，/s/ 舌头在上颚"
        - "两者发音完全相同"
        - "/θ/ 是浊辅音，/s/ 是清辅音"
        - "/s/ 舌头在牙之间，/θ/ 舌头在上颚"
      spoken_words:
        - { text: "thhh-thhh", label: "🔈 /θ/ 发音" }
        - { text: "sss-sss", label: "🔈 /s/ 发音" }
    answer:
      correct: 0
      explanation: "/θ/（如 think 中的 th）发音时舌尖放在上下牙之间送气。/s/（如 sun 中的 s）发音时舌尖靠近上颚但不接触。两个都是清辅音。"

  - id: "pho-und-002"
    layer: understand
    q_type: choice
    difficulty: 3
    subject: english
    content:
      stem: |
        英语只有 26 个字母，但有 48 个音标。
        为什么同一个字母在不同单词里可以发不同的音？
      options:
        - "英语拼写在 500 年前基本定型，但发音一直在变化"
        - "英国人故意让拼写变复杂"
        - "不同国家的人写法不同"
        - "英语字母可以随意发音"
    answer:
      correct: 0
      explanation: "英语拼写大约在 15 世纪印刷术出现时定型，但之后发生了'元音大推移'等重大发音变化。拼写没跟上发音——所以需要音标作为发音指南。"

  - id: "pho-con-001"
    layer: connect
    q_type: open
    difficulty: 4
    subject: english
    content:
      stem: |
        如果你要给一个完全不会英语的人设计一套符号系统来标注发音，
        你会怎么设计？至少提 3 个设计决策，并解释为什么。
        （提示：考虑一下音标为什么有的用 /:/、有的用两个符号组合……）
    answer:
      rubric: "合理要点：1) 一个符号对应一个声音（不重复）；2) 用特殊符号区分长短音（如加冒号）；3) 双元音用两个符号表示滑动；4) 尽量用常见符号而非特殊符号便于书写；5) 清浊辅音成对设计体现规律。"

  - id: "nou-und-001"
    layer: understand
    q_type: choice
    difficulty: 3
    subject: english
    content:
      stem: |
        "I go to school" 和 "I go to the school" 有什么区别？
      options:
        - "没区别，the 加不加都行"
        - "go to school 表示去上学，go to the school 表示去学校那个建筑（不一定是上学）"
        - "go to the school 是错的"
        - "go to school 是美式英语，go to the school 是英式英语"
    answer: { correct: 1, explanation: "零冠词表示抽象功能（上学），the 表示具体地点（那个学校建筑）。" }
  - id: "nou-und-002"
    layer: understand
    q_type: fill
    difficulty: 3
    subject: english
    content:
      stem: "为什么 furniture 不可数？因为它在英语中被视为 ___（整体概念/具体物件）"
    answer: { correct: "整体概念", explanation: "家具在英语中被视为一个整体的类别概念，不说 a furniture 而说 a piece of furniture。" }

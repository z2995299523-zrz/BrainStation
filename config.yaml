adaptive_path:
  weights:
    degraded: 4.0
    learning_low_mastery: 5.0
    unlearned_core: 10.0
    unlearned_trunk: 7.0
app:
  content_dir: ./content
  data_dir: ./data
  database_path: ./data/training.db
  name: 初中数英思维训练营
difficulty:
  labels:
    1: ★☆☆☆☆
    2: ★★☆☆☆
    3: ★★★☆☆
    4: ★★★★☆
    5: ★★★★★
  levels:
  - 1
  - 2
  - 3
  - 4
  - 5
feynman:
  mode: rule
  rule:
    min_match_ratio: 0.5
    min_text_length: 20
interleaving:
  training:
    max_variant_per_session: 4
    new_node_layer_ratio:
      connect: 0.15
      operation: 0.6
      understand: 0.25
    new_node_ratio: 0.6
    old_node_layer_ratio:
      operation: 0.7
      understand: 0.3
    question_count: 14
    variant_injection_rate: 0.25
  warmup:
    deep_question_ratio: 0.2
    question_count: 8
sm2:
  first_interval: 1
  initial_ef: 2.5
  mastery_threshold: 0.85
  max_ef: 2.5
  min_ef: 1.3
  second_interval: 3
  skip_weekends: false
training_flow:
  max_total_min: 100
  skip_weekends: false
  steps:
  - duration_min: 8
    id: warmup
    name: 预热检索
    optional: false
  - duration_min: 8
    id: trigger
    name: 思考触发器
    optional: false
  - duration_min: 22
    id: learn
    name: 三层讲解
    optional: false
  - duration_min: 22
    id: training
    name: 混合训练
    optional: false
  - duration_min: 10
    id: feynman
    name: 费曼输出
    optional: false
  - duration_min: 5
    id: calibration
    name: 自我校准
    optional: false
